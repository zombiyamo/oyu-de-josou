  document.documentElement.lang = browserLang.startsWith('ja') ? 'ja' :
    browserLang.startsWith('zh') ? 'zh' : browserLang.startsWith('ko') ? 'ko' : 'en';
  document.title = `${L.title} ${L.subtitle}`;

  document.getElementById('helpTitle').textContent = L.howToTitle;

  document.getElementById('startBtn').textContent = L.ok;
  document.getElementById('resetBtn').textContent = L.reset;
  document.getElementById('bookTitle').textContent = L.bookTitle;
  document.getElementById('obTitle').textContent = L.obTitle;

  document.getElementById('obStartBtn').textContent = L.obStart;
}

/* 石はスプライトとして先に数種類描いておき、回転・拡縮でスタンプする。
   1個ずつパスを描くよりずっと速く、斑点などの質感も入れられる。 */
let stoneSprites = [];
const STONE_R = 23;   // スプライト内の石の基本半径(64px canvas内)

function buildStoneSprites() {
  stoneSprites = [];
  for (let s = 0; s < 14; s++) {
    const c = document.createElement('canvas');
    c.width = c.height = 64;
    const g = c.getContext('2d');
    const [h, sa, l] = STONE_PALETTE[s % STONE_PALETTE.length];
    const cx = 32, cy = 32, r = STONE_R;
    const n = irnd(7, 10), rot = rnd(TAU), ex = rnd(0.78, 1.22);
    const pts = [];
    for (let i = 0; i < n; i++) {
      const a = rot + (i / n) * TAU + rnd(-0.15, 0.15);
      const rr = r * rnd(0.72, 1.04);
      pts.push([cx + Math.cos(a) * rr * ex, cy + Math.sin(a) * rr]);
    }
    const path = () => {
      g.beginPath();
      let [mx0, my0] = midpoint(pts[n - 1], pts[0]);
      g.moveTo(mx0, my0);
      for (let i = 0; i < n; i++) {
        const p = pts[i];
        const [mx, my] = midpoint(p, pts[(i + 1) % n]);
        g.quadraticCurveTo(p[0], p[1], mx, my);
      }
      g.closePath();
    };
    // 左上からの光を想定した陰影
    const grad = g.createLinearGradient(cx - r, cy - r, cx + r, cy + r);
    grad.addColorStop(0, hslStr(h, sa, l + 9));
    grad.addColorStop(0.55, hslStr(h, sa, l));
    grad.addColorStop(1, hslStr(h, sa, Math.max(6, l - 12)));
    path();
    g.fillStyle = grad;
    g.fill();
    // 御影石風の斑点と上面のハイライト(石の形でクリップ)
    g.save();
    path();
    g.clip();
    for (let i = 0; i < 90; i++) {
      const dl = rnd(-15, 15);
      g.fillStyle = `hsla(${h},${sa}%,${clamp(l + dl, 5, 95)}%,${rnd(0.12, 0.3).toFixed(2)})`;
      g.fillRect(cx + rnd(-r, r) * ex, cy + rnd(-r, r), rnd(0.7, 1.8), rnd(0.7, 1.8));
    }
    g.beginPath();
    g.ellipse(cx - r * 0.25, cy - r * 0.3, r * 0.55 * ex, r * 0.4, rot, 0, TAU);
    g.fillStyle = 'rgba(255,255,255,0.10)';
    g.fill();
    g.restore();
    // 縁を締める
    path();
    g.strokeStyle = 'rgba(18,20,24,0.35)';
    g.lineWidth = 1.6;
    g.stroke();
    stoneSprites.push(c);
  }
}

function buildGravel() {
  gravelCssW = W + GRAVEL_PAD;
  gravelCssH = H + GRAVEL_PAD;
  gravelRES = RES;
  gravelCanvas = document.createElement('canvas');
  gravelCanvas.width = Math.max(1, Math.round(gravelCssW * RES));
  gravelCanvas.height = Math.max(1, Math.round(gravelCssH * RES));
  const g = gravelCanvas.getContext('2d');
  g.setTransform(RES, 0, 0, RES, 0, 0);

  g.fillStyle = '#3b3b3e';           // 石の間からのぞく暗い土
  g.fillRect(0, 0, gravelCssW, gravelCssH);

  const cell = 14;
  const cols = Math.ceil(gravelCssW / cell) + 2;
  const rows = Math.ceil(gravelCssH / cell) + 2;
  for (let j = 0; j < rows; j++) {
    for (let i = 0; i < cols; i++) {
      const x = (i - 0.5) * cell + rnd(-4, 4);
      const y = (j - 0.5) * cell + rnd(-4, 4);
      const spr = stoneSprites[irnd(0, stoneSprites.length - 1)];
      const big = Math.random() < 0.035;
      const sc = big ? rnd(0.55, 0.85) : rnd(0.27, 0.42);
      // 影
      g.beginPath();
      g.ellipse(x + 1.3, y + 1.8, STONE_R * sc * 1.1, STONE_R * sc * 0.95, 0, 0, TAU);
      g.fillStyle = 'rgba(10,10,13,0.4)';
      g.fill();
      // 光の向きが揃うよう回転は控えめに、縦横比だけ揺らす
      g.save();
      g.translate(x, y);
      g.rotate(rnd(-0.6, 0.6));
      g.scale(sc * rnd(0.85, 1.2), sc);
      g.drawImage(spr, -32, -32);
      g.restore();
    }
  }
  // 地面のうねり(ゆるい明暗のむら)
  const patches = Math.round((gravelCssW * gravelCssH) / 60000);
  for (let n = 0; n < patches; n++) {
    const px = rnd(gravelCssW), py = rnd(gravelCssH), pr = rnd(50, 150);
    const grd = g.createRadialGradient(px, py, 0, px, py, pr);
    grd.addColorStop(0, Math.random() < 0.5 ? 'rgba(18,20,25,0.10)' : 'rgba(255,255,255,0.06)');
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    g.fillStyle = grd;
    g.beginPath();
    g.arc(px, py, pr, 0, TAU);
    g.fill();
  }
  // 細かい砂粒
  for (let n = 0; n < (gravelCssW * gravelCssH) / 900; n++) {
    g.fillStyle = Math.random() < 0.5 ? 'rgba(250,250,252,.14)' : 'rgba(14,15,19,.22)';
    g.fillRect(rnd(gravelCssW), rnd(gravelCssH), 1.2, 1.2);
  }
}

function needGravelRebuild() {
  return !gravelCanvas || gravelRES !== RES || W > gravelCssW || H > gravelCssH;
}

// 生成済みの砂利から表示域を切り出す(生成が追いつくまでは引き伸ばしで凌ぐ)
function drawGravel() {
  const sw = W * gravelRES, sh = H * gravelRES;
  if (sw <= gravelCanvas.width && sh <= gravelCanvas.height) {
    ctx.drawImage(gravelCanvas, 0, 0, sw, sh, 0, 0, W, H);
  } else {
    ctx.drawImage(gravelCanvas, 0, 0, gravelCanvas.width, gravelCanvas.height, 0, 0, W, H);
  }
}

function buildVignette() {
  vignetteCanvas = document.createElement('canvas');
  vignetteCanvas.width = Math.max(1, Math.round(W * RES));
  vignetteCanvas.height = Math.max(1, Math.round(H * RES));
  const v = vignetteCanvas.getContext('2d');
  v.setTransform(RES, 0, 0, RES, 0, 0);
  const grad = v.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.45, W / 2, H / 2, Math.max(W, H) * 0.78);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(12,12,16,0.22)');
  v.fillStyle = grad;
  v.fillRect(0, 0, W, H);
}

function midpoint(a, b) { return [(a[0] + b[0]) / 2, (a[1] + b[1]) / 2]; }

/* ---------------- 濡れた地面 ---------------- */
let wetCanvas = null, wetCtx = null;
let wetActive = false, wetLastAdd = -1e9, wetFadeAcc = 0;

function buildWet() {
  const old = wetCanvas;
  wetCanvas = document.createElement('canvas');
  wetCanvas.width = Math.max(1, Math.round(W * RES));
  wetCanvas.height = Math.max(1, Math.round(H * RES));
  wetCtx = wetCanvas.getContext('2d');
  wetCtx.setTransform(RES, 0, 0, RES, 0, 0);
  if (old && wetActive) {
    // リサイズしても濡れ跡を引き継ぐ(雑草座標と同じ比例スケール)
    wetCtx.save();
    wetCtx.setTransform(1, 0, 0, 1, 0, 0);
    wetCtx.drawImage(old, 0, 0, old.width, old.height, 0, 0, wetCanvas.width, wetCanvas.height);
    wetCtx.restore();
  }
}
function addWet(x, y) {
  const r = rnd(15, 24);
  const grad = wetCtx.createRadialGradient(x, y, 0, x, y, r);
  grad.addColorStop(0, 'rgba(13,13,16,0.5)');
  grad.addColorStop(1, 'rgba(13,13,16,0)');
  wetCtx.fillStyle = grad;
  wetCtx.beginPath();
  wetCtx.arc(x, y, r, 0, TAU);
  wetCtx.fill();
  wetActive = true;
  wetLastAdd = elapsed;
}
function fadeWet(dt) {
  if (!wetActive) return;
  // 毎フレームの極小アルファは8bit量子化で効かないため、まとめて減衰させる
  wetFadeAcc += dt / 14;
  if (wetFadeAcc >= 0.05) {
    wetCtx.save();
    wetCtx.setTransform(1, 0, 0, 1, 0, 0);
    wetCtx.globalCompositeOperation = 'destination-out';
    wetCtx.globalAlpha = Math.min(wetFadeAcc, 1);
    wetCtx.fillStyle = '#000';   // addWetのグラデーションが残っていると全面消去にならない
    wetCtx.fillRect(0, 0, wetCanvas.width, wetCanvas.height);
    wetCtx.restore();
    wetFadeAcc = 0;
  }
  if (elapsed - wetLastAdd > 28) {
    // 完全に乾いた: 量子化の残りかすを消して描画もスキップする
    wetCtx.save();
    wetCtx.setTransform(1, 0, 0, 1, 0, 0);
    wetCtx.clearRect(0, 0, wetCanvas.width, wetCanvas.height);
    wetCtx.restore();
    wetActive = false;
    wetFadeAcc = 0;
  }
}

const weeds = [];
const roots = [];       // ドクダミの生き残った根 {x, y, timer, hp}
let killedThisSession = 0;

function pickWeedType() {
  // 解放済みの種類だけから重み付きで選ぶ
  let total = 0;
  const avail = [];
  for (const key in WEED_TYPES) {
    const t = WEED_TYPES[key];
    if (totalKilled >= t.unlockAt) {
      avail.push([key, t.weight]);
      total += t.weight;
    }
  }
  let r = Math.random() * total;
  for (const [key, wgt] of avail) {
    r -= wgt;
    if (r <= 0) return key;
  }
  return avail[avail.length - 1][0];
}

function makeWeed(x, y, typeKey, opts = {}) {
  const t = WEED_TYPES[typeKey];
  const leafCount = irnd(t.leafCount[0], t.leafCount[1]);
  const leaves = [];
  for (let i = 0; i < leafCount; i++) {
    leaves.push({
      angle: (i / leafCount) * TAU + rnd(-0.35, 0.35),
      len: rnd(t.leafLen[0], t.leafLen[1]),
      width: rnd(t.leafWidth[0], t.leafWidth[1]),
      curve: rnd(-0.5, 0.5),
      shade: rnd(-5, 6),          // 葉ごとの明度ゆらぎ
      heatBias: rnd(0.75, 1.3)    // 葉ごとの枯れやすさ(不均一に枯れる)
    });
  }
  return {
    x, y, type: typeKey, leaves,
    // 草は成長しない。生えた時から完成サイズで、現れるときだけふわっとフェードイン
    size: opts.size !== undefined ? opts.size : rnd(0.75, 1.2),
    age: opts.size !== undefined ? 10 : 0,   // サイズ指定なし=新しく生えた草だけ演出する
    scald: 0, visualScald: 0, wither: 0,
    crumbleTimer: 0, removing: false, rootCooked: false,
    rootHp: typeKey === 'dokudami' ? (opts.rootHp !== undefined ? opts.rootHp : irnd(1, 2)) : 0,
    hasFlower: typeKey === 'dokudami' ? Math.random() < 0.55 :
               typeKey === 'katabami' ? Math.random() < 0.5 :
               typeKey === 'clover' ? Math.random() < 0.35 :
               typeKey === 'sumire' ? Math.random() < 0.8 :
               typeKey === 'tsuyukusa' ? Math.random() < 0.7 : false,
    swayPhase: rnd(TAU),
    radius() {
      let m = 0;
      for (const l of this.leaves) if (l.len > m) m = l.len;
      return m * this.size;
    }
  };
}

const MAX_WEEDS = 170;   // 本数の上限(静的レイヤーのキャッシュがあるので多くても軽い)

function weedTargetCount() {
  // W,Hはワールド座標(ズーム後の見える範囲)。画面の7割くらいが草になる密度
  return clamp(Math.round((W * H) / 1700), 30, 140);
}

function spawnWeed(opts = {}) {
  if (weeds.length >= MAX_WEEDS && opts.x === undefined) return false;
  const margin = 20;
  const topMargin = 44;   // HUD(CSS表示)の下から。ワールド座標なのでZOOM分小さい
  for (let attempt = 0; attempt < 12; attempt++) {
    let x, y, type = opts.type;
    if (opts.x !== undefined) {
      x = opts.x + rnd(-8, 8);
      y = opts.y + rnd(-8, 8);
    } else if (opts.near) {
      // 群生: 既存の株のそばに、多くは同じ種類が生える。
      // 匍匐系は茎の先で根付くので、少し離れた場所に連なっていく
      const a = rnd(TAU);
      const d = opts.near.type === 'clover' ? rnd(8, 30) :    // シロツメクサは密なマット
                opts.near.type === 'koke' ? rnd(7, 22) :      // コケはべったり密着
                opts.near.type === 'katabami' ? rnd(14, 62) : // カタバミは広範囲に広がる
                rnd(10, 48);
      x = opts.near.x + Math.cos(a) * d;
      y = opts.near.y + Math.sin(a) * d;
      if (!type && Math.random() < 0.85) type = opts.near.type;
    } else {
      x = rnd(margin, W - margin);
      y = rnd(topMargin, H - margin);
    }
    let ok = x >= margin && x <= W - margin && y >= topMargin && y <= H - margin;
    if (ok) {
      let close = 0;
      for (const w of weeds) {
        const dx = w.x - x, dy = w.y - y;
        const d2 = dx * dx + dy * dy;
        if (d2 < 10 * 10) { ok = false; break; }
        if (d2 < 24 * 24) close++;
      }
      if (ok && close > 10) ok = false;   // 1点に積み重なりすぎない
    }
    if (ok || (opts.x !== undefined && attempt === 11)) {
      // 指定座標スポーン(根からの復活)は最終的に必ず画面内で成立させる
      const sx = clamp(x, margin, Math.max(margin, W - margin));
      const sy = clamp(y, topMargin, Math.max(topMargin, H - margin));
      const nw = makeWeed(sx, sy, type || pickWeedType(), opts);
      weeds.push(nw);
      if (nw.age === 0) emitSoil(nw.x, nw.y);   // 発芽時に土がパラッと動く
      return true;
    }
  }
  return false;
}

function initGarden() {
  weeds.length = 0;
  roots.length = 0;
  const target = weedTargetCount();
  // 互いに離れた場所に群れの「種」をまき、それぞれの群れを独立に茂らせる
  const seeds = Math.max(3, Math.round(target / 12));
  const perColony = Math.round((target * 0.85) / seeds);
  for (let s = 0; s < seeds; s++) {
    let sx = 0, sy = 0, tries = 0;
    do {
      sx = rnd(40, W - 40);
      sy = rnd(60, H - 30);
      tries++;
    } while (tries < 20 && weeds.some(w => (w.x - sx) ** 2 + (w.y - sy) ** 2 < 110 * 110));
    const before = weeds.length;
    spawnWeed({ x: sx, y: sy, size: rnd(0.8, 1.2) });
    for (let i = 0; i < perColony; i++) {
      const colony = weeds.slice(before);
      if (!colony.length) break;
      spawnWeed({ near: colony[irnd(0, colony.length - 1)], size: rnd(0.7, 1.2) });
    }
  }
}

/* ---- 葉の色: 健康 → 湯がかかって色変わり → 黄 → 茶 → 枯れ色 ---- */
function leafHSL(t, scald, wither, shade) {
  let h = t.hue, s = t.sat, l = t.light + shade;
  const sc = clamp(scald, 0, 1);
  // お湯がかかった直後: 濃く・くすんで湿った色に
  h -= 10 * sc; s -= 12 * sc; l -= 6 * sc;
  if (wither > 0) {
    const stages = [
      [0.0, h, s, l],
      [0.32, 68, 50, 43 + shade * 0.6],
      [0.62, 45, 46, 40 + shade * 0.5],
      [0.85, 30, 34, 33 + shade * 0.4],
      [1.0, 37, 23, 55 + shade * 0.4]
    ];
    for (let i = 1; i < stages.length; i++) {
      if (wither <= stages[i][0]) {
        const [w0, h0, s0, l0] = stages[i - 1];
        const [w1, h1, s1, l1] = stages[i];
        const tt = (wither - w0) / (w1 - w0);
        h = lerp(h0, h1, tt); s = lerp(s0, s1, tt); l = lerp(l0, l1, tt);
        break;
      }
    }
  }
  return [h, clamp(s, 0, 100), clamp(l, 4, 92)];
}

/* ---- 葉の描画 ---- */
function drawBlade(c, len, width, curve) {
  // イネ科の細い葉。原点=根元、+x方向に伸びる
  const mx = len * 0.5, my = curve * len * 0.4;
  c.beginPath();
  c.moveTo(0, -width / 2);
  c.quadraticCurveTo(mx, my - width * 0.7, len, my * 1.6);
  c.quadraticCurveTo(mx, my + width * 0.7, 0, width / 2);
  c.closePath();
  c.fill();
}
function drawTeardrop(c, len, width, curve) {
  // なめらかな涙滴形の葉(ロゼットのハイライトにも使う)
  const my = curve * len * 0.25;
  c.beginPath();
  c.moveTo(0, 0);
  c.bezierCurveTo(len * 0.25, -width * 0.62 + my, len * 0.72, -width * 0.5 + my, len, my);
  c.bezierCurveTo(len * 0.72, width * 0.5 + my, len * 0.25, width * 0.62 + my, 0, 0);
  c.closePath();
  c.fill();
}
function drawRosetteLeaf(c, len, width, curve) {
  // タンポポ風のギザギザした葉
  const my = curve * len * 0.25;
  const N = 8;
  c.beginPath();
  c.moveTo(0, 0);
  for (let i = 1; i <= N; i++) {
    const t = i / N;
    const jag = (i === N) ? 1 : (i % 2 ? 1 : 0.55);
    const wy = width * 0.58 * Math.sin(Math.PI * Math.pow(t, 0.75)) * jag;
    c.lineTo(len * t, -wy + my * t);
  }
  for (let i = N - 1; i >= 1; i--) {
    const t = i / N;
    const jag = i % 2 ? 1 : 0.55;
    const wy = width * 0.58 * Math.sin(Math.PI * Math.pow(t, 0.75)) * jag;
    c.lineTo(len * t, wy + my * t);
  }
  c.closePath();
  c.fill();
}
function drawHeart(c, len, width, stemColor, veinAlpha) {
  // ドクダミのハート形の葉。茎の先に葉がつく
  const stem = len * 0.45;
  c.save();
  c.strokeStyle = stemColor;
  c.lineWidth = 1.1;
  c.beginPath();
  c.moveTo(0, 0);
  c.lineTo(stem, 0);
  c.stroke();
  c.translate(stem, 0);
  const L = len * 0.85;
  c.beginPath();
  c.moveTo(0, 0);
  c.bezierCurveTo(-L * 0.12, -width * 0.72, L * 0.62, -width * 0.66, L, 0);
  c.bezierCurveTo(L * 0.62, width * 0.66, -L * 0.12, width * 0.72, 0, 0);
  c.closePath();
  c.fill();
  // 葉脈
  if (veinAlpha > 0.02) {
    c.strokeStyle = `rgba(212,236,205,${veinAlpha.toFixed(3)})`;
    c.lineWidth = 0.7;
    c.beginPath();
    c.moveTo(0, 0); c.lineTo(L * 0.78, 0);
    c.moveTo(0, 0); c.quadraticCurveTo(L * 0.3, -width * 0.32, L * 0.58, -width * 0.24);
    c.moveTo(0, 0); c.quadraticCurveTo(L * 0.3, width * 0.32, L * 0.58, width * 0.24);
    c.stroke();
  }
  c.restore();
}

function drawWeed(w, time) {
  const t = WEED_TYPES[w.type];
  const r = w.radius();
  if (r < 0.5) return;

  // 影(這って広がる草は面が薄いので影も控えめに)
  const isRunner = w.type === 'runner';
  ctx.beginPath();
  ctx.ellipse(w.x + 2, w.y + 2.5, r * (isRunner ? 0.5 : 0.75), r * (isRunner ? 0.36 : 0.55), 0, 0, TAU);
  ctx.fillStyle = isRunner ? 'rgba(10,10,14,0.1)' : 'rgba(10,10,14,0.2)';
  ctx.fill();

  // 新しく生えた草はゆっくりフェードインで現れる(成長はしない)
  const emerge = clamp(w.age / 2, 0, 1);
  const dyingAlpha = (w.crumbleTimer > 0 ? clamp(1 - w.crumbleTimer / CRUMBLE_FADE, 0, 1) : 1) *
                     (0.25 + 0.75 * emerge);
  for (let i = 0; i < w.leaves.length; i++) {
    // 葉は1枚ずつ順番に、小さく生えてから育つ
    const lp = clamp(w.size * 1.4 * w.leaves.length - i, 0, 1);
    if (lp <= 0) break;   // 後ろの葉ほど遅く生えるので、以降はまだ芽吹いていない
    const leaf = w.leaves[i];
    const lw = clamp(w.wither * leaf.heatBias, 0, 1);   // 葉ごとの枯れ具合
    const len = leaf.len * w.size * (1 - 0.28 * lw) * (0.35 + 0.65 * lp);
    const width = leaf.width * clamp(w.size * 1.3, 0.3, 1) * (1 - 0.5 * lw) * (0.5 + 0.5 * lp);
    // 枯れてくると葉の向きが乱れて縮れる
    const shrivel = Math.sin(i * 7.3 + w.swayPhase * 3) * 0.5 * lw;
    const ang = leaf.angle + shrivel;
    ctx.save();
    ctx.translate(w.x, w.y);
    ctx.rotate(ang);
    ctx.globalAlpha = dyingAlpha * (1 - 0.15 * lw) * (0.3 + 0.7 * lp);
    const col = leafHSL(t, w.visualScald * leaf.heatBias, lw, leaf.shade);
    ctx.fillStyle = hslStr(col[0], col[1], col[2]);
    const hiFade = 1 - lw * 0.7;        // 枯れるほどツヤ・葉脈が消える
    switch (w.type) {
      case 'wakakusa':
        drawBlade(ctx, len, width, leaf.curve);
        // 中央のハイライト筋
        ctx.fillStyle = hslStr(col[0] + 3, col[1], clamp(col[2] + 10 * hiFade, 4, 92));
        drawBlade(ctx, len * 0.9, width * 0.45, leaf.curve);
        break;
      case 'enokoro': {
        if (i < 2 && w.size > 0.5) {
          // ねこじゃらしの穂
          const sl = len * 1.1;
          ctx.strokeStyle = hslStr(col[0] - 6, Math.max(0, col[1] - 12), Math.max(8, col[2] - 4));
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(2, 0);
          ctx.quadraticCurveTo(sl * 0.55, leaf.curve * sl * 0.3, sl, leaf.curve * sl * 0.5);
          ctx.stroke();
          ctx.save();
          ctx.translate(sl, leaf.curve * sl * 0.5);
          ctx.rotate(leaf.curve * 0.45);
          const hFade = 1 - lw * 0.5;
          const bodyL = 11;
          // きれいな楕円ひとつの穂
          ctx.fillStyle = `hsla(62,42%,${(58 - lw * 16).toFixed(0)}%,${(0.9 * hFade).toFixed(2)})`;
          ctx.beginPath();
          ctx.ellipse(-bodyL * 0.35, 0, bodyL * 0.68, 2.35, 0, 0, TAU);
          ctx.fill();
          // うっすらハイライト
          ctx.fillStyle = `hsla(58,50%,${(70 - lw * 14).toFixed(0)}%,${(0.35 * hFade).toFixed(2)})`;
          ctx.beginPath();
          ctx.ellipse(-bodyL * 0.35, -0.75, bodyL * 0.5, 0.95, 0, 0, TAU);
          ctx.fill();
          ctx.restore();
        } else {
          drawBlade(ctx, len, width, leaf.curve);
          ctx.fillStyle = hslStr(col[0] + 3, col[1], clamp(col[2] + 10 * hiFade, 4, 92));
          drawBlade(ctx, len * 0.9, width * 0.45, leaf.curve);
        }
        break;
      }
      case 'tsuyukusa':
        // 笹のような細長い葉
        drawTeardrop(ctx, len, width * 0.72, leaf.curve);
        ctx.fillStyle = hslStr(col[0] + 4, col[1], clamp(col[2] + 9 * hiFade, 4, 92));
        drawTeardrop(ctx, len * 0.85, width * 0.32, leaf.curve);
        break;
      case 'koke': {
        // 平たいコケのかたまり(地面に張り付く)
        const d = len * 0.4;
        for (let k = 0; k < 3; k++) {
          ctx.beginPath();
          ctx.ellipse(d * (0.4 + k * 0.32), Math.sin(k * 5 + w.swayPhase) * width * 0.25,
                      len * 0.34, width * 0.52, k * 0.5, 0, TAU);
          ctx.fill();
        }
        ctx.fillStyle = hslStr(col[0] + 6, col[1], clamp(col[2] + 12 * hiFade, 4, 92));
        for (let k = 0; k < 4; k++) {
          ctx.beginPath();
          ctx.arc(d * (0.3 + k * 0.27), Math.sin(k * 7 + w.swayPhase * 2) * width * 0.3, 1.1, 0, TAU);
          ctx.fill();
        }
        break;
      }
      case 'sumire':
        // 丸みのあるハート形の葉(茎は緑)
        drawHeart(ctx, len, width, 'rgba(70,110,60,.8)', 0.18 * hiFade);
        break;
      case 'yotsuba': {
        // 幸運の四つ葉。ちょっと金色がかった緑
        const stem = len * 0.5;
        ctx.strokeStyle = hslStr(col[0] - 4, Math.max(0, col[1] - 10), Math.max(8, col[2] - 7));
        ctx.lineWidth = 0.9;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(stem, 0);
        ctx.stroke();
        ctx.translate(stem, 0);
        for (let k = 0; k < 4; k++) {
          ctx.save();
          ctx.rotate(-1.35 + k * 0.9);
          const L = len * 0.5, Wd = width * 0.6;
          ctx.beginPath();
          ctx.ellipse(L * 0.55, 0, L * 0.5, Wd * 0.5, 0, 0, TAU);
          ctx.fill();
          ctx.strokeStyle = `rgba(245,250,225,${(0.45 * hiFade).toFixed(3)})`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(L * 0.2, 0, L * 0.4, -0.7, 0.7);
          ctx.stroke();
          ctx.restore();
        }
        // きらり
        ctx.fillStyle = `rgba(255,250,205,${(0.8 * hiFade).toFixed(2)})`;
        ctx.beginPath();
        ctx.arc(len * 0.42, -len * 0.3, 1.1, 0, TAU);
        ctx.fill();
        break;
      }
      case 'nijiyotsuba': {
        // この世に存在しない、虹色に輝く四つ葉
        const stem = len * 0.5;
        ctx.strokeStyle = `rgba(200,205,215,${(0.9 * (1 - lw * 0.5)).toFixed(2)})`;
        ctx.lineWidth = 0.9;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(stem, 0);
        ctx.stroke();
        ctx.translate(stem, 0);
        const mix = clamp(1 - lw * 2, 0, 1);   // 枯れ始めると虹色が抜けていく
        for (let k = 0; k < 4; k++) {
          ctx.save();
          ctx.rotate(-1.35 + k * 0.9);
          const L = len * 0.5, Wd = width * 0.6;
          const hueK = (90 * k + w.swayPhase * 57) % 360;
          ctx.fillStyle = mix > 0
            ? hslStr(hueK, 62 * mix + col[1] * (1 - mix), clamp(col[2] + 20 * mix, 4, 88))
            : hslStr(col[0], col[1], col[2]);
          ctx.beginPath();
          ctx.ellipse(L * 0.55, 0, L * 0.5, Wd * 0.5, 0, 0, TAU);
          ctx.fill();
          ctx.strokeStyle = `rgba(255,255,255,${(0.5 * mix).toFixed(3)})`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(L * 0.2, 0, L * 0.4, -0.7, 0.7);
          ctx.stroke();
          ctx.restore();
        }
        // きらきら
        ctx.fillStyle = `rgba(255,255,240,${(0.9 * mix).toFixed(2)})`;
        for (let k = 0; k < 3; k++) {
          const a = w.swayPhase * 3 + k * 2.1;
          ctx.beginPath();
          ctx.arc(Math.cos(a) * len * 0.5, Math.sin(a) * len * 0.4, 1.0, 0, TAU);
          ctx.fill();
        }
        break;
      }
      case 'rosette': {
        const bc = leaf.curve;
        drawRosetteLeaf(ctx, len, width, bc);
        // 内側の明るい面と主脈
        ctx.fillStyle = hslStr(col[0] + 4, Math.max(0, col[1] - 4), clamp(col[2] + 8 * hiFade, 4, 92));
        drawTeardrop(ctx, len * 0.88, width * 0.42, bc);
        ctx.strokeStyle = `rgba(233,244,222,${(0.3 * hiFade).toFixed(3)})`;
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(len * 0.08, 0);
        ctx.quadraticCurveTo(len * 0.5, bc * len * 0.12, len * 0.94, bc * len * 0.25);
        ctx.stroke();
        break;
      }
      case 'oobako': {
        const bc = leaf.curve;
        drawTeardrop(ctx, len, width * 1.15, bc);
        // オオバコらしい平行脈
        ctx.strokeStyle = `rgba(224,240,214,${(0.28 * hiFade).toFixed(3)})`;
        ctx.lineWidth = 0.7;
        ctx.beginPath();
        for (let v = -1; v <= 1; v++) {
          ctx.moveTo(len * 0.1, v * width * 0.1);
          ctx.quadraticCurveTo(len * 0.5, v * width * 0.32 + bc * len * 0.12, len * 0.9, bc * len * 0.25);
        }
        ctx.stroke();
        break;
      }
      case 'runner': {
        // 匍匐茎が地を這い、小さな葉が交互につく(メヒシバ風)
        const bc = leaf.curve;
        ctx.strokeStyle = hslStr(col[0] - 14, Math.max(0, col[1] - 8), Math.max(8, col[2] - 4));
        ctx.lineWidth = 0.9;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(2, 0);
        ctx.quadraticCurveTo(len * 0.5, bc * len * 0.5, len, bc * len * 0.8);
        ctx.stroke();
        const nB = Math.max(4, Math.floor(len / 5));
        for (let b = 0; b < nB; b++) {
          const tt = 0.14 + (b / nB) * 0.86;
          // 匍匐茎(2次ベジェ)上の位置
          const qx = (1 - tt) * (1 - tt) * 2 + 2 * (1 - tt) * tt * (len * 0.5) + tt * tt * len;
          const qy = 2 * (1 - tt) * tt * (bc * len * 0.5) + tt * tt * (bc * len * 0.8);
          const side = b % 2 ? 1 : -1;
          ctx.save();
          ctx.translate(qx, qy);
          ctx.rotate(side * (0.7 + bc * 0.4) + Math.sin(b * 12.99 + w.swayPhase * 7) * 0.25);
          drawBlade(ctx, width * (3.4 + (b === nB - 1 ? 1.4 : 0)), width * 0.75, 0.25 * side);
          ctx.restore();
        }
        break;
      }
      case 'clover': {
        // シロツメクサ: 丸い3小葉+白い山形の斑紋
        const stem = len * 0.5;
        ctx.strokeStyle = hslStr(col[0] - 4, Math.max(0, col[1] - 10), Math.max(8, col[2] - 7));
        ctx.lineWidth = 0.9;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(stem, 0);
        ctx.stroke();
        ctx.translate(stem, 0);
        for (let k = -1; k <= 1; k++) {
          ctx.save();
          ctx.rotate(k * 1.25);
          const L = len * 0.52, Wd = width * 0.62;
          ctx.beginPath();
          ctx.ellipse(L * 0.55, 0, L * 0.5, Wd * 0.5, 0, 0, TAU);
          ctx.fill();
          ctx.strokeStyle = `rgba(235,245,232,${(0.4 * hiFade).toFixed(3)})`;
          ctx.lineWidth = 1.1;
          ctx.beginPath();
          ctx.arc(L * 0.2, 0, L * 0.42, -0.7, 0.7);
          ctx.stroke();
          ctx.restore();
        }
        break;
      }
      case 'katabami': {
        // 茎の先に3枚のハート形の小葉(クローバー風)
        const stem = len * 0.55;
        ctx.strokeStyle = hslStr(col[0] - 6, Math.max(0, col[1] - 12), Math.max(8, col[2] - 8));
        ctx.lineWidth = 0.9;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(stem, 0);
        ctx.stroke();
        ctx.translate(stem, 0);
        for (let k = -1; k <= 1; k++) {
          ctx.save();
          ctx.rotate(k * 1.02);
          const L = len * 0.48, Wd = width * 0.6;
          ctx.beginPath();
          ctx.ellipse(L * 0.55, -Wd * 0.33, L * 0.52, Wd * 0.42, -0.3, 0, TAU);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(L * 0.55, Wd * 0.33, L * 0.52, Wd * 0.42, 0.3, 0, TAU);
          ctx.fill();
          ctx.restore();
        }
        break;
      }
      default:   // dokudami
        drawHeart(ctx, len, width,
          lw > 0.5 ? 'rgba(90,60,40,.8)' : 'rgba(130,50,60,.85)',
          0.22 * hiFade);
    }
    ctx.restore();
  }

  // 株元: 葉が集まる中心をふわっと暗くする(ベタ塗りの丸は不自然なのでグラデで)
  const CROWN = { rosette: 1, enokoro: 1, tsuyukusa: 1 };
  if (CROWN[w.type] && w.size > 0.15) {
    const cr = 3.2 * w.size + 0.6;
    const cg = ctx.createRadialGradient(w.x, w.y, 0, w.x, w.y, cr);
    cg.addColorStop(0, `hsla(${t.hue},${Math.max(0, t.sat - 10)}%,${Math.max(6, t.light - 13)}%,${(0.55 * dyingAlpha).toFixed(2)})`);
    cg.addColorStop(1, 'hsla(0,0%,0%,0)');
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.arc(w.x, w.y, cr, 0, TAU);
    ctx.fill();
  }

  // 花(元気なうちだけ)
  if (w.hasFlower && w.size > 0.85 && w.wither < 0.35) {
    ctx.save();
    ctx.globalAlpha = dyingAlpha * clamp(1 - w.wither * 2.5, 0, 1);
    if (w.type === 'dokudami') {
      ctx.translate(w.x, w.y);
      for (let p = 0; p < 4; p++) {
        ctx.save();
        ctx.rotate((p / 4) * TAU + w.swayPhase);
        ctx.beginPath();
        ctx.ellipse(3.4, 0, 3.1, 1.6, 0, 0, TAU);
        ctx.fillStyle = '#f3f1e8';
        ctx.fill();
        ctx.restore();
      }
      ctx.beginPath();
      ctx.arc(0, 0, 1.5, 0, TAU);
      ctx.fillStyle = '#d8cf7a';
      ctx.fill();
    } else if (w.type === 'katabami') {
      // 小さな黄色い五弁花
      ctx.translate(w.x + 3, w.y - 3);
      for (let p = 0; p < 5; p++) {
        ctx.save();
        ctx.rotate((p / 5) * TAU + w.swayPhase);
        ctx.beginPath();
        ctx.ellipse(2.1, 0, 1.9, 1.1, 0, 0, TAU);
        ctx.fillStyle = '#ecd04a';
        ctx.fill();
        ctx.restore();
      }
      ctx.beginPath();
      ctx.arc(0, 0, 0.9, 0, TAU);
      ctx.fillStyle = '#bb8d2b';
      ctx.fill();
    } else if (w.type === 'clover') {
      // 白いぽんぽん花
      ctx.translate(w.x - 2, w.y + 2);
      for (let p = 0; p < 8; p++) {
        ctx.save();
        ctx.rotate((p / 8) * TAU + w.swayPhase);
        ctx.beginPath();
        ctx.ellipse(2.2, 0, 1.7, 1.0, 0, 0, TAU);
        ctx.fillStyle = '#f4f2ea';
        ctx.fill();
        ctx.restore();
      }
      ctx.beginPath();
      ctx.arc(0, 0, 1.4, 0, TAU);
      ctx.fillStyle = '#dfe6cf';
      ctx.fill();
    } else if (w.type === 'sumire') {
      // 紫の花
      ctx.translate(w.x + 2, w.y - 4);
      for (let p = 0; p < 5; p++) {
        ctx.save();
        ctx.rotate((p / 5) * TAU + w.swayPhase);
        ctx.beginPath();
        ctx.ellipse(2.4, 0, 2.3, 1.4, 0, 0, TAU);
        ctx.fillStyle = '#8a6fc0';
        ctx.fill();
        ctx.restore();
      }
      ctx.beginPath();
      ctx.arc(0, 0, 1.1, 0, TAU);
      ctx.fillStyle = '#f0e0a4';
      ctx.fill();
    } else if (w.type === 'tsuyukusa') {
      // 青い花(丸い花びら2枚+下に小さな白)
      ctx.translate(w.x - 2, w.y - 3);
      ctx.fillStyle = '#4a78d8';
      ctx.beginPath();
      ctx.ellipse(-1.8, -1.6, 2.2, 1.9, -0.3, 0, TAU);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(1.8, -1.6, 2.2, 1.9, 0.3, 0, TAU);
      ctx.fill();
      ctx.fillStyle = '#f2f4f8';
      ctx.beginPath();
      ctx.ellipse(0, 1.4, 1.6, 1.1, 0, 0, TAU);
      ctx.fill();
      ctx.fillStyle = '#e8d05a';
      ctx.beginPath();
      ctx.arc(0, -0.3, 0.8, 0, TAU);
      ctx.fill();
    }
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

/* ---------------- パーティクル ---------------- */
const steam = [], splashes = [], flakes = [], rings = [];
let steamSprite = null;
function buildSteamSprite() {
  steamSprite = document.createElement('canvas');
  steamSprite.width = steamSprite.height = 64;
  const s = steamSprite.getContext('2d');
  const g = s.createRadialGradient(32, 32, 2, 32, 32, 30);
  g.addColorStop(0, 'rgba(255,255,255,0.55)');
  g.addColorStop(0.6, 'rgba(255,255,255,0.22)');
  g.addColorStop(1, 'rgba(255,255,255,0)');
  s.fillStyle = g;
  s.fillRect(0, 0, 64, 64);
}

let steamAcc = 0;
function emitSteam(x, y, rate, dt) {
  if (steam.length > 220) return;
  steamAcc += rate * dt;
  while (steamAcc >= 1) {
    steamAcc -= 1;
    steam.push({
      x: x + rnd(-9, 9), y: y + rnd(-6, 6),
      vx: rnd(-7, 7), vy: rnd(-32, -17),
      r: rnd(8, 15), life: rnd(1.4, 2.6), age: 0, drift: rnd(TAU)
    });
  }
}
function emitSoil(x, y) {
  for (let i = 0; i < 6; i++) {
    const a = rnd(TAU);
    flakes.push({
      x: x + Math.cos(a) * 2, y: y + Math.sin(a) * 2,
      vx: Math.cos(a) * rnd(4, 14), vy: Math.sin(a) * rnd(4, 14) - 3,
      r: rnd(0.8, 1.8), life: rnd(0.5, 0.9), age: 0
    });
  }
}
function emitSteamBurst(x, y, n) {
  for (let i = 0; i < n; i++) {
    steam.push({
      x: x + rnd(-12, 12), y: y + rnd(-9, 9),
      vx: rnd(-12, 12), vy: rnd(-46, -22),
      r: rnd(10, 18), life: rnd(1.8, 3), age: 0, drift: rnd(TAU)
    });
  }
}
function emitSplash(x, y, dt) {
  if (splashes.length > 260) return;
  const n = 26 * dt;
  for (let i = 0; i < n * 2; i++) {
    if (Math.random() > 0.55) continue;
    const a = rnd(TAU), sp = rnd(18, 55);
    splashes.push({
      x, y,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp * 0.55,
      life: rnd(0.22, 0.42), age: 0
    });
  }
}
function emitFlakes(w) {
  const r = w.radius();
  for (let i = 0; i < 9; i++) {
    const a = rnd(TAU);
    flakes.push({
      x: w.x + Math.cos(a) * r * 0.4, y: w.y + Math.sin(a) * r * 0.4,
      vx: Math.cos(a) * rnd(6, 20), vy: Math.sin(a) * rnd(6, 20) - 4,
      r: rnd(1, 2.4), life: rnd(0.7, 1.3), age: 0
    });
  }
}

function updateParticles(dt, time) {
  for (let i = steam.length - 1; i >= 0; i--) {
    const p = steam[i];
    p.age += dt;
    if (p.age >= p.life) { steam.splice(i, 1); continue; }
    p.x += (p.vx + Math.sin(time * 1.7 + p.drift) * 9) * dt;
    p.y += p.vy * dt;
    p.vy *= (1 - 0.35 * dt);
  }
  for (let i = splashes.length - 1; i >= 0; i--) {
    const p = splashes[i];
    p.age += dt;
    if (p.age >= p.life) { splashes.splice(i, 1); continue; }
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= (1 - 3 * dt); p.vy *= (1 - 3 * dt);
  }
  for (let i = flakes.length - 1; i >= 0; i--) {
    const p = flakes[i];
    p.age += dt;
    if (p.age >= p.life) { flakes.splice(i, 1); continue; }
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= (1 - 2 * dt); p.vy *= (1 - 2 * dt);
  }
  for (let i = rings.length - 1; i >= 0; i--) {
    const p = rings[i];
    p.age += dt;
    if (p.age >= p.life) rings.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of rings) {
    const t = p.age / p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4 + t * 16, 0, TAU);
    ctx.strokeStyle = `rgba(225,238,250,${(0.4 * (1 - t)).toFixed(3)})`;
    ctx.lineWidth = 1.4;
    ctx.stroke();
  }
  ctx.fillStyle = 'rgba(226,240,252,0.85)';
  for (const p of splashes) {
    const t = p.age / p.life;
    ctx.globalAlpha = 1 - t;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 1.7, 0, TAU);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  for (const p of flakes) {
    const t = p.age / p.life;
    ctx.globalAlpha = 1 - t;
    ctx.fillStyle = '#6d5236';
    ctx.fillRect(p.x, p.y, p.r, p.r);
  }
  ctx.globalAlpha = 1;
  for (const p of steam) {
    const t = p.age / p.life;
    const scale = (p.r / 32) * (1 + t * 1.7);
    ctx.globalAlpha = 0.62 * (1 - t) * Math.min(1, t * 6 + 0.35);
    ctx.drawImage(steamSprite, p.x - 32 * scale, p.y - 32 * scale, 64 * scale, 64 * scale);
  }
  ctx.globalAlpha = 1;
}

/* ---------------- やかんとお湯 ----------------
   指の位置=やかん。お湯はその少し先(左下)に注がれる。
   指で着地点が隠れず、「やかんを持っている」感覚になる。 */
const pour = { active: false, x: 0, y: 0, tx: 0, ty: 0, pointerId: null };
let lingering = null;    // 注ぎ終わった後もしばらく湯気が立つ {x, y, ttl}
let ringTimer = 0, wetTimer = 0;

function updatePourTarget() {
  // 着地点はやかんの注ぎ口のすぐ先。離れすぎると狙いにくい
  const side = pour.x > 80 ? 1 : -1;   // 左端ぎわでは右側に注ぐ
  pour.tx = clamp(pour.x - 36 * side, 14, Math.max(14, W - 14));
  pour.ty = clamp(pour.y + 40, 30, Math.max(30, H - 12));
}

function drawKettle(time) {
  const k = { x: pour.x, y: pour.y };
  const dx = pour.tx - k.x, dy = pour.ty - k.y;
  const ang = Math.atan2(dy, dx);
  const spoutLen = 38;
  const sx = k.x + Math.cos(ang) * spoutLen;
  const sy = k.y + Math.sin(ang) * spoutLen;

  // --- お湯の流れ(注ぎ口 → 着水点) ---
  const segs = 10;
  ctx.save();
  ctx.lineCap = 'round';
  for (let pass = 0; pass < 2; pass++) {
    ctx.beginPath();
    for (let i = 0; i <= segs; i++) {
      const t = i / segs;
      const wob = Math.sin(time * 22 + t * 9) * 1.3 * t;
      const x = lerp(sx, pour.tx, t) + wob;
      const y = lerp(sy, pour.ty, t) + wob * 0.4;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    if (pass === 0) {
      ctx.strokeStyle = 'rgba(190,218,240,0.55)';
      ctx.lineWidth = 3.6;
    } else {
      ctx.strokeStyle = 'rgba(245,250,255,0.8)';
      ctx.lineWidth = 1.4;
    }
    ctx.stroke();
  }
  ctx.restore();

  // --- やかん本体(上から見た図) ---
  ctx.save();
  ctx.translate(k.x, k.y);
  ctx.rotate(ang);
  // 影
  ctx.beginPath();
  ctx.ellipse(2, 6, 27, 21, 0, 0, TAU);
  ctx.fillStyle = 'rgba(15,10,5,0.2)';
  ctx.fill();
  // 注ぎ口
  ctx.beginPath();
  ctx.moveTo(20, -6);
  ctx.lineTo(spoutLen, -2.6);
  ctx.lineTo(spoutLen, 2.6);
  ctx.lineTo(20, 6);
  ctx.closePath();
  const spg = ctx.createLinearGradient(20, -6, 20, 6);
  spg.addColorStop(0, '#d9dbde');
  spg.addColorStop(0.5, '#aeb2b8');
  spg.addColorStop(1, '#84888e');
  ctx.fillStyle = spg;
  ctx.fill();
  ctx.strokeStyle = '#6b6f75';
  ctx.lineWidth = 1;
  ctx.stroke();
  // 胴体
  const bg = ctx.createRadialGradient(-8, -8, 4, 0, 0, 30);
  bg.addColorStop(0, '#eceef0');
  bg.addColorStop(0.55, '#b9bdc2');
  bg.addColorStop(1, '#83878d');
  ctx.beginPath();
  ctx.ellipse(0, 0, 26, 22, 0, 0, TAU);
  ctx.fillStyle = bg;
  ctx.fill();
  ctx.strokeStyle = '#63676d';
  ctx.lineWidth = 1.2;
  ctx.stroke();
  // ふた
  ctx.beginPath();
  ctx.ellipse(0, 0, 13, 11, 0, 0, TAU);
  const lg = ctx.createRadialGradient(-4, -4, 1, 0, 0, 13);
  lg.addColorStop(0, '#f2f4f6');
  lg.addColorStop(1, '#9da1a7');
  ctx.fillStyle = lg;
  ctx.fill();
  ctx.strokeStyle = '#6b6f75';
  ctx.lineWidth = 1;
  ctx.stroke();
  // つまみ
  ctx.beginPath();
  ctx.arc(0, 0, 3.4, 0, TAU);
  ctx.fillStyle = '#3c3f44';
  ctx.fill();
  // 取っ手(胴体をまたぐアーチを上から見た形)
  ctx.beginPath();
  ctx.ellipse(0, 0, 20, 24, 0, Math.PI * 0.62, Math.PI * 1.38);
  ctx.strokeStyle = 'rgba(45,42,40,0.9)';
  ctx.lineWidth = 4.4;
  ctx.stroke();
  ctx.restore();

  // 注ぎ口からのかすかな湯気は update 側で emit
  return { sx, sy };
}

/* ---------------- 効果音(Web Audio・全て合成) ---------------- */
const audio = {
  ctx: null, master: null,
  pour: null,          // {gLow, gMid, gHi, bpMid, turbG}
  windGain: null,
  nextBird: 6,
  nextBubble: 0,
  nextDrift: 0,
  ready: false
};

function initAudio() {
  if (audio.ready) return;
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) return;
  const c = new AC();
  audio.ctx = c;
  audio.master = c.createGain();
  audio.master.gain.value = muted ? 0 : 1;
  audio.master.connect(c.destination);

  // 使い回すノイズバッファ(2秒)
  const len = c.sampleRate * 2;
  const buf = c.createBuffer(1, len, c.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  audio.noiseBuf = buf;

  // --- お湯を注ぐ音: 2帯域のノイズ + 乱流ゆらぎ(ちょろちょろとした細い注ぎ) ---
  // 低域=水の量感(ごく控えめ) / 中域=ちょろちょろの本体(高め・細め)
  const mkNoise = (rate) => {
    const s = c.createBufferSource();
    s.buffer = buf; s.loop = true;
    if (rate) s.playbackRate.value = rate;
    return s;
  };
  const src = mkNoise();
  const lpLow = c.createBiquadFilter();
  lpLow.type = 'lowpass'; lpLow.frequency.value = 420;
  const bpMid = c.createBiquadFilter();
  bpMid.type = 'bandpass'; bpMid.frequency.value = 1700; bpMid.Q.value = 0.9;
  const gLow = c.createGain(), gMid = c.createGain();
  gLow.gain.value = 0; gMid.gain.value = 0;
  src.connect(lpLow); lpLow.connect(gLow); gLow.connect(audio.master);
  src.connect(bpMid); bpMid.connect(gMid); gMid.connect(audio.master);
  src.start();
  // 乱流: 超低速ノイズで中域の音量を揺らし、一定のシャーではなくバシャバシャ感を出す
  const turb = mkNoise(0.05);
  const turbLp = c.createBiquadFilter();
  turbLp.type = 'lowpass'; turbLp.frequency.value = 10;   // 細い流れの速いゆらぎ
  const turbG = c.createGain();
  turbG.gain.value = 0;
  turb.connect(turbLp); turbLp.connect(turbG); turbG.connect(gMid.gain);
  turb.start();
  audio.pour = { gLow, gMid, bpMid, turbG };

  // --- そよ風(ごく小さく) ---
  const wsrc = c.createBufferSource();
  wsrc.buffer = buf; wsrc.loop = true;
  wsrc.playbackRate.value = 0.4;
  const wlp = c.createBiquadFilter();
  wlp.type = 'lowpass'; wlp.frequency.value = 320;
  const wg = c.createGain();
  wg.gain.value = 0.012;
  const lfo = c.createOscillator();
  lfo.frequency.value = 0.06;
  const lfoG = c.createGain();
  lfoG.gain.value = 0.008;
  lfo.connect(lfoG); lfoG.connect(wg.gain);
  lfo.start();
  wsrc.connect(wlp); wlp.connect(wg); wg.connect(audio.master);
  wsrc.start();
  audio.windGain = wg;

  audio.ready = true;
}

// ユーザージェスチャの中で呼ぶ。タッチでは pointerdown が activation にならない
// ブラウザがあるため、pointerup 側からも呼んで確実に解錠する。
// iOS の割り込みで 'interrupted'(非標準state)になる場合もあるので running 以外は resume を試す。
function unlockAudio() {
  initAudio();
  if (audio.ctx && audio.ctx.state !== 'running') {
    const p = audio.ctx.resume();
    if (p && p.catch) p.catch(() => {});
  }
}

function setPouringSound(on) {
  if (!audio.ready) return;
  const c = audio.ctx, now = c.currentTime;
  const P = audio.pour;
  const set = (param, v, tc) => {
    param.cancelScheduledValues(now);
    param.setValueAtTime(param.value, now);
    param.setTargetAtTime(v, now, tc);
  };
  if (on) {
    set(P.gLow.gain, 0.014, 0.05);
    set(P.gMid.gain, 0.032, 0.04);
    set(P.turbG.gain, 0.016, 0.05);
    // 注ぎ始めの小さな「ちょろっ」という立ち上がり
    const burst = c.createBufferSource();
    burst.buffer = audio.noiseBuf;
    burst.playbackRate.value = rnd(0.9, 1.1);
    const bf = c.createBiquadFilter();
    bf.type = 'bandpass'; bf.frequency.value = 1000; bf.Q.value = 0.6;
    const bg = c.createGain();
    bg.gain.setValueAtTime(0.0001, now);
    bg.gain.exponentialRampToValueAtTime(0.04, now + 0.03);
    bg.gain.exponentialRampToValueAtTime(0.0008, now + 0.2);
    burst.connect(bf); bf.connect(bg); bg.connect(audio.master);
    burst.start(now); burst.stop(now + 0.25);
  } else {
    set(P.gLow.gain, 0, 0.09);
    set(P.gMid.gain, 0, 0.18);   // 少しだけ余韻を残して切る
    set(P.turbG.gain, 0, 0.1);
  }
}

function bubbleBlip() {
  if (!audio.ready || muted) return;
  const c = audio.ctx, now = c.currentTime;
  const o = c.createOscillator();
  const g = c.createGain();
  // 実際の水泡は弾ける瞬間に音程が「上がる」。細い流れなので小さく高い泡
  const f = rnd(380, 1050);
  const dur = rnd(0.04, 0.1);
  o.type = 'sine';
  o.frequency.setValueAtTime(f, now);
  o.frequency.exponentialRampToValueAtTime(f * rnd(1.5, 2.3), now + rnd(0.03, 0.08));
  g.gain.setValueAtTime(0, now);
  g.gain.linearRampToValueAtTime(rnd(0.007, 0.02), now + 0.006);
  g.gain.exponentialRampToValueAtTime(0.0006, now + dur);
  o.connect(g); g.connect(audio.master);
  o.start(now); o.stop(now + dur + 0.03);
}

function birdChirp() {
  if (!audio.ready || muted) return;
  const c = audio.ctx;
  let t = c.currentTime + 0.02;
  const pan = c.createStereoPanner ? c.createStereoPanner() : null;
  const out = pan || audio.master;
  if (pan) { pan.pan.value = rnd(-0.8, 0.8); pan.connect(audio.master); }
  const syllables = irnd(2, 4);
  const base = rnd(2400, 4100);
  for (let i = 0; i < syllables; i++) {
    const o = c.createOscillator();
    const g = c.createGain();
    const f0 = base * rnd(0.9, 1.12);
    const dur = rnd(0.06, 0.13);
    o.type = 'sine';
    o.frequency.setValueAtTime(f0, t);
    o.frequency.exponentialRampToValueAtTime(f0 * rnd(0.7, 1.4), t + dur);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(rnd(0.012, 0.03), t + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0006, t + dur);
    o.connect(g); g.connect(out);
    o.start(t); o.stop(t + dur + 0.02);
    t += dur + rnd(0.03, 0.1);
  }
}

function unlockChime() {
  // 新種解放のお知らせ。やわらかいペンタトニックの3音
  if (!audio.ready || muted) return;
  const c = audio.ctx;
  const t = c.currentTime + 0.03;
  const notes = [523.25, 659.25, 783.99];   // C5 → E5 → G5
  notes.forEach((f, i) => {
    const t0 = t + i * 0.16;
    for (const [mult, amp] of [[1, 0.045], [2, 0.012]]) {   // 基音+かすかな倍音
      const o = c.createOscillator();
      const g = c.createGain();
      o.type = 'sine';
      o.frequency.value = f * mult;
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(amp, t0 + 0.04);   // 角の立たない立ち上がり
      g.gain.exponentialRampToValueAtTime(0.0005, t0 + 0.9);
      o.connect(g);
      g.connect(audio.master);
      o.start(t0);
      o.stop(t0 + 1);
    }
  });
}

function startCrumble(w) {
  w.removing = true;
  w.crumbleTimer = 0;
  emitFlakes(w);
  crumblePoof();
}

function crumblePoof() {
  // 枯れ草がホロッと崩れる、やわらかい音
  if (!audio.ready || muted) return;
  const c = audio.ctx, now = c.currentTime;
  const src = c.createBufferSource();
  src.buffer = audio.noiseBuf;
  src.playbackRate.value = rnd(0.5, 0.7);        // 低めでやわらかく
  const lp = c.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 1100;
  const g = c.createGain();
  g.gain.setValueAtTime(0.0001, now);
  g.gain.linearRampToValueAtTime(0.028, now + 0.03);   // パチンではなく、ふわっと立ち上がる
  g.gain.exponentialRampToValueAtTime(0.0008, now + rnd(0.28, 0.4));
  src.connect(lp); lp.connect(g); g.connect(audio.master);
  src.start(now); src.stop(now + 0.45);
}

function applyMute() {
  elMute.textContent = muted ? '🔇' : '🔊';
  if (audio.ready) {
    const g = audio.master.gain;
    const now = audio.ctx.currentTime;
    g.cancelScheduledValues(now);
    g.setValueAtTime(g.value, now);   // 現在値を起点にしないとランプが瞬時ジャンプになる
    g.linearRampToValueAtTime(muted ? 0 : 1, now + 0.15);
  }
}

elMute.addEventListener('click', () => {

// コレクションのアイコン: グローバルのctxを一時差し替えてdrawWeedを使い回す
function renderTypeIcon(cnv, typeKey) {
  const scale = 2;
  cnv.width = 72 * scale;
  cnv.height = 72 * scale;
  const ic = cnv.getContext('2d');
  ic.setTransform(scale, 0, 0, scale, 0, 0);
  const mainCtx = ctx;
  ctx = ic;
  try {
    const t = WEED_TYPES[typeKey];
    const w = makeWeed(36, 38, typeKey, { size: clamp(30 / t.leafLen[1], 0.5, 1) });
    w.hasFlower = ['dokudami', 'katabami', 'clover', 'sumire', 'tsuyukusa'].includes(typeKey);
    drawWeed(w, 0);
  } finally {
    ctx = mainCtx;
  }
}

function buildBook() {
  // 累計はここで見せる(HUDは次の新種までのカウント)
  const done = Object.keys(WEED_TYPES).every((k) => totalKilled >= WEED_TYPES[k].unlockAt);
  document.getElementById('bookNext').textContent =
    L.killed(totalKilled) + (done ? ' — ' + L.allUnlocked : '');

  const grid = document.getElementById('bookGrid');
  grid.innerHTML = '';
  for (const key in WEED_TYPES) {
    const t = WEED_TYPES[key];
    const unlocked = totalKilled >= t.unlockAt;
    const card = document.createElement('div');
    card.className = 'card' + (unlocked ? '' : ' locked');
    if (unlocked) {
      const n = killsByType[key] || 0;
      card.innerHTML = `<div class="nm">${L.names[key] || t.name}</div><div class="ct">${L.cleared(n)}</div>`;
      const cnv = document.createElement('canvas');
      card.insertBefore(cnv, card.firstChild);
      renderTypeIcon(cnv, key);
    } else {
      card.innerHTML = `<div class="q">❓</div><div class="nm">???</div><div class="ct">${L.unlockAt(t.unlockAt)}</div>`;
    }
    grid.appendChild(card);
  }
}

/* ---------------- 時間・1日サイクル ---------------- */
const DAY_LEN = 30;              // 現実30秒 = ゲーム内1日
const CRUMBLE_FADE = 0.5;        // タップされた枯れ草が崩れて消えるまでの秒数
let elapsed = 0;
let day = 1;
let spawnTimer = rnd(2, 5);

function dayTint() {
  const t = (elapsed % DAY_LEN) / DAY_LEN;
  // 朝焼け → 昼 → 夕焼け → 短い夜
  let color = null, alpha = 0;
  if (t < 0.12) { color = '255,185,120'; alpha = 0.09 * (1 - t / 0.12); }
  else if (t > 0.68 && t <= 0.86) {
    const k = (t - 0.68) / 0.18;
    color = '255,150,85'; alpha = 0.11 * Math.sin(k * Math.PI);
  } else if (t > 0.86) {
    const k = (t - 0.86) / 0.14;
    color = '55,72,120'; alpha = 0.16 * Math.sin(k * Math.PI);
  }
  if (color && alpha > 0.004) {
    ctx.fillStyle = `rgba(${color},${alpha.toFixed(3)})`;
    ctx.fillRect(0, 0, W, H);
  }
}

/* ---------------- 更新 ---------------- */
function update(dt, time) {
  elapsed += dt;
  const newDay = Math.floor(elapsed / DAY_LEN) + 1;
  if (newDay !== day) {
    day = newDay;
    // 一晩経つとまた生えてくる(放置しても庭が飽和しない程度に)
    if (weeds.length < Math.min(weedTargetCount() * 1.2, MAX_WEEDS)) {
      const n = irnd(2, 4);
      for (let i = 0; i < n; i++) {
        if (weeds.length && Math.random() < 0.8) {
          spawnWeed({ near: weeds[irnd(0, weeds.length - 1)] });
        } else {
          spawnWeed({});
        }
      }
    }
    if (Math.random() < 0.7) birdChirp();
  }

  // 自然発生
  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    spawnTimer = rnd(0.8, 2.0);
    const target = weedTargetCount();
    if (weeds.length < target && Math.random() < 1.15 - weeds.length / target) {
      // 群生しがち: 多くは既存の株の近くから生えてくる
      if (weeds.length && Math.random() < 0.8) {
        spawnWeed({ near: weeds[irnd(0, weeds.length - 1)] });
      } else {
        spawnWeed({});
      }
    }
  }

  // ドクダミの根からの復活
  for (let i = roots.length - 1; i >= 0; i--) {
    const r = roots[i];
    r.timer -= dt;
    if (r.timer <= 0) {
      roots.splice(i, 1);
      spawnWeed({ x: r.x, y: r.y, type: 'dokudami', rootHp: r.hp });
    }
  }

  // お湯を注ぐ
  if (pour.active) {
    // 熱を加える。お湯の着地点はやかん(指)の少し先
    for (const w of weeds) {
      const R = 36 + w.radius() * 0.4;
      const dx = w.x - pour.tx, dy = w.y - pour.ty;
      const d2 = dx * dx + dy * dy;
      if (w.wither >= 1) {
        // 枯れ草はお湯がかかっても、指(やかん)で直接つついても片付く
        if (!w.removing) {
          const dxf = w.x - pour.x, dyf = w.y - pour.y;
          if (d2 < R * R || dxf * dxf + dyf * dyf < R * R) startCrumble(w);
        }
        continue;
      }
      if (d2 < R * R) {
        const fall = 1 - Math.sqrt(d2) / R;
        w.scald = Math.min(w.scald + dt * 1.15 * fall, 2.2);
        // ドクダミは根まで火が通った瞬間、湯気がブワッと立つ(復活しない合図)
        if (w.type === 'dokudami' && !w.rootCooked && w.scald >= 1.7) {
          w.rootCooked = true;
          emitSteamBurst(w.x, w.y, 12);
        }
      }
    }
    // 濡れ・水しぶき・湯気・輪
    wetTimer -= dt;
    if (wetTimer <= 0) { wetTimer = 0.07; addWet(pour.tx, pour.ty); }
    emitSplash(pour.tx, pour.ty, dt);
    emitSteam(pour.tx, pour.ty, 15, dt);
    ringTimer -= dt;
    if (ringTimer <= 0) {
      ringTimer = 0.15;
      rings.push({ x: pour.tx, y: pour.ty, age: 0, life: 0.5 });
    }
    // ぽこぽこ音(たまに連泡)
    audio.nextBubble -= dt;
    if (audio.nextBubble <= 0) {
      audio.nextBubble = rnd(0.04, 0.14);
      bubbleBlip();
      if (Math.random() < 0.3) bubbleBlip();
    }
    // 水流の当たり方が変わる感じ(中域の中心周波数をゆっくり彷徨わせる)
    audio.nextDrift -= dt;
    if (audio.nextDrift <= 0 && audio.ready) {
      audio.nextDrift = rnd(0.2, 0.4);
      audio.pour.bpMid.frequency.setTargetAtTime(rnd(1400, 2200), audio.ctx.currentTime, 0.15);
    }
  }
  if (lingering) {
    lingering.ttl -= dt;
    emitSteam(lingering.x, lingering.y, 6 * clamp(lingering.ttl / 2.4, 0, 1), dt);
    if (lingering.ttl <= 0) lingering = null;
  }

  // 雑草の成長と枯れ
  for (let i = weeds.length - 1; i >= 0; i--) {
    const w = weeds[i];
    const t = WEED_TYPES[w.type];
    if (w.age < 10) w.age += dt;

    // 見た目の色変化はワンテンポ遅れてついてくる
    w.visualScald += (clamp(w.scald, 0, 1) - w.visualScald) * Math.min(1, dt * 1.6);

    if (w.removing) {
      w.crumbleTimer += dt;
      if (w.crumbleTimer >= CRUMBLE_FADE) {
        if (w.type === 'dokudami' && !w.rootCooked && w.rootHp > 0) {
          // 根が生き残った → しばらくして復活
          roots.push({ x: w.x, y: w.y, timer: rnd(14, 28), hp: w.rootHp - 1 });
        }
        weeds.splice(i, 1);
        const prev = totalKilled;
        totalKilled++;
        killedThisSession++;
        killsByType[w.type] = (killsByType[w.type] || 0) + 1;
        saveLS('oyu_totalKilled', totalKilled);
        saveLS('oyu_killsByType', killsByType);
        // 除草数に応じて新種が解放される
        for (const key in WEED_TYPES) {
          const tt = WEED_TYPES[key];
          if (tt.unlockAt > 0 && prev < tt.unlockAt && totalKilled >= tt.unlockAt) {
            showToast(L.unlockToast(L.names[key] || tt.name));
            unlockChime();
            for (let s = 0; s < 2; s++) spawnWeed({ type: key });
          }
        }
        updateHud();
        continue;
      }
    } else if (w.wither >= 1) {
      // 枯れ草としてその場に残る。タップ(お湯がかかる)と崩れる
    } else if (w.scald >= t.scaldThreshold) {
      // 枯れが進行(たっぷりかけた葉ほど早く、大株ほどしぶとい)
      const strength = 0.4 + 0.6 * clamp(w.scald, 0, 1.5) / 1.5;
      w.wither = Math.min(1, w.wither + dt * strength / (t.witherDur * (0.7 + 0.45 * w.size)));
      if (w.wither >= 1 && !huskHintShown) {
        huskHintShown = true;
        showToast(L.huskHint);
      }
    } else {
      // 少ししかかかっていない葉はゆっくり回復する
      w.scald = Math.max(0, w.scald - dt * 0.02);
      if (w.wither < 0.15) w.wither = Math.max(0, w.wither - dt * 0.004);
    }

  }

  // 鳥のさえずり
  if (audio.ready && !muted) {
    audio.nextBird -= dt;
    if (audio.nextBird <= 0) {
      audio.nextBird = rnd(9, 22);
      birdChirp();
    }
  }

  fadeWet(dt);
  updateParticles(dt, time);
}

/* ---------------- 描画 ---------------- */
/* 見た目が変化しない草(大半)はオフスクリーンにキャッシュして、
   毎フレームは「動いている草」だけを描く。これで数百本でも軽い。 */
let weedLayer = null, weedLayerCtx = null, weedLayerDirty = true;

function isDynamicWeed(w) {
  if (w.removing || w.age < 2.4) return true;   // 崩れ中・生えたてのフェードイン中
  if (w.wither >= 1) return false;              // 枯れ草は見た目が固定
  return w.wither > 0 || w.scald > 0.004 || w.visualScald > 0.004;
}

function rebuildWeedLayer() {
  const pw = Math.max(1, Math.round(W * RES));
  const ph = Math.max(1, Math.round(H * RES));
  if (!weedLayer || weedLayer.width !== pw || weedLayer.height !== ph) {
    weedLayer = document.createElement('canvas');
    weedLayer.width = pw;
    weedLayer.height = ph;
    weedLayerCtx = weedLayer.getContext('2d');
  }
  weedLayerCtx.setTransform(1, 0, 0, 1, 0, 0);
  weedLayerCtx.clearRect(0, 0, pw, ph);
  weedLayerCtx.setTransform(RES, 0, 0, RES, 0, 0);
  const mainCtx = ctx;
  ctx = weedLayerCtx;
  try {
    for (const w of weeds) {
      if (!isDynamicWeed(w)) drawWeed(w, 0);
    }
  } finally {
    ctx = mainCtx;
  }
  weedLayerDirty = false;
}

function render(time) {
  drawGravel();   // 不透明の全面描画なのでclearRectは不要
  if (wetActive) {
    ctx.save();
    ctx.globalAlpha = 0.55;
    ctx.drawImage(wetCanvas, 0, 0, W, H);
    ctx.restore();
  }

  // 雑草(手前が上に重なるようyでソート)
  weeds.sort((a, b) => a.y - b.y);
  for (const w of weeds) {
    const dyn = isDynamicWeed(w);
    if (w._dyn !== dyn) { w._dyn = dyn; weedLayerDirty = true; }
  }
  if (weedLayerDirty ||
      !weedLayer ||
      weedLayer.width !== Math.max(1, Math.round(W * RES)) ||
      weedLayer.height !== Math.max(1, Math.round(H * RES))) {
    rebuildWeedLayer();
  }
  ctx.drawImage(weedLayer, 0, 0, W, H);
  for (const w of weeds) {
    if (w._dyn) drawWeed(w, time);
  }

  drawParticles();
  if (pour.active) drawKettle(time);

  dayTint();
  ctx.drawImage(vignetteCanvas, 0, 0, W, H);
}

function updateHud() {
  elDay.textContent = L.day(day);
  // 右上には「次の新種まであと何本」を出す(累計は図鑑で見られる)
  let nextAt = Infinity;
  for (const key in WEED_TYPES) {
    const ua = WEED_TYPES[key].unlockAt;
    if (ua > totalKilled && ua < nextAt) nextAt = ua;
  }
  elCount.textContent = nextAt === Infinity ? L.hudComplete : L.nextUnlock(nextAt - totalKilled);
}

/* ---------------- メインループ ---------------- */
let lastTime = 0;
function frame(ms) {
  const time = ms / 1000;
  let dt = time - lastTime;
  lastTime = time;
  if (dt > 0.1) dt = 0.1;      // タブ復帰などの巨大なdtを抑制
  if (dt > 0) {
    const prevDay = day;
    update(dt, time);
    if (day !== prevDay) updateHud();
    render(time);
  }
  requestAnimationFrame(frame);
}

/* ---------------- リサイズ ---------------- */
function resize() {
  const oldW = W, oldH = H;
  W = window.innerWidth / ZOOM;
  H = window.innerHeight / ZOOM;
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  RES = DPR * ZOOM;
  canvas.width = Math.max(1, Math.round(window.innerWidth * DPR));
  canvas.height = Math.max(1, Math.round(window.innerHeight * DPR));
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.setTransform(RES, 0, 0, RES, 0, 0);
  buildVignette();
  weedLayerDirty = true;
  if (oldW > 0 && oldH > 0) {
    const fx = W / oldW, fy = H / oldH;
    for (const w of weeds) { w.x *= fx; w.y *= fy; }
    for (const r of roots) { r.x *= fx; r.y *= fy; }
  }
  if (!gravelCanvas || !wetCanvas) {
    // 初回だけ即時生成
    buildGravel();
    buildWet();
  } else {
    // 砂利の全再生成は重い(大画面で数百ms)ので、ドラッグリサイズ中は走らせない
    scheduleRebuild();
  }
}
let rebuildTimer = 0;
function scheduleRebuild() {
  clearTimeout(rebuildTimer);
  rebuildTimer = setTimeout(() => {
    if (needGravelRebuild()) buildGravel();
    if (wetCanvas.width !== Math.max(1, Math.round(W * RES)) ||
        wetCanvas.height !== Math.max(1, Math.round(H * RES))) buildWet();
  }, 220);
}
let resizeQueued = false;
window.addEventListener('resize', () => {
  if (resizeQueued) return;
  resizeQueued = true;
  requestAnimationFrame(() => { resizeQueued = false; resize(); });
});

document.addEventListener('visibilitychange', () => {
  if (!audio.ctx) return;
  if (document.hidden) {
    const p = audio.ctx.suspend();
    if (p && p.catch) p.catch(() => {});
  } else if (!muted && audio.ctx.state !== 'running') {
    const p = audio.ctx.resume();
    if (p && p.catch) p.catch(() => {});
  }
});

/* ---------------- 開始 ---------------- */
buildSteamSprite();
buildStoneSprites();
resize();
initGarden();
applyLocale();
applyMute();
updateHud();
if (!loadLS('oyu_onboarded', false)) {
  // 初回だけ、かんたんなオンボーディング(ゴール込み)を表示
  openPanel('onboard');
} else {
  // 2回目以降は軽いトースト案内だけ
  pourGuideActive = true;
  showToast(L.pourGuide, 9000);
}
requestAnimationFrame((ms) => { lastTime = ms / 1000; requestAnimationFrame(frame); });
</script>
</body>
