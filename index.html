const TAU = Math.PI * 2;
const rnd   = (a = 1, b) => (b === undefined ? Math.random() * a : a + Math.random() * (b - a));
const irnd  = (a, b) => Math.floor(rnd(a, b + 1));
const clamp = (v, a, b) => (v < a ? a : v > b ? b : v);
const lerp  = (a, b, t) => a + (b - a) * t;

function loadLS(key, fallback) {
  try { const v = localStorage.getItem(key); return v === null ? fallback : JSON.parse(v); }
  catch (e) { return fallback; }
}
function saveLS(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
}

/* ---------------- 砂利の背景 ---------------- */
let gravelCanvas = null;
let vignetteCanvas = null;
let gravelCssW = 0, gravelCssH = 0, gravelRES = 0;
const GRAVEL_PAD = 160;   // URLバー伸縮などの小さなリサイズで模様が変わらないよう余白付きで生成

const hslStr = (h, s, l) => `hsl(${h},${s}%,${l}%)`;

// 暗いチャコールグレーの砕石パレット [色相, 彩度, 明度]
const STONE_PALETTE = [
  [215, 6, 32], [215, 5, 36], [210, 8, 40], [220, 8, 28],
  [210, 4, 44], [0, 0, 34], [0, 0, 30], [225, 10, 25],
  [210, 5, 48], [215, 7, 38], [0, 0, 42], [220, 6, 35],
  [210, 4, 27], [205, 5, 46]
];

/* 石はスプライトとして先に数種類描いておき、回転・拡縮でスタンプする。
   1個ずつパスを描くよりずっと速く、斑点などの質感も入れられる。 */
let stoneSprites = [];
const STONE_R = 23;   // スプライト内の石の基本半径(64px canvas内)

function buildStoneSprites() {
  stoneSprites = [];
  for (let s = 0; s < 14; s++) {
    const c = document.createElement('canvas');
    c.width = c.height = 64;
    const g = c.getContext('2d');
    const [h, sa, l] = STONE_PALETTE[s % STONE_PALETTE.length];
    const cx = 32, cy = 32, r = STONE_R;
    // 角ばった砕石: 頂点少なめ・直線の多角形
    const n = irnd(5, 7), rot = rnd(TAU), ex = rnd(0.78, 1.25);
    const pts = [];
    for (let i = 0; i < n; i++) {
      const a = rot + (i / n) * TAU + rnd(-0.25, 0.25);
      const rr = r * rnd(0.6, 1.05);
      pts.push([cx + Math.cos(a) * rr * ex, cy + Math.sin(a) * rr]);
    }
    const path = () => {
      g.beginPath();
      g.moveTo(pts[0][0], pts[0][1]);
      for (let i = 1; i < n; i++) g.lineTo(pts[i][0], pts[i][1]);
      g.closePath();
    };
    // 左上からの光を想定した陰影(岩なのでコントラスト強め)
    const grad = g.createLinearGradient(cx - r, cy - r, cx + r, cy + r);
    grad.addColorStop(0, hslStr(h, sa, l + 11));
    grad.addColorStop(0.55, hslStr(h, sa, l));
    grad.addColorStop(1, hslStr(h, sa, Math.max(5, l - 11)));
    path();
    g.fillStyle = grad;
    g.fill();
    // 破断面のファセット(重心と辺で作る三角形に明暗を差す)
    g.save();
    path();
    g.clip();
    const f0 = irnd(0, n - 1);
    const facets = [[f0, 'rgba(255,255,255,0.12)'], [(f0 + 2) % n, 'rgba(0,0,0,0.22)']];
    for (const [fi, col] of facets) {
      g.beginPath();
      g.moveTo(cx + rnd(-2, 2), cy + rnd(-2, 2));
      g.lineTo(pts[fi][0], pts[fi][1]);
      g.lineTo(pts[(fi + 1) % n][0], pts[(fi + 1) % n][1]);
      g.closePath();
      g.fillStyle = col;
      g.fill();
    }
    // 岩肌の粒(細かい粒を密に。石英っぽい明るい粒も少し混ぜる)
    for (let i = 0; i < 110; i++) {
      const dl = rnd(-14, 14);
      g.fillStyle = i % 9 === 0
        ? `hsla(${h},${Math.min(20, sa + 8)}%,${clamp(l + 26, 30, 92)}%,${rnd(0.18, 0.3).toFixed(2)})`
        : `hsla(${h},${sa}%,${clamp(l + dl, 4, 90)}%,${rnd(0.1, 0.24).toFixed(2)})`;
      g.fillRect(cx + rnd(-r, r) * ex, cy + rnd(-r, r), rnd(0.5, 1.2), rnd(0.5, 1.2));
    }
    // 微細なヒビ(短い折れ線を数本)
    for (let i = 0; i < irnd(1, 3); i++) {
      let px2 = cx + rnd(-r * 0.6, r * 0.6), py2 = cy + rnd(-r * 0.6, r * 0.6);
      let ca = rnd(TAU);
      g.strokeStyle = `rgba(10,10,14,${rnd(0.14, 0.26).toFixed(2)})`;
      g.lineWidth = rnd(0.5, 0.8);
      g.beginPath();
      g.moveTo(px2, py2);
      for (let s2 = 0; s2 < irnd(2, 4); s2++) {
        ca += rnd(-0.9, 0.9);
        px2 += Math.cos(ca) * rnd(3, 7);
        py2 += Math.sin(ca) * rnd(3, 7);
        g.lineTo(px2, py2);
      }
      g.stroke();
    }
    g.restore();
    // 縁を締める
    path();
    g.strokeStyle = 'rgba(8,10,12,0.5)';
    g.lineWidth = 1.3;
    g.stroke();
    // 左上を向く辺にだけ細いリムライト(光の向きをそろえる)
    g.lineWidth = 1;
    g.strokeStyle = 'rgba(255,252,240,0.28)';
    for (let i = 0; i < n; i++) {
      const p1 = pts[i], p2 = pts[(i + 1) % n];
      const mx = (p1[0] + p2[0]) / 2 - cx, my = (p1[1] + p2[1]) / 2 - cy;
      if (mx + my < -r * 0.35) {   // 辺の中点が左上側
        g.beginPath();
        g.moveTo(p1[0], p1[1]);
        g.lineTo(p2[0], p2[1]);
        g.stroke();
      }
    }
    stoneSprites.push(c);
  }
}

function buildGravel() {
  gravelCssW = W + GRAVEL_PAD;
  gravelCssH = H + GRAVEL_PAD;
  gravelRES = RES;
  gravelCanvas = document.createElement('canvas');
  gravelCanvas.width = Math.max(1, Math.round(gravelCssW * RES));
  gravelCanvas.height = Math.max(1, Math.round(gravelCssH * RES));
  const g = gravelCanvas.getContext('2d');
  g.setTransform(RES, 0, 0, RES, 0, 0);

  g.fillStyle = '#473a2c';           // 石の間からのぞく土
  g.fillRect(0, 0, gravelCssW, gravelCssH);
  // 土の色むら(乾いたところ・湿ったところ)
  for (let n = 0; n < (gravelCssW * gravelCssH) / 8000; n++) {
    g.fillStyle = Math.random() < 0.5 ? 'rgba(90,70,48,0.25)' : 'rgba(40,30,18,0.3)';
    g.beginPath();
    g.arc(rnd(gravelCssW), rnd(gravelCssH), rnd(4, 11), 0, TAU);
    g.fill();
  }

  const cell = 10;   // 細かめの砕石
  const cols = Math.ceil(gravelCssW / cell) + 2;
  const rows = Math.ceil(gravelCssH / cell) + 2;
  for (let j = 0; j < rows; j++) {
    for (let i = 0; i < cols; i++) {
      const x = (i - 0.5) * cell + rnd(-3, 3);
      const y = (j - 0.5) * cell + rnd(-3, 3);
      const spr = stoneSprites[irnd(0, stoneSprites.length - 1)];
      const big = Math.random() < 0.025;
      const sc = big ? rnd(0.45, 0.62) : rnd(0.28, 0.4);
      // 影(土に落ちる影なので暖色寄り。右下へ少し長めに=石どうしの隙間が深く見える)
      g.beginPath();
      g.ellipse(x + 1.6, y + 2.2, STONE_R * sc * 1.15, STONE_R * sc * 1.0, 0, 0, TAU);
      g.fillStyle = 'rgba(22,15,8,0.5)';
      g.fill();
      // 光の向きが揃うよう回転は控えめに、縦横比だけ揺らす
      g.save();
      g.translate(x, y);
      g.rotate(rnd(-0.6, 0.6));
      g.scale(sc * rnd(0.85, 1.2), sc);
      g.drawImage(spr, -32, -32);
      g.restore();
      // たまに土汚れ・うっすらコケの色が付いた石を混ぜる(色の単調さを崩す)
      const tint = Math.random();
      if (tint < 0.14) {
        g.fillStyle = `rgba(107,84,58,${rnd(0.08, 0.15).toFixed(2)})`;
        g.beginPath();
        g.ellipse(x + rnd(-2, 2), y + rnd(-2, 2), STONE_R * sc * 0.85, STONE_R * sc * 0.7, rnd(TAU), 0, TAU);
        g.fill();
      } else if (tint < 0.19) {
        g.fillStyle = `rgba(96,112,64,${rnd(0.06, 0.11).toFixed(2)})`;
        g.beginPath();
        g.ellipse(x + rnd(-2, 2), y + rnd(-2, 2), STONE_R * sc * 0.7, STONE_R * sc * 0.55, rnd(TAU), 0, TAU);
        g.fill();
      }
    }
  }
  // すき間を小石で埋める(土はほんの少し覗く程度に)
  for (let n = 0; n < (gravelCssW * gravelCssH) / 300; n++) {
    const spr = stoneSprites[irnd(0, stoneSprites.length - 1)];
    const sc = rnd(0.16, 0.26);
    g.save();
    g.translate(rnd(gravelCssW), rnd(gravelCssH));
    g.rotate(rnd(-0.6, 0.6));
    g.scale(sc * rnd(0.85, 1.2), sc);
    g.drawImage(spr, -32, -32);
    g.restore();
  }

  // 地面のうねり(ゆるい明暗のむら)
  const patches = Math.round((gravelCssW * gravelCssH) / 60000);
  for (let n = 0; n < patches; n++) {
    const px = rnd(gravelCssW), py = rnd(gravelCssH), pr = rnd(50, 150);
    const grd = g.createRadialGradient(px, py, 0, px, py, pr);
    grd.addColorStop(0, Math.random() < 0.5 ? 'rgba(32,22,12,0.12)' : 'rgba(255,242,220,0.06)');
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    g.fillStyle = grd;
    g.beginPath();
    g.arc(px, py, pr, 0, TAU);
    g.fill();
  }
  // 細かい砂粒・土くれ
  for (let n = 0; n < (gravelCssW * gravelCssH) / 900; n++) {
    const r = Math.random();
    g.fillStyle = r < 0.35 ? 'rgba(250,250,252,.13)' :
                  r < 0.7 ? 'rgba(190,160,120,.18)' : 'rgba(28,20,12,.28)';
    g.fillRect(rnd(gravelCssW), rnd(gravelCssH), rnd(1, 1.8), rnd(1, 1.8));
  }
  // 全面に粒状ノイズを焼き込む(写真っぽいザラつき。デバイスピクセル単位)
  const noise = document.createElement('canvas');
  noise.width = noise.height = 128;
  const nc = noise.getContext('2d');
  const nd = nc.createImageData(128, 128);
  for (let i = 0; i < nd.data.length; i += 4) {
    const v = 128 + (Math.random() - 0.5) * 90;
    nd.data[i] = nd.data[i + 1] = nd.data[i + 2] = v;
    nd.data[i + 3] = 255;
  }
  nc.putImageData(nd, 0, 0);
  g.save();
  g.setTransform(1, 0, 0, 1, 0, 0);
  g.globalCompositeOperation = 'overlay';
  g.globalAlpha = 0.14;
  g.fillStyle = g.createPattern(noise, 'repeat');
  g.fillRect(0, 0, gravelCanvas.width, gravelCanvas.height);
  g.restore();
}

function needGravelRebuild() {
  return !gravelCanvas || gravelRES !== RES || W > gravelCssW || H > gravelCssH;
}

// 生成済みの砂利から表示域を切り出す(生成が追いつくまでは引き伸ばしで凌ぐ)
function drawGravel() {
  const sw = W * gravelRES, sh = H * gravelRES;
  if (sw <= gravelCanvas.width && sh <= gravelCanvas.height) {
    ctx.drawImage(gravelCanvas, 0, 0, sw, sh, 0, 0, W, H);
  } else {
    ctx.drawImage(gravelCanvas, 0, 0, gravelCanvas.width, gravelCanvas.height, 0, 0, W, H);
  }
}

function buildVignette() {
  vignetteCanvas = document.createElement('canvas');
  vignetteCanvas.width = Math.max(1, Math.round(W * RES));
  vignetteCanvas.height = Math.max(1, Math.round(H * RES));
  const v = vignetteCanvas.getContext('2d');
  v.setTransform(RES, 0, 0, RES, 0, 0);
  const grad = v.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.45, W / 2, H / 2, Math.max(W, H) * 0.78);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(20,13,7,0.22)');
  v.fillStyle = grad;
  v.fillRect(0, 0, W, H);
  // 斜めの日ざし: 左上がほんのり暖かく、右下がわずかに翳る(光源の向きを統一)
  const sun = v.createLinearGradient(0, 0, W, H);
  sun.addColorStop(0, 'rgba(255,240,205,0.07)');
  sun.addColorStop(0.5, 'rgba(255,240,205,0)');
  sun.addColorStop(1, 'rgba(18,26,44,0.07)');
  v.fillStyle = sun;
  v.fillRect(0, 0, W, H);
}

function midpoint(a, b) { return [(a[0] + b[0]) / 2, (a[1] + b[1]) / 2]; }

/* ---------------- 濡れた地面 ---------------- */
let wetCanvas = null, wetCtx = null;
let wetActive = false, wetLastAdd = -1e9, wetFadeAcc = 0;

function buildWet() {
  const old = wetCanvas;
  wetCanvas = document.createElement('canvas');
  wetCanvas.width = Math.max(1, Math.round(W * RES));
  wetCanvas.height = Math.max(1, Math.round(H * RES));
  wetCtx = wetCanvas.getContext('2d');
  wetCtx.setTransform(RES, 0, 0, RES, 0, 0);
  if (old && wetActive) {
    // リサイズしても濡れ跡を引き継ぐ(雑草座標と同じ比例スケール)
    wetCtx.save();
    wetCtx.setTransform(1, 0, 0, 1, 0, 0);
    wetCtx.drawImage(old, 0, 0, old.width, old.height, 0, 0, wetCanvas.width, wetCanvas.height);
    wetCtx.restore();
  }
}
function addWet(x, y) {
  const r = rnd(15, 24);
  const grad = wetCtx.createRadialGradient(x, y, 0, x, y, r);
  grad.addColorStop(0, 'rgba(32,20,10,0.5)');
  grad.addColorStop(1, 'rgba(32,20,10,0)');
  wetCtx.fillStyle = grad;
  wetCtx.beginPath();
  wetCtx.arc(x, y, r, 0, TAU);
  wetCtx.fill();
  wetActive = true;
  wetLastAdd = elapsed;
}
function fadeWet(dt) {
  if (!wetActive) return;
  // 毎フレームの極小アルファは8bit量子化で効かないため、まとめて減衰させる
  wetFadeAcc += dt / 14;
  if (wetFadeAcc >= 0.05) {
    wetCtx.save();
    wetCtx.setTransform(1, 0, 0, 1, 0, 0);
    wetCtx.globalCompositeOperation = 'destination-out';
    wetCtx.globalAlpha = Math.min(wetFadeAcc, 1);
    wetCtx.fillStyle = '#000';   // addWetのグラデーションが残っていると全面消去にならない
    wetCtx.fillRect(0, 0, wetCanvas.width, wetCanvas.height);
    wetCtx.restore();
    wetFadeAcc = 0;
  }
  if (elapsed - wetLastAdd > 28) {
    // 完全に乾いた: 量子化の残りかすを消して描画もスキップする
    wetCtx.save();
    wetCtx.setTransform(1, 0, 0, 1, 0, 0);
    wetCtx.clearRect(0, 0, wetCanvas.width, wetCanvas.height);
    wetCtx.restore();
    wetActive = false;
    wetFadeAcc = 0;
  }
}

const weeds = [];
const roots = [];       // ドクダミの生き残った根 {x, y, timer, hp}
let killedThisSession = 0;

function pickWeedType() {
  // 解放済みの種類だけから重み付きで選ぶ
  let total = 0;
  const avail = [];
  for (const key in WEED_TYPES) {
    const t = WEED_TYPES[key];
    if (totalKilled >= t.unlockAt) {
      avail.push([key, t.weight]);
      total += t.weight;
    }
  }
  let r = Math.random() * total;
  for (const [key, wgt] of avail) {
    r -= wgt;
    if (r <= 0) return key;
  }
  return avail[avail.length - 1][0];
}

function makeWeed(x, y, typeKey, opts = {}) {
  const t = WEED_TYPES[typeKey];
  const leafCount = irnd(t.leafCount[0], t.leafCount[1]);
  const leaves = [];
  for (let i = 0; i < leafCount; i++) {
    leaves.push({
      angle: (i / leafCount) * TAU + rnd(-0.35, 0.35),
      len: rnd(t.leafLen[0], t.leafLen[1]),
      width: rnd(t.leafWidth[0], t.leafWidth[1]),
      curve: rnd(-0.5, 0.5),
      shade: rnd(-5, 6),          // 葉ごとの明度ゆらぎ
      heatBias: rnd(0.75, 1.3)    // 葉ごとの枯れやすさ(不均一に枯れる)
    });
  }
  return {
    x, y, type: typeKey, leaves,
    // 草は成長しない。生えた時から完成サイズで、現れるときだけふわっとフェードイン
    size: opts.size !== undefined ? opts.size : rnd(0.75, 1.2),
    age: opts.size !== undefined ? 10 : 0,   // サイズ指定なし=新しく生えた草だけ演出する
    scald: 0, visualScald: 0, wither: 0,
    crumbleTimer: 0, removing: false, rootCooked: false,
    rootHp: typeKey === 'dokudami' ? (opts.rootHp !== undefined ? opts.rootHp : irnd(1, 2)) : 0,
    hasFlower: typeKey === 'dokudami' ? Math.random() < 0.55 :
               typeKey === 'katabami' ? Math.random() < 0.5 :
               typeKey === 'clover' ? Math.random() < 0.35 :
               typeKey === 'sumire' ? Math.random() < 0.8 :
               typeKey === 'tsuyukusa' ? Math.random() < 0.7 : false,
    swayPhase: rnd(TAU),
    radius() {
      let m = 0;
      for (const l of this.leaves) if (l.len > m) m = l.len;
      return m * this.size;
    }
  };
}

const MAX_WEEDS = 600;   // 放置の最終形態: 画面を覆い隠す超密林

function weedTargetCount() {
  // W,Hはワールド座標(ズーム後の見える範囲)。画面の7割くらいが草になる密度
  return clamp(Math.round((W * H) / 1700), 30, 140);
}

function spawnWeed(opts = {}) {
  if (weeds.length >= MAX_WEEDS && opts.x === undefined) return false;
  const margin = 20;
  const topMargin = 44;   // HUD(CSS表示)の下から。ワールド座標なのでZOOM分小さい
  for (let attempt = 0; attempt < 12; attempt++) {
    let x, y, type = opts.type;
    if (opts.x !== undefined) {
      x = opts.x + rnd(-8, 8);
      y = opts.y + rnd(-8, 8);
    } else if (opts.near) {
      // 群生: 既存の株のそばに、多くは同じ種類が生える。
      // 匍匐系は茎の先で根付くので、少し離れた場所に連なっていく
      const a = rnd(TAU);
      const d = opts.near.type === 'clover' ? rnd(8, 30) :    // シロツメクサは密なマット
                opts.near.type === 'koke' ? rnd(7, 22) :      // コケはべったり密着
                opts.near.type === 'katabami' ? rnd(14, 62) : // カタバミは広範囲に広がる
                rnd(10, 48);
      x = opts.near.x + Math.cos(a) * d;
      y = opts.near.y + Math.sin(a) * d;
      if (!type && Math.random() < 0.85) type = opts.near.type;
    } else {
      x = rnd(margin, W - margin);
      y = rnd(topMargin, H - margin);
    }
    let ok = x >= margin && x <= W - margin && y >= topMargin && y <= H - margin;
    if (ok && inDecoration(x, y)) ok = false;   // 苔石・池のまわりには生えない
    if (ok) {
      // 混み合ってきたら株間の制限を段階的に緩めて、密林化を止めない
      const crowded = weeds.length >= weedTargetCount();
      const jungle = weeds.length >= 300;
      const minD = jungle ? 5 : crowded ? 7 : 10;
      const closeLimit = jungle ? 30 : crowded ? 18 : 10;
      let close = 0;
      for (const w of weeds) {
        const dx = w.x - x, dy = w.y - y;
        const d2 = dx * dx + dy * dy;
        if (d2 < minD * minD) { ok = false; break; }
        if (d2 < 24 * 24) close++;
      }
      if (ok && close > closeLimit) ok = false;   // 1点に積み重なりすぎない
    }
    // 位置指定の強制スポーン(根からの復活など)でも、飾りの範囲だけは respect する
    if (ok || (opts.x !== undefined && attempt === 11 && !inDecoration(x, y))) {
      // 指定座標スポーン(根からの復活)は最終的に必ず画面内で成立させる
      const sx = clamp(x, margin, Math.max(margin, W - margin));
      const sy = clamp(y, topMargin, Math.max(topMargin, H - margin));
      const nw = makeWeed(sx, sy, type || pickWeedType(), opts);
      weeds.push(nw);
      if (nw.age === 0) emitSoil(nw.x, nw.y);   // 発芽時に土がパラッと動く
      return true;
    }
  }
  return false;
}

function initGarden() {
  weeds.length = 0;
  roots.length = 0;
  const target = weedTargetCount();
  // 互いに離れた場所に群れの「種」をまき、それぞれの群れを独立に茂らせる
  const seeds = Math.max(3, Math.round(target / 12));
  const perColony = Math.round((target * 0.85) / seeds);
  for (let s = 0; s < seeds; s++) {
    let sx = 0, sy = 0, tries = 0;
    do {
      sx = rnd(40, W - 40);
      sy = rnd(60, H - 30);
      tries++;
    } while (tries < 20 && weeds.some(w => (w.x - sx) ** 2 + (w.y - sy) ** 2 < 110 * 110));
    const before = weeds.length;
    spawnWeed({ x: sx, y: sy, size: rnd(0.8, 1.2) });
    for (let i = 0; i < perColony; i++) {
      const colony = weeds.slice(before);
      if (!colony.length) break;
      spawnWeed({ near: colony[irnd(0, colony.length - 1)], size: rnd(0.7, 1.2) });
    }
  }
}

/* ---- 葉の色: 健康 → 湯がかかって色変わり → 黄 → 茶 → 枯れ色 ---- */
function leafHSL(t, scald, wither, shade) {
  let h = t.hue, s = t.sat, l = t.light + shade;
  const sc = clamp(scald, 0, 1);
  // お湯がかかった直後: 濃く・くすんで湿った色に
  h -= 10 * sc; s -= 12 * sc; l -= 6 * sc;
  if (wither > 0) {
    const stages = [
      [0.0, h, s, l],
      [0.32, 68, 50, 43 + shade * 0.6],
      [0.62, 45, 46, 40 + shade * 0.5],
      [0.85, 30, 34, 33 + shade * 0.4],
      [1.0, 37, 23, 55 + shade * 0.4]
    ];
    for (let i = 1; i < stages.length; i++) {
      if (wither <= stages[i][0]) {
        const [w0, h0, s0, l0] = stages[i - 1];
        const [w1, h1, s1, l1] = stages[i];
        const tt = (wither - w0) / (w1 - w0);
        h = lerp(h0, h1, tt); s = lerp(s0, s1, tt); l = lerp(l0, l1, tt);
        break;
      }
    }
  }
  return [h, clamp(s, 0, 100), clamp(l, 4, 92)];
}

/* ---- 葉の描画 ---- */
function drawBlade(c, len, width, curve) {
  // イネ科の細い葉。原点=根元、+x方向に伸びる
  const mx = len * 0.5, my = curve * len * 0.4;
  c.beginPath();
  c.moveTo(0, -width / 2);
  c.quadraticCurveTo(mx, my - width * 0.7, len, my * 1.6);
  c.quadraticCurveTo(mx, my + width * 0.7, 0, width / 2);
  c.closePath();
  c.fill();
}
function drawTeardrop(c, len, width, curve) {
  // なめらかな涙滴形の葉(ロゼットのハイライトにも使う)
  const my = curve * len * 0.25;
  c.beginPath();
  c.moveTo(0, 0);
  c.bezierCurveTo(len * 0.25, -width * 0.62 + my, len * 0.72, -width * 0.5 + my, len, my);
  c.bezierCurveTo(len * 0.72, width * 0.5 + my, len * 0.25, width * 0.62 + my, 0, 0);
  c.closePath();
  c.fill();
}
function drawRosetteLeaf(c, len, width, curve) {
  // タンポポ風のギザギザした葉
  const my = curve * len * 0.25;
  const N = 8;
  c.beginPath();
  c.moveTo(0, 0);
  for (let i = 1; i <= N; i++) {
    const t = i / N;
    const jag = (i === N) ? 1 : (i % 2 ? 1 : 0.55);
    const wy = width * 0.58 * Math.sin(Math.PI * Math.pow(t, 0.75)) * jag;
    c.lineTo(len * t, -wy + my * t);
  }
  for (let i = N - 1; i >= 1; i--) {
    const t = i / N;
    const jag = i % 2 ? 1 : 0.55;
    const wy = width * 0.58 * Math.sin(Math.PI * Math.pow(t, 0.75)) * jag;
    c.lineTo(len * t, wy + my * t);
  }
  c.closePath();
  c.fill();
}
function drawHeart(c, len, width, stemColor, veinAlpha) {
  // ドクダミのハート形の葉。茎の先に葉がつく
  const stem = len * 0.45;
  c.save();
  c.strokeStyle = stemColor;
  c.lineWidth = 1.1;
  c.beginPath();
  c.moveTo(0, 0);
  c.lineTo(stem, 0);
  c.stroke();
  c.translate(stem, 0);
  const L = len * 0.85;
  c.beginPath();
  c.moveTo(0, 0);
  c.bezierCurveTo(-L * 0.12, -width * 0.72, L * 0.62, -width * 0.66, L, 0);
  c.bezierCurveTo(L * 0.62, width * 0.66, -L * 0.12, width * 0.72, 0, 0);
  c.closePath();
  c.fill();
  texFill(c, veinAlpha * 2.6);   // 種ごとの葉脈の濃さに比例(≒0.5×hiFade)
  // 葉脈
  if (veinAlpha > 0.02) {
    c.strokeStyle = `rgba(212,236,205,${veinAlpha.toFixed(3)})`;
    c.lineWidth = 0.7;
    c.beginPath();
    c.moveTo(0, 0); c.lineTo(L * 0.78, 0);
    c.moveTo(0, 0); c.quadraticCurveTo(L * 0.3, -width * 0.32, L * 0.58, -width * 0.24);
    c.moveTo(0, 0); c.quadraticCurveTo(L * 0.3, width * 0.32, L * 0.58, width * 0.24);
    c.stroke();
  }
  c.restore();
}
// 直前に作った葉のパスへ、実写グレイン(GRASS_TEX)をoverlayで重ねる。
// 静的レイヤーのベイク時のみ=毎フレームの描画コストを増やさない(動的経路に
// 入れると全草枯れ進行時にフレーム時間が約2倍になる実測あり)。
// 枯れるほど薄くなる(ツヤ・葉脈がhiFadeで消えるのと同じ設計)
function texFill(c, alpha) {
  if (c !== weedLayerCtx || !(alpha > 0.03) || !GRASS_TEX.naturalWidth) return;
  if (!grassPat) grassPat = c.createPattern(GRASS_TEX, 'repeat');
  c.save();
  c.globalCompositeOperation = 'overlay';
  c.globalAlpha *= alpha;
  c.fillStyle = grassPat;
  c.fill();
  c.restore();
}

function drawWeed(w, time) {
  const t = WEED_TYPES[w.type];
  const r = w.radius();
  if (r < 0.5) return;

  // 新しく生えた草は透明から、ゆっくり立ち上がってふわっと現れる(成長はしない)
  const emerge = clamp(w.age / 2.8, 0, 1);
  const emergeEase = emerge * emerge * (3 - 2 * emerge);   // smoothstep
  const dyingAlpha = (w.crumbleTimer > 0 ? clamp(1 - w.crumbleTimer / CRUMBLE_FADE, 0, 1) : 1) *
                     emergeEase;

  // 接地影: 中心が濃く縁でふわっと消えるソフトシャドウを右下に落とす
  // (這って広がる草は面が薄いので影も控えめに)
  const isRunner = w.type === 'runner';
  const sr = r * (isRunner ? 0.62 : 0.95);
  const sx2 = w.x + 2.2, sy2 = w.y + 3;
  const sg = ctx.createRadialGradient(sx2, sy2, sr * 0.15, sx2, sy2, sr);
  sg.addColorStop(0, isRunner ? 'rgba(14,10,5,0.17)' : 'rgba(14,10,5,0.3)');
  sg.addColorStop(0.65, isRunner ? 'rgba(14,10,5,0.08)' : 'rgba(14,10,5,0.14)');
  sg.addColorStop(1, 'rgba(14,10,5,0)');
  ctx.globalAlpha = dyingAlpha;
  ctx.beginPath();
  ctx.ellipse(sx2, sy2, sr, sr * 0.74, 0, 0, TAU);
  ctx.fillStyle = sg;
  ctx.fill();
  ctx.globalAlpha = 1;
  for (let i = 0; i < w.leaves.length; i++) {
    // 葉は1枚ずつ順番に、小さく生えてから育つ
    const lp = clamp(w.size * 1.4 * w.leaves.length - i, 0, 1);
    if (lp <= 0) break;   // 後ろの葉ほど遅く生えるので、以降はまだ芽吹いていない
    const leaf = w.leaves[i];
    const lw = clamp(w.wither * leaf.heatBias, 0, 1);   // 葉ごとの枯れ具合
    const len = leaf.len * w.size * (1 - 0.28 * lw) * (0.35 + 0.65 * lp);
    const width = leaf.width * clamp(w.size * 1.3, 0.3, 1) * (1 - 0.5 * lw) * (0.5 + 0.5 * lp);
    // 枯れてくると葉の向きが乱れて縮れる
    const shrivel = Math.sin(i * 7.3 + w.swayPhase * 3) * 0.5 * lw;
    const ang = leaf.angle + shrivel;
    ctx.save();
    ctx.translate(w.x, w.y);
    ctx.rotate(ang);
    ctx.globalAlpha = dyingAlpha * (1 - 0.15 * lw) * (0.3 + 0.7 * lp);
    const col = leafHSL(t, w.visualScald * leaf.heatBias, lw, leaf.shade);
    ctx.fillStyle = hslStr(col[0], col[1], col[2]);
    const hiFade = 1 - lw * 0.7;        // 枯れるほどツヤ・葉脈が消える
    switch (w.type) {
      case 'wakakusa':
        drawBlade(ctx, len, width, leaf.curve);
        texFill(ctx, 0.5 * hiFade);
        // 中央のハイライト筋
        ctx.fillStyle = hslStr(col[0] + 3, col[1], clamp(col[2] + 10 * hiFade, 4, 92));
        drawBlade(ctx, len * 0.9, width * 0.45, leaf.curve);
        break;
      case 'enokoro': {
        if (i < 2 && w.size > 0.5) {
          // ねこじゃらしの穂
          const sl = len * 1.1;
          ctx.strokeStyle = hslStr(col[0] - 6, Math.max(0, col[1] - 12), Math.max(8, col[2] - 4));
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(2, 0);
          ctx.quadraticCurveTo(sl * 0.55, leaf.curve * sl * 0.3, sl, leaf.curve * sl * 0.5);
          ctx.stroke();
          ctx.save();
          ctx.translate(sl, leaf.curve * sl * 0.5);
          ctx.rotate(leaf.curve * 0.45);
          const hFade = 1 - lw * 0.5;
          const bodyL = 11;
          // きれいな楕円ひとつの穂
          ctx.fillStyle = `hsla(62,42%,${(58 - lw * 16).toFixed(0)}%,${(0.9 * hFade).toFixed(2)})`;
          ctx.beginPath();
          ctx.ellipse(-bodyL * 0.35, 0, bodyL * 0.68, 2.35, 0, 0, TAU);
          ctx.fill();
          // うっすらハイライト
          ctx.fillStyle = `hsla(58,50%,${(70 - lw * 14).toFixed(0)}%,${(0.35 * hFade).toFixed(2)})`;
          ctx.beginPath();
          ctx.ellipse(-bodyL * 0.35, -0.75, bodyL * 0.5, 0.95, 0, 0, TAU);
          ctx.fill();
          ctx.restore();
        } else {
          drawBlade(ctx, len, width, leaf.curve);
          texFill(ctx, 0.5 * hiFade);
          ctx.fillStyle = hslStr(col[0] + 3, col[1], clamp(col[2] + 10 * hiFade, 4, 92));
          drawBlade(ctx, len * 0.9, width * 0.45, leaf.curve);
        }
        break;
      }
      case 'tsuyukusa':
        // 笹のような細長い葉
        drawTeardrop(ctx, len, width * 0.72, leaf.curve);
        texFill(ctx, 0.5 * hiFade);
        ctx.fillStyle = hslStr(col[0] + 4, col[1], clamp(col[2] + 9 * hiFade, 4, 92));
        drawTeardrop(ctx, len * 0.85, width * 0.32, leaf.curve);
        break;
      case 'koke': {
        // 平たいコケのかたまり(地面に張り付く)
        const d = len * 0.4;
        for (let k = 0; k < 3; k++) {
          ctx.beginPath();
          ctx.ellipse(d * (0.4 + k * 0.32), Math.sin(k * 5 + w.swayPhase) * width * 0.25,
                      len * 0.34, width * 0.52, k * 0.5, 0, TAU);
          ctx.fill();
          texFill(ctx, 0.5 * hiFade);
        }
        ctx.fillStyle = hslStr(col[0] + 6, col[1], clamp(col[2] + 12 * hiFade, 4, 92));
        for (let k = 0; k < 4; k++) {
          ctx.beginPath();
          ctx.arc(d * (0.3 + k * 0.27), Math.sin(k * 7 + w.swayPhase * 2) * width * 0.3, 1.1, 0, TAU);
          ctx.fill();
        }
        break;
      }
      case 'sumire':
        // 丸みのあるハート形の葉(茎は緑)
        drawHeart(ctx, len, width, 'rgba(70,110,60,.8)', 0.18 * hiFade);
        break;
      case 'yotsuba': {
        // 幸運の四つ葉。ちょっと金色がかった緑
        const stem = len * 0.5;
        ctx.strokeStyle = hslStr(col[0] - 4, Math.max(0, col[1] - 10), Math.max(8, col[2] - 7));
        ctx.lineWidth = 0.9;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(stem, 0);
        ctx.stroke();
        ctx.translate(stem, 0);
        for (let k = 0; k < 4; k++) {
          ctx.save();
          ctx.rotate(-1.35 + k * 0.9);
          const L = len * 0.5, Wd = width * 0.6;
          ctx.beginPath();
          ctx.ellipse(L * 0.55, 0, L * 0.5, Wd * 0.5, 0, 0, TAU);
          ctx.fill();
          texFill(ctx, 0.45 * hiFade);
          ctx.strokeStyle = `rgba(245,250,225,${(0.45 * hiFade).toFixed(3)})`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(L * 0.2, 0, L * 0.4, -0.7, 0.7);
          ctx.stroke();
          ctx.restore();
        }
        // きらり
        ctx.fillStyle = `rgba(255,250,205,${(0.8 * hiFade).toFixed(2)})`;
        ctx.beginPath();
        ctx.arc(len * 0.42, -len * 0.3, 1.1, 0, TAU);
        ctx.fill();
        break;
      }
      case 'nijiyotsuba': {
        // この世に存在しない、虹色に輝く四つ葉
        const stem = len * 0.5;
        ctx.strokeStyle = `rgba(200,205,215,${(0.9 * (1 - lw * 0.5)).toFixed(2)})`;
        ctx.lineWidth = 0.9;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(stem, 0);
        ctx.stroke();
        ctx.translate(stem, 0);
        const mix = clamp(1 - lw * 2, 0, 1);   // 枯れ始めると虹色が抜けていく
        for (let k = 0; k < 4; k++) {
          ctx.save();
          ctx.rotate(-1.35 + k * 0.9);
          const L = len * 0.5, Wd = width * 0.6;
          const hueK = (90 * k + w.swayPhase * 57) % 360;
          ctx.fillStyle = mix > 0
            ? hslStr(hueK, 62 * mix + col[1] * (1 - mix), clamp(col[2] + 20 * mix, 4, 88))
            : hslStr(col[0], col[1], col[2]);
          ctx.beginPath();
          ctx.ellipse(L * 0.55, 0, L * 0.5, Wd * 0.5, 0, 0, TAU);
          ctx.fill();
          texFill(ctx, 0.45 * hiFade);
          ctx.strokeStyle = `rgba(255,255,255,${(0.5 * mix).toFixed(3)})`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(L * 0.2, 0, L * 0.4, -0.7, 0.7);
          ctx.stroke();
          ctx.restore();
        }
        // きらきら
        ctx.fillStyle = `rgba(255,255,240,${(0.9 * mix).toFixed(2)})`;
        for (let k = 0; k < 3; k++) {
          const a = w.swayPhase * 3 + k * 2.1;
          ctx.beginPath();
          ctx.arc(Math.cos(a) * len * 0.5, Math.sin(a) * len * 0.4, 1.0, 0, TAU);
          ctx.fill();
        }
        break;
      }
      case 'rosette': {
        const bc = leaf.curve;
        drawRosetteLeaf(ctx, len, width, bc);
        texFill(ctx, 0.55 * hiFade);
        // 内側の明るい面と主脈
        ctx.fillStyle = hslStr(col[0] + 4, Math.max(0, col[1] - 4), clamp(col[2] + 8 * hiFade, 4, 92));
        drawTeardrop(ctx, len * 0.88, width * 0.42, bc);
        ctx.strokeStyle = `rgba(233,244,222,${(0.3 * hiFade).toFixed(3)})`;
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(len * 0.08, 0);
        ctx.quadraticCurveTo(len * 0.5, bc * len * 0.12, len * 0.94, bc * len * 0.25);
        ctx.stroke();
        break;
      }
      case 'oobako': {
        const bc = leaf.curve;
        drawTeardrop(ctx, len, width * 1.15, bc);
        texFill(ctx, 0.55 * hiFade);
        // オオバコらしい平行脈
        ctx.strokeStyle = `rgba(224,240,214,${(0.28 * hiFade).toFixed(3)})`;
        ctx.lineWidth = 0.7;
        ctx.beginPath();
        for (let v = -1; v <= 1; v++) {
          ctx.moveTo(len * 0.1, v * width * 0.1);
          ctx.quadraticCurveTo(len * 0.5, v * width * 0.32 + bc * len * 0.12, len * 0.9, bc * len * 0.25);
        }
        ctx.stroke();
        break;
      }
      case 'runner': {
        // 匍匐茎が地を這い、小さな葉が交互につく(メヒシバ風)
        const bc = leaf.curve;
        ctx.strokeStyle = hslStr(col[0] - 14, Math.max(0, col[1] - 8), Math.max(8, col[2] - 4));
        ctx.lineWidth = 0.9;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(2, 0);
        ctx.quadraticCurveTo(len * 0.5, bc * len * 0.5, len, bc * len * 0.8);
        ctx.stroke();
        const nB = Math.max(4, Math.floor(len / 5));
        for (let b = 0; b < nB; b++) {
          const tt = 0.14 + (b / nB) * 0.86;
          // 匍匐茎(2次ベジェ)上の位置
          const qx = (1 - tt) * (1 - tt) * 2 + 2 * (1 - tt) * tt * (len * 0.5) + tt * tt * len;
          const qy = 2 * (1 - tt) * tt * (bc * len * 0.5) + tt * tt * (bc * len * 0.8);
          const side = b % 2 ? 1 : -1;
          ctx.save();
          ctx.translate(qx, qy);
          ctx.rotate(side * (0.7 + bc * 0.4) + Math.sin(b * 12.99 + w.swayPhase * 7) * 0.25);
          drawBlade(ctx, width * (3.4 + (b === nB - 1 ? 1.4 : 0)), width * 0.75, 0.25 * side);
          texFill(ctx, 0.45 * hiFade);
          ctx.restore();
        }
        break;
      }
      case 'clover': {
        // シロツメクサ: 丸い3小葉+白い山形の斑紋
        const stem = len * 0.5;
        ctx.strokeStyle = hslStr(col[0] - 4, Math.max(0, col[1] - 10), Math.max(8, col[2] - 7));
        ctx.lineWidth = 0.9;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(stem, 0);
        ctx.stroke();
        ctx.translate(stem, 0);
        for (let k = -1; k <= 1; k++) {
          ctx.save();
          ctx.rotate(k * 1.25);
          const L = len * 0.52, Wd = width * 0.62;
          ctx.beginPath();
          ctx.ellipse(L * 0.55, 0, L * 0.5, Wd * 0.5, 0, 0, TAU);
          ctx.fill();
          texFill(ctx, 0.45 * hiFade);
          ctx.strokeStyle = `rgba(235,245,232,${(0.4 * hiFade).toFixed(3)})`;
          ctx.lineWidth = 1.1;
          ctx.beginPath();
          ctx.arc(L * 0.2, 0, L * 0.42, -0.7, 0.7);
          ctx.stroke();
          ctx.restore();
        }
        break;
      }
      case 'katabami': {
        // 茎の先に3枚のハート形の小葉(クローバー風)
        const stem = len * 0.55;
        ctx.strokeStyle = hslStr(col[0] - 6, Math.max(0, col[1] - 12), Math.max(8, col[2] - 8));
        ctx.lineWidth = 0.9;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(stem, 0);
        ctx.stroke();
        ctx.translate(stem, 0);
        for (let k = -1; k <= 1; k++) {
          ctx.save();
          ctx.rotate(k * 1.02);
          const L = len * 0.48, Wd = width * 0.6;
          ctx.beginPath();
          ctx.ellipse(L * 0.55, -Wd * 0.33, L * 0.52, Wd * 0.42, -0.3, 0, TAU);
          ctx.fill();
          texFill(ctx, 0.45 * hiFade);
          ctx.beginPath();
          ctx.ellipse(L * 0.55, Wd * 0.33, L * 0.52, Wd * 0.42, 0.3, 0, TAU);
          ctx.fill();
          texFill(ctx, 0.45 * hiFade);
          ctx.restore();
        }
        break;
      }
      default:   // dokudami
        drawHeart(ctx, len, width,
          lw > 0.5 ? 'rgba(90,60,40,.8)' : 'rgba(130,50,60,.85)',
          0.22 * hiFade);
    }
    ctx.restore();
  }

  // 株元: 葉が集まる中心をふわっと暗くする(ベタ塗りの丸は不自然なのでグラデで)
  const CROWN = { rosette: 1, enokoro: 1, tsuyukusa: 1 };
  if (CROWN[w.type] && w.size > 0.15) {
    const cr = 3.2 * w.size + 0.6;
    const cg = ctx.createRadialGradient(w.x, w.y, 0, w.x, w.y, cr);
    cg.addColorStop(0, `hsla(${t.hue},${Math.max(0, t.sat - 10)}%,${Math.max(6, t.light - 13)}%,${(0.55 * dyingAlpha).toFixed(2)})`);
    cg.addColorStop(1, 'hsla(0,0%,0%,0)');
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.arc(w.x, w.y, cr, 0, TAU);
    ctx.fill();
  }

  // 花(元気なうちだけ)
  if (w.hasFlower && w.size > 0.85 && w.wither < 0.35) {
    ctx.save();
    ctx.globalAlpha = dyingAlpha * clamp(1 - w.wither * 2.5, 0, 1);
    if (w.type === 'dokudami') {
      ctx.translate(w.x, w.y);
      for (let p = 0; p < 4; p++) {
        ctx.save();
        ctx.rotate((p / 4) * TAU + w.swayPhase);
        ctx.beginPath();
        ctx.ellipse(3.4, 0, 3.1, 1.6, 0, 0, TAU);
        ctx.fillStyle = '#f3f1e8';
        ctx.fill();
        ctx.restore();
      }
      ctx.beginPath();
      ctx.arc(0, 0, 1.5, 0, TAU);
      ctx.fillStyle = '#d8cf7a';
      ctx.fill();
    } else if (w.type === 'katabami') {
      // 小さな黄色い五弁花
      ctx.translate(w.x + 3, w.y - 3);
      for (let p = 0; p < 5; p++) {
        ctx.save();
        ctx.rotate((p / 5) * TAU + w.swayPhase);
        ctx.beginPath();
        ctx.ellipse(2.1, 0, 1.9, 1.1, 0, 0, TAU);
        ctx.fillStyle = '#ecd04a';
        ctx.fill();
        ctx.restore();
      }
      ctx.beginPath();
      ctx.arc(0, 0, 0.9, 0, TAU);
      ctx.fillStyle = '#bb8d2b';
      ctx.fill();
    } else if (w.type === 'clover') {
      // 白いぽんぽん花
      ctx.translate(w.x - 2, w.y + 2);
      for (let p = 0; p < 8; p++) {
        ctx.save();
        ctx.rotate((p / 8) * TAU + w.swayPhase);
        ctx.beginPath();
        ctx.ellipse(2.2, 0, 1.7, 1.0, 0, 0, TAU);
        ctx.fillStyle = '#f4f2ea';
        ctx.fill();
        ctx.restore();
      }
      ctx.beginPath();
      ctx.arc(0, 0, 1.4, 0, TAU);
      ctx.fillStyle = '#dfe6cf';
      ctx.fill();
    } else if (w.type === 'sumire') {
      // 紫の花
      ctx.translate(w.x + 2, w.y - 4);
      for (let p = 0; p < 5; p++) {
        ctx.save();
        ctx.rotate((p / 5) * TAU + w.swayPhase);
        ctx.beginPath();
        ctx.ellipse(2.4, 0, 2.3, 1.4, 0, 0, TAU);
        ctx.fillStyle = '#8a6fc0';
        ctx.fill();
        ctx.restore();
      }
      ctx.beginPath();
      ctx.arc(0, 0, 1.1, 0, TAU);
      ctx.fillStyle = '#f0e0a4';
      ctx.fill();
    } else if (w.type === 'tsuyukusa') {
      // 青い花(丸い花びら2枚+下に小さな白)
      ctx.translate(w.x - 2, w.y - 3);
      ctx.fillStyle = '#4a78d8';
      ctx.beginPath();
      ctx.ellipse(-1.8, -1.6, 2.2, 1.9, -0.3, 0, TAU);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(1.8, -1.6, 2.2, 1.9, 0.3, 0, TAU);
      ctx.fill();
      ctx.fillStyle = '#f2f4f8';
      ctx.beginPath();
      ctx.ellipse(0, 1.4, 1.6, 1.1, 0, 0, TAU);
      ctx.fill();
      ctx.fillStyle = '#e8d05a';
      ctx.beginPath();
      ctx.arc(0, -0.3, 0.8, 0, TAU);
      ctx.fill();
    }
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

/* ---------------- パーティクル ---------------- */
const steam = [], splashes = [], flakes = [], rings = [];
let steamSprite = null;
function buildSteamSprite() {
  steamSprite = document.createElement('canvas');
  steamSprite.width = steamSprite.height = 64;
  const s = steamSprite.getContext('2d');
  const g = s.createRadialGradient(32, 32, 2, 32, 32, 30);
  g.addColorStop(0, 'rgba(255,255,255,0.55)');
  g.addColorStop(0.6, 'rgba(255,255,255,0.22)');
  g.addColorStop(1, 'rgba(255,255,255,0)');
  s.fillStyle = g;
  s.fillRect(0, 0, 64, 64);
}

let steamAcc = 0;
function emitSteam(x, y, rate, dt) {
  if (steam.length > 220) return;
  steamAcc += rate * dt;
  while (steamAcc >= 1) {
    steamAcc -= 1;
    steam.push({
      x: x + rnd(-9, 9), y: y + rnd(-6, 6),
      vx: rnd(-7, 7), vy: rnd(-32, -17),
      r: rnd(8, 15), life: rnd(1.4, 2.6), age: 0, drift: rnd(TAU)
    });
  }
}
function emitSoil(x, y) {
  for (let i = 0; i < 6; i++) {
    const a = rnd(TAU);
    flakes.push({
      x: x + Math.cos(a) * 2, y: y + Math.sin(a) * 2,
      vx: Math.cos(a) * rnd(4, 14), vy: Math.sin(a) * rnd(4, 14) - 3,
      r: rnd(0.8, 1.8), life: rnd(0.5, 0.9), age: 0
    });
  }
}
function emitSteamBurst(x, y, n) {
  for (let i = 0; i < n; i++) {
    steam.push({
      x: x + rnd(-12, 12), y: y + rnd(-9, 9),
      vx: rnd(-12, 12), vy: rnd(-46, -22),
      r: rnd(10, 18), life: rnd(1.8, 3), age: 0, drift: rnd(TAU)
    });
  }
}
function emitSplash(x, y, dt) {
  if (splashes.length > 260) return;
  const n = 26 * dt;
  for (let i = 0; i < n * 2; i++) {
    if (Math.random() > 0.55) continue;
    const a = rnd(TAU), sp = rnd(18, 55);
    splashes.push({
      x, y,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp * 0.55,
      life: rnd(0.22, 0.42), age: 0
    });
  }
}
function emitFlakes(w) {
  if (flakes.length > 240) return;   // 除草剤の一斉崩れでも溢れないように
  const r = w.radius();
  for (let i = 0; i < 9; i++) {
    const a = rnd(TAU);
    flakes.push({
      x: w.x + Math.cos(a) * r * 0.4, y: w.y + Math.sin(a) * r * 0.4,
      vx: Math.cos(a) * rnd(6, 20), vy: Math.sin(a) * rnd(6, 20) - 4,
      r: rnd(1, 2.4), life: rnd(0.7, 1.3), age: 0
    });
  }
}

function updateParticles(dt, time) {
  for (let i = steam.length - 1; i >= 0; i--) {
    const p = steam[i];
    p.age += dt;
    if (p.age >= p.life) { steam.splice(i, 1); continue; }
    p.x += (p.vx + Math.sin(time * 1.7 + p.drift) * 9) * dt;
    p.y += p.vy * dt;
    p.vy *= (1 - 0.35 * dt);
  }
  for (let i = splashes.length - 1; i >= 0; i--) {
    const p = splashes[i];
    p.age += dt;
    if (p.age >= p.life) { splashes.splice(i, 1); continue; }
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= (1 - 3 * dt); p.vy *= (1 - 3 * dt);
  }
  for (let i = flakes.length - 1; i >= 0; i--) {
    const p = flakes[i];
    p.age += dt;
    if (p.age >= p.life) { flakes.splice(i, 1); continue; }
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= (1 - 2 * dt); p.vy *= (1 - 2 * dt);
  }
  for (let i = rings.length - 1; i >= 0; i--) {
    const p = rings[i];
    p.age += dt;
    if (p.age >= p.life) rings.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of rings) {
    const t = p.age / p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4 + t * 16, 0, TAU);
    ctx.strokeStyle = `rgba(225,238,250,${(0.4 * (1 - t)).toFixed(3)})`;
    ctx.lineWidth = 1.4;
    ctx.stroke();
  }
  ctx.fillStyle = 'rgba(226,240,252,0.85)';
  for (const p of splashes) {
    const t = p.age / p.life;
    ctx.globalAlpha = 1 - t;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 1.7, 0, TAU);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  for (const p of flakes) {
    const t = p.age / p.life;
    ctx.globalAlpha = 1 - t;
    ctx.fillStyle = '#6d5236';
    ctx.fillRect(p.x, p.y, p.r, p.r);
  }
  ctx.globalAlpha = 1;
  for (const p of steam) {
    const t = p.age / p.life;
    const scale = (p.r / 32) * (1 + t * 1.7);
    ctx.globalAlpha = 0.62 * (1 - t) * Math.min(1, t * 6 + 0.35);
    ctx.drawImage(steamSprite, p.x - 32 * scale, p.y - 32 * scale, 64 * scale, 64 * scale);
  }
  ctx.globalAlpha = 1;
}

// 庭飾りの草よけ判定: 苔庭・池の範囲には新しい草が生えない
function inEllipseRegion(x, y, L, pad = 0) {
  const dx = (x - L.cx * W) / (L.rx * W + pad);
  const dy = (y - L.cy * H) / (L.ry * H + pad);
  return dx * dx + dy * dy < 1;
}
function inDecoration(x, y) {
  if (gardenStones.length && inEllipseRegion(x, y, DECO_LAYOUT.moss)) return true;
  if (ponds.length && inEllipseRegion(x, y, DECO_LAYOUT.pond)) return true;
  return false;
}
const itemCost = (kind) => {
  const it = SHOP_ITEMS[kind];
  const n = ownedCount(kind);
  return it.costs ? it.costs[Math.min(n, it.costs.length - 1)]
                  : Math.round(it.base * Math.pow(it.mult, n));
};

// 置き場所を探す: 他の設置物・庭飾りと被らず、作業範囲に草が多い場所を選ぶ
function autoSpot(radius) {
  let best = null, bestScore = -1;
  for (let tries = 0; tries < 14; tries++) {
    const x = rnd(50, Math.max(60, W - 50));
    const y = rnd(70, Math.max(80, H - 40));
    if (inDecoration(x, y)) continue;
    let ok = true;
    for (const d of [...autoKettles, ...autoSprinklers]) {
      if ((d.x - x) ** 2 + (d.y - y) ** 2 < 70 * 70) { ok = false; break; }
    }
    if (!ok) continue;
    const r2 = (radius || 90) ** 2;
    let score = 0;
    for (const w of weeds) {
      if (w.removing || w.wither >= 1) continue;
      if ((w.x - x) ** 2 + (w.y - y) ** 2 < r2) score++;
    }
    if (score > bestScore) { bestScore = score; best = { x, y }; }
  }
  return best || { x: rnd(60, Math.max(70, W - 60)), y: rnd(80, Math.max(90, H - 50)) };
}

// 飾りの範囲の草はホロッと崩れて片付き(ポイントにもなる)、
// 地中のドクダミの根も取り除く。範囲内の設置物は空きへ引っ越す
function clearDecorationArea() {
  for (const w of weeds) {
    if (!w.removing && inDecoration(w.x, w.y)) startCrumble(w);
  }
  for (let i = roots.length - 1; i >= 0; i--) {
    if (inDecoration(roots[i].x, roots[i].y)) roots.splice(i, 1);
  }
  for (let i = pickups.length - 1; i >= 0; i--) {
    if (inDecoration(pickups[i].x, pickups[i].y)) pickups.splice(i, 1);
  }
  for (const d of [...autoKettles, ...autoSprinklers]) {
    if (inDecoration(d.x, d.y)) {
      const p = autoSpot(90);
      d.x = p.x;
      d.y = p.y;
    }
  }
}

function placeAutoItem(kind, pos) {
  if (kind === 'sweeper') {
    // 設置物ではなく買い切りのレベルアップ
    sweeperLevel = Math.min(sweeperLevel + 1, SHOP_ITEMS.sweeper.max);
    sweeperTimer = Math.min(sweeperTimer, SWEEP_INTERVALS[sweeperLevel - 1]);
    return;
  }
  if (kind === 'stone' || kind === 'pond') {
    // 苔庭・池は固定構図の1点もの。seedで縁の形だけ個性が出る
    const list = kind === 'stone' ? gardenStones : ponds;
    if (list.length >= SHOP_ITEMS[kind].max) return;
    list.push({ seed: (pos && pos.seed) || irnd(1, 1e9) });
    decoDirty = true;
    if (!pos) clearDecorationArea();   // 復元時は草がまだ無いのでスキップ
    return;
  }
  // (この下は従来の設置物)
  const p = pos || autoSpot(kind === 'sprinkler' ? 75 : 90);
  if (kind === 'kettle') {
    autoKettles.push({ x: p.x, y: p.y, timer: rnd(2, 5), fireT: 0, target: null });
  } else if (kind === 'sprinkler') {
    autoSprinklers.push({ x: p.x, y: p.y, timer: rnd(3, 6), sprayT: 0, arm: rnd(TAU) });
  } else {
    goats.push({
      x: p.x, y: p.y, dir: rnd(TAU), bob: rnd(TAU),
      wander: null, wanderT: 0, eatT: 0, eating: null,
    });
  }
}

function saveAutoItems() {
  saveLS('oyu_autoItems', {
    kettle: autoKettles.map((d) => ({ x: Math.round(d.x), y: Math.round(d.y) })),
    sprinkler: autoSprinklers.map((d) => ({ x: Math.round(d.x), y: Math.round(d.y) })),
    goat: goats.map((d) => ({ x: Math.round(d.x), y: Math.round(d.y) })),
    stone: gardenStones.map((d) => ({ seed: d.seed })),
    pond: ponds.map((d) => ({ seed: d.seed })),
    sweeper: sweeperLevel,
  });
  saveLS('oyu_spent', spentPoints);
}

{ // 保存済みの設置物を復元(座標は保存時のもの。画面外はupdate側でクランプされる)
  const saved = loadLS('oyu_autoItems', {});
  for (const kind of ['kettle', 'sprinkler', 'goat', 'stone', 'pond']) {
    for (const p of (saved[kind] || [])) placeAutoItem(kind, p);
  }
  sweeperLevel = Math.min(saved.sweeper || 0, SHOP_ITEMS.sweeper.max);
  if (sweeperLevel > 0) sweeperTimer = SWEEP_INTERVALS[sweeperLevel - 1];
}

function updateAutomation(dt) {
  // 自動やかん: ときどき近くの草を狙ってお湯をかける
  for (const d of autoKettles) {
    d.x = clamp(d.x, 40, Math.max(40, W - 40));
    d.y = clamp(d.y, 60, Math.max(60, H - 30));
    if (d.fireT > 0) {
      d.fireT -= dt;
      const w = d.target;
      if (w && !w.removing && w.wither < 1) {
        w.scald = Math.min(w.scald + dt * 0.9, 2.2);
        addWet(w.x, w.y, 14);
        emitSteam(w.x, w.y, 5, dt);
      } else d.fireT = 0;
      if (d.fireT <= 0) { d.target = null; d.timer = rnd(5, 8); }
    } else {
      d.timer -= dt;
      if (d.timer <= 0) {
        // まだ熱湯が足りていない草だけを狙う(処理済みに二度がけしない)
        let best = null, bd = 90 * 90;
        for (const w of weeds) {
          if (w.removing || w.wither >= 1) continue;
          if (w.scald >= WEED_TYPES[w.type].scaldThreshold) continue;
          const dx = w.x - d.x, dy = w.y - d.y;
          const dist = dx * dx + dy * dy;
          if (dist < bd && dist > 12 * 12) { bd = dist; best = w; }
        }
        if (best) { d.target = best; d.fireT = 1.4; }
        else d.timer = rnd(2, 4);
      }
    }
  }
  // ししおどし: 竹筒にお湯がたまると、カコンと傾いて周囲に熱湯をまく
  for (const d of autoSprinklers) {
    d.x = clamp(d.x, 40, Math.max(40, W - 40));
    d.y = clamp(d.y, 60, Math.max(60, H - 30));
    if (d.sprayT > 0) {
      d.sprayT -= dt;
      // 注いでいる1.2秒の間、周囲の草を熱湯漬けに(総量は旧スプリンクラーと同等)
      for (const w of weeds) {
        if (w.removing || w.wither >= 1) continue;
        const dx = w.x - d.x, dy = w.y - d.y;
        if (dx * dx + dy * dy < 75 * 75) w.scald = Math.min(w.scald + dt * 0.9, 2.2);
      }
      // 湯は竹筒の先からこぼれる
      const mx = d.x + Math.cos(d.arm) * 26, my = d.y + Math.sin(d.arm) * 26;
      if (Math.random() < dt * 30) addWet(mx + rnd(-35, 35), my + rnd(-35, 35), 10);
      if (Math.random() < dt * 10) emitSteam(mx + rnd(-16, 16), my + rnd(-16, 16), 3, dt * 8);
      if (d.sprayT <= 0) d.timer = rnd(9, 13);
    } else {
      d.timer -= dt;
      if (d.timer <= 0) {
        d.sprayT = 1.2;
        kon();   // カコンッ
      }
    }
  }
  // つむじ風: 一定間隔で風が吹き抜けて、通過した枯れ草をまとめて片付ける
  if (sweeperLevel > 0 && !sweepFx) {
    sweeperTimer -= dt;
    if (sweeperTimer <= 0) {
      let huskCount = 0;
      for (const w of weeds) if (w.wither >= 1 && !w.removing) huskCount++;
      if (huskCount > 0) {
        sweepFx = { x: -70, cleared: 0 };
        if (huskCount >= 3) windWhoosh();   // 少量のときは音を鳴らさない(高レベルの連発対策)
        sweeperTimer = SWEEP_INTERVALS[sweeperLevel - 1];
      } else {
        sweeperTimer = 1;   // 枯れ草ができるまで待つ
      }
    }
  }
  if (sweepFx) {
    sweepFx.x += dt * (W + 220) / 1.1;   // 約1.1秒で画面を横断
    for (const w of weeds) {
      if (w.wither >= 1 && !w.removing && w.x < sweepFx.x - 20) {
        startCrumble(w);
        sweepFx.cleared++;
      }
    }
    if (sweepFx.x > W + 150) {
      // 風が種を運んでくる: 片付けた量に応じて新しい草が生える
      const seeds = Math.min(5, Math.ceil(sweepFx.cleared / 3));
      for (let i = 0; i < seeds; i++) {
        if (weeds.length && Math.random() < 0.7) {
          spawnWeed({ near: weeds[irnd(0, weeds.length - 1)] });
        } else {
          spawnWeed({});
        }
      }
      sweepFx = null;
    }
  }

  // ヤギ型除草ロボ: 枯れ草を探して回収する。なければのんびり巡回
  for (const g2 of goats) {
    g2.bob += dt * 6;
    if (g2.eatT > 0) {
      g2.eatT -= dt;
      if (g2.eatT <= 0) {
        const w = g2.eating;
        if (w && !w.removing) startCrumble(w);   // 枯れ草も生の草も食べたら片付く
        g2.eating = null;
      }
      continue;
    }
    // 枯れ草を優先。なければ生の草もむしゃむしゃ食べる(ヤギなので)
    let husk = null, hd = 260 * 260;
    for (const w of weeds) {
      if (w.wither >= 1 && !w.removing) {
        const dx = w.x - g2.x, dy = w.y - g2.y;
        const dist = dx * dx + dy * dy;
        if (dist < hd) { hd = dist; husk = w; }
      }
    }
    if (!husk) {
      let gd = 200 * 200;
      for (const w of weeds) {
        if (w.removing || w.wither >= 1 || w.age < 3) continue;
        const dx = w.x - g2.x, dy = w.y - g2.y;
        const dist = dx * dx + dy * dy;
        if (dist < gd) { gd = dist; husk = w; }
      }
    }
    let tx, ty, sp;
    if (husk) { tx = husk.x; ty = husk.y; sp = 26; }
    else {
      g2.wanderT -= dt;
      if (!g2.wander || g2.wanderT <= 0) {
        g2.wander = { x: rnd(50, Math.max(60, W - 50)), y: rnd(70, Math.max(80, H - 40)) };
        g2.wanderT = rnd(4, 9);
      }
      tx = g2.wander.x; ty = g2.wander.y; sp = 8;
    }
    const dx = tx - g2.x, dy = ty - g2.y;
    if (Math.hypot(dx, dy) < 8) {
      if (husk) {
        // 生の草は少し時間がかかる
        g2.eatT = husk.wither >= 1 ? 0.7 : 1.3;
        g2.eating = husk;
      } else g2.wanderT = 0;
    } else {
      const ta = Math.atan2(dy, dx);
      let da = ta - g2.dir;
      while (da > Math.PI) da -= TAU;
      while (da < -Math.PI) da += TAU;
      g2.dir += clamp(da, -dt * 3, dt * 3);
      g2.x = clamp(g2.x + Math.cos(g2.dir) * sp * dt, 20, Math.max(20, W - 20));
      g2.y = clamp(g2.y + Math.sin(g2.dir) * sp * dt, 50, Math.max(50, H - 15));
      // 池には入らない(縁で押し返す)
      if (ponds.length) {
        const L = DECO_LAYOUT.pond;
        const pdx = (g2.x - L.cx * W) / (L.rx * W + 8);
        const pdy = (g2.y - L.cy * H) / (L.ry * H + 8);
        const d2 = pdx * pdx + pdy * pdy;
        if (d2 < 1 && d2 > 0.0001) {
          const k = 1 / Math.sqrt(d2);
          g2.x = L.cx * W + (g2.x - L.cx * W) * k;
          g2.y = L.cy * H + (g2.y - L.cy * H) * k;
          g2.wander = null;   // 行き先を選び直す
        }
      }
    }
  }
}

function drawAutoKettle(d, time) {
  const firing = d.fireT > 0 && d.target;
  // 控えめな0.6倍サイズで置く。注ぎ先はスケール分を補正して実位置に合わせる
  const S2 = 0.6;
  const tx = firing ? d.x + (d.target.x - d.x) / S2 : d.x - 20;
  const ty = firing ? d.y + (d.target.y - d.y) / S2 : d.y + 26;
  ctx.save();
  ctx.translate(d.x, d.y);
  ctx.scale(S2, S2);
  ctx.translate(-d.x, -d.y);
  drawKettleAt(d.x, d.y, tx, ty, time, KETTLE_SKINS[0], !!firing);
  ctx.restore();
}

function drawSprinkler(d, time) {
  // ししおどし(上から見た図): 石の台座+竹筒。お湯がたまるとカコンと傾く
  ctx.save();
  ctx.translate(d.x, d.y);
  ctx.rotate(d.arm);
  // 影
  ctx.beginPath();
  ctx.ellipse(1.2, 2, 17, 7, 0, 0, TAU);
  ctx.fillStyle = 'rgba(14,10,5,0.24)';
  ctx.fill();
  // 台座の石
  ctx.beginPath();
  ctx.ellipse(-8, 0, 7.5, 5.8, 0, 0, TAU);
  ctx.fillStyle = '#6a6a72';
  ctx.fill();
  ctx.strokeStyle = 'rgba(20,20,26,0.5)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(-9.6, -1.6, 3, 2, 0, 0, TAU);
  ctx.fillStyle = 'rgba(255,255,255,0.16)';
  ctx.fill();
  // 竹筒: 注ぎ中は先端側へカコンと振れる
  const t2 = d.sprayT > 0 ? 1.2 - d.sprayT : 0;
  const swing = d.sprayT > 0 ? Math.sin(Math.PI * t2 / 1.2) : 0;
  ctx.save();
  ctx.rotate(swing * 0.34);
  const bam = ctx.createLinearGradient(0, -3, 0, 3);
  bam.addColorStop(0, '#d8c98e');
  bam.addColorStop(0.5, '#c4b276');
  bam.addColorStop(1, '#9e8d55');
  ctx.beginPath();
  ctx.rect(-7, -2.7, 33, 5.4);
  ctx.fillStyle = bam;
  ctx.fill();
  ctx.strokeStyle = 'rgba(70,60,30,0.55)';
  ctx.lineWidth = 0.9;
  ctx.stroke();
  // 節
  ctx.strokeStyle = 'rgba(90,78,40,0.5)';
  ctx.lineWidth = 1.1;
  for (const nx of [-1, 10, 20]) {
    ctx.beginPath();
    ctx.moveTo(nx, -2.7);
    ctx.lineTo(nx, 2.7);
    ctx.stroke();
  }
  // 口(斜めに切った先端)
  ctx.beginPath();
  ctx.ellipse(25.4, 0, 1.6, 2.7, 0, 0, TAU);
  ctx.fillStyle = '#5f4f28';
  ctx.fill();
  // 注ぎ中: 先からこぼれるお湯と飛沫
  if (d.sprayT > 0 && swing > 0.25) {
    ctx.strokeStyle = 'rgba(210,235,250,0.6)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(26, 0);
    ctx.quadraticCurveTo(33, 2, 37, 7);
    ctx.stroke();
    ctx.fillStyle = 'rgba(225,242,255,0.55)';
    for (let k = 0; k < 5; k++) {
      const aa = -0.5 + k * 0.25 + Math.sin(time * 30 + k) * 0.08;
      const rr = 34 + (k % 3) * 8;
      ctx.beginPath();
      ctx.arc(26 + Math.cos(aa) * (rr - 26), Math.sin(aa) * (rr - 26) + 4, 1.1, 0, TAU);
      ctx.fill();
    }
  }
  ctx.restore();
  // 支柱(竹筒を支える二又)
  ctx.strokeStyle = '#7a6a3f';
  ctx.lineWidth = 1.6;
  for (const s2 of [-1, 1]) {
    ctx.beginPath();
    ctx.moveTo(2, s2 * 2.2);
    ctx.lineTo(4.5, s2 * 5.5);
    ctx.stroke();
  }
  ctx.restore();
}

// シードから決定的な乱数列を作る(苔石・池の形が毎回変わらないように)
function seededRnd(seed) {
  let s = seed >>> 0;
  return (a = 1, b) => {
    s = (s * 1664525 + 1013904223) >>> 0;
    const v = s / 4294967296;
    return b === undefined ? v * a : a + v * (b - a);
  };
}

// 苔庭・池の縁: DECO_LAYOUTの楕円をシードで揺らした有機的な輪郭(ワールド座標)
function decoOutline(L, seed, n, amp = 1) {
  const r = seededRnd(seed);
  const p1 = r(TAU), p2 = r(TAU);
  const a1 = r(0.05, 0.08) * amp, a2 = r(0.03, 0.05) * amp;
  const pts = [];
  for (let i = 0; i < n; i++) {
    const a = (i / n) * TAU;
    const wob = 1 + Math.sin(a * 3 + p1) * a1 + Math.sin(a * 7 + p2) * a2;
    pts.push([L.cx * W + Math.cos(a) * L.rx * W * wob,
              L.cy * H + Math.sin(a) * L.ry * H * wob]);
  }
  return pts;
}

const tracePath = (g, pts) => {
  g.beginPath();
  g.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) g.lineTo(pts[i][0], pts[i][1]);
  g.closePath();
};

// 自然石: 風化して丸みを帯びた岩。角ばらない滑らかな輪郭+染み・地衣類の斑。
// flat=true で平たいスラブ状(半分土に埋まった一枚岩)。輪郭の点列を返す
function drawBoulder(g, x, y, rad, r, flat) {
  const n = 16;
  const p1 = r(TAU), p2 = r(TAU), p3 = r(TAU);
  const ex = r(1.0, 1.5);
  const squash = flat ? r(0.6, 0.78) : r(0.85, 1.0);
  const pts = [];
  for (let i = 0; i < n; i++) {
    const a = (i / n) * TAU;
    const rr = rad * (1 + Math.sin(a * 2 + p1) * 0.11 + Math.sin(a * 3 + p2) * 0.07 +
                      Math.sin(a * 5 + p3) * 0.035);
    pts.push([x + Math.cos(a) * rr * ex, y + Math.sin(a) * rr * squash]);
  }
  // 中点を通る二次曲線でなめらかな閉曲線に(直線を使わない)
  const mid = (i) => [(pts[i][0] + pts[(i + 1) % n][0]) / 2, (pts[i][1] + pts[(i + 1) % n][1]) / 2];
  const smoothPath = () => {
    const m0 = mid(n - 1);
    g.beginPath();
    g.moveTo(m0[0], m0[1]);
    for (let i = 0; i < n; i++) {
      const m = mid(i);
      g.quadraticCurveTo(pts[i][0], pts[i][1], m[0], m[1]);
    }
    g.closePath();
  };
  // 接地の影
  const ao = g.createRadialGradient(x, y + rad * 0.2, rad * 0.4, x, y + rad * 0.2, rad * 1.4);
  ao.addColorStop(0, 'rgba(20,18,10,0.45)');
  ao.addColorStop(1, 'rgba(20,18,10,0)');
  g.fillStyle = ao;
  g.beginPath();
  g.ellipse(x + rad * 0.06, y + rad * 0.18, rad * 1.45 * ex, rad * 1.25 * squash, 0, 0, TAU);
  g.fill();
  // 岩体: 風化したあたたかいグレー(左上の光)
  const grad = g.createLinearGradient(x - rad * ex, y - rad, x + rad * ex, y + rad);
  if (flat) {
    grad.addColorStop(0, '#9b968b');
    grad.addColorStop(0.55, '#807b70');
    grad.addColorStop(1, '#615c51');
  } else {
    grad.addColorStop(0, '#918d83');
    grad.addColorStop(0.5, '#726e64');
    grad.addColorStop(1, '#514d44');
  }
  smoothPath();
  g.fillStyle = grad;
  g.fill();
  g.strokeStyle = 'rgba(24,22,16,0.45)';
  g.lineWidth = 1.2;
  g.stroke();
  g.save();
  smoothPath();
  g.clip();
  // 広い面のやわらかなハイライトと、下面の陰
  const hi = g.createRadialGradient(x - rad * 0.35 * ex, y - rad * 0.4, 2,
                                    x - rad * 0.2 * ex, y - rad * 0.2, rad * 1.1);
  hi.addColorStop(0, 'rgba(235,230,215,0.22)');
  hi.addColorStop(1, 'rgba(235,230,215,0)');
  g.fillStyle = hi;
  g.fillRect(x - rad * 2, y - rad * 2, rad * 4, rad * 4);
  const lo = g.createRadialGradient(x + rad * 0.45 * ex, y + rad * 0.5, 2,
                                    x + rad * 0.3 * ex, y + rad * 0.3, rad * 1.15);
  lo.addColorStop(0, 'rgba(28,24,18,0.3)');
  lo.addColorStop(1, 'rgba(28,24,18,0)');
  g.fillStyle = lo;
  g.fillRect(x - rad * 2, y - rad * 2, rad * 4, rad * 4);
  // 風化の染み(輪郭をぼかした濃淡のむら)
  for (let i = 0; i < 9; i++) {
    const mx = x + r(-0.7, 0.7) * rad * ex;
    const my = y + r(-0.7, 0.7) * rad * squash;
    const mr2 = rad * r(0.2, 0.5);
    const dark = r() < 0.55;
    const grd = g.createRadialGradient(mx, my, 1, mx, my, mr2);
    grd.addColorStop(0, dark ? `rgba(52,46,36,${r(0.08, 0.16).toFixed(2)})`
                             : `rgba(200,192,175,${r(0.07, 0.13).toFixed(2)})`);
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    g.fillStyle = grd;
    g.beginPath();
    g.arc(mx, my, mr2, 0, TAU);
    g.fill();
  }
  // 地衣類(淡い灰緑の斑点。風化した岩の定番)
  for (let i = 0; i < 6; i++) {
    const mx = x + r(-0.65, 0.65) * rad * ex;
    const my = y + r(-0.65, 0.65) * rad * squash;
    const mr2 = rad * r(0.07, 0.2);
    const grd = g.createRadialGradient(mx, my, 0.5, mx, my, mr2);
    grd.addColorStop(0, `rgba(158,164,138,${r(0.16, 0.3).toFixed(2)})`);
    grd.addColorStop(1, 'rgba(158,164,138,0)');
    g.fillStyle = grd;
    g.beginPath();
    g.arc(mx, my, mr2, 0, TAU);
    g.fill();
  }
  // 曲がったヒビ(1〜2本だけ、細く)
  for (let i = 0; i < 1 + Math.floor(r(2)); i++) {
    const sx = x + r(-0.6, 0.6) * rad * ex;
    const sy = y + r(-0.6, 0.2) * rad * squash;
    const ca = r(TAU);
    const len2 = rad * r(0.5, 0.9);
    g.strokeStyle = `rgba(20,18,12,${r(0.2, 0.32).toFixed(2)})`;
    g.lineWidth = r(0.6, 0.9);
    g.beginPath();
    g.moveTo(sx, sy);
    g.quadraticCurveTo(sx + Math.cos(ca) * len2 * 0.5 + r(-6, 6),
                       sy + Math.sin(ca) * len2 * 0.5 + r(2, 8),
                       sx + Math.cos(ca) * len2, sy + Math.sin(ca) * len2 + r(2, 7));
    g.stroke();
  }
  // 岩肌の細かい粒・くぼみ
  for (let i = 0; i < rad * 5; i++) {
    g.fillStyle = `rgba(${r() < 0.5 ? '215,208,192' : '36,32,24'},${r(0.06, 0.16).toFixed(2)})`;
    g.fillRect(x + r(-1, 1) * rad * ex, y + r(-1, 1) * rad * squash, r(0.6, 1.2), r(0.6, 1.2));
  }
  g.restore();
  // 左上のなめらかなリムライト(輪郭に沿った弧)
  g.strokeStyle = 'rgba(250,245,230,0.28)';
  g.lineWidth = 1.4;
  g.lineCap = 'round';
  g.beginPath();
  let first = true;
  for (let i = 0; i < n; i++) {
    const a = (i / n) * TAU;
    if (a > Math.PI * 0.9 && a < Math.PI * 1.55) {
      const [bx2, by2] = pts[i];
      const inx = bx2 + (x - bx2) * 0.04, iny = by2 + (y - by2) * 0.04;
      if (first) { g.moveTo(inx, iny); first = false; }
      else g.lineTo(inx, iny);
    }
  }
  g.stroke();
  g.lineCap = 'butt';
  return pts;
}

// 苔庭と池の静的な絵をオフスクリーンに焼き込む(重い描画はここに集約)
function buildDecoLayer() {
  decoDirty = false;
  decoW = W; decoH = H; decoRES = RES;
  decoShapes = null;
  if (!gardenStones.length && !ponds.length) { decoCanvas = null; return; }
  decoCanvas = document.createElement('canvas');
  decoCanvas.width = Math.max(1, Math.round(W * RES));
  decoCanvas.height = Math.max(1, Math.round(H * RES));
  const g = decoCanvas.getContext('2d');
  g.setTransform(RES, 0, 0, RES, 0, 0);
  decoShapes = {};

  // ---- 苔石=苔と岩の庭(左上・画面の約3割。苔寺スタイル: 苔の絨毯+枯滝の石組+飛石) ----
  if (gardenStones.length) {
    const L = DECO_LAYOUT.moss;
    const seed = gardenStones[0].seed;
    const r = seededRnd(seed + 7);
    const pts = decoOutline(L, seed, 30, 1.8);   // 縁は大きめに揺らして有機的に
    decoShapes.moss = pts;
    // 縁の際
    g.save();
    tracePath(g, pts);
    g.strokeStyle = 'rgba(24,30,16,0.55)';
    g.lineWidth = 5;
    g.stroke();
    // 苔の絨毯のベース(左上の光を受けた深緑)
    const base = g.createLinearGradient(L.cx * W - L.rx * W, L.cy * H - L.ry * H,
                                        L.cx * W + L.rx * W, L.cy * H + L.ry * H);
    base.addColorStop(0, '#567d3e');
    base.addColorStop(0.5, '#446636');
    base.addColorStop(1, '#33502b');
    g.fillStyle = base;
    g.fill();
    g.clip();
    // 実物の苔のフォトテクスチャを下地に重ねる(大局の明暗はベース勾配が担い、
    // その上の手続き描画が起伏・色むらを足すので、リピート感は目立たない)
    if (MOSS_TEX.complete && MOSS_TEX.naturalWidth) {
      g.save();
      g.globalAlpha = 0.55;
      g.scale(0.5, 0.5);
      g.fillStyle = g.createPattern(MOSS_TEX, 'repeat');
      // 塗り範囲はクリップ(揺らぐ輪郭)に任せて全面塗り。ベイク時1回なのでコストは無視できる
      g.fillRect(0, 0, W * 2, H * 2);
      g.restore();
    }
    const area = L.rx * W * L.ry * H;
    const px = (f = 1) => L.cx * W + r(-f, f) * L.rx * W;
    const py = (f = 1) => L.cy * H + r(-f, f) * L.ry * H;
    // 大きな地形のうねり(なだらかな明暗。苔の絨毯が起伏して見える)
    for (let i = 0; i < 5; i++) {
      const mx = px(0.7), my = py(0.7);
      const mr2 = r(90, 150);
      const light = r() < 0.5;
      const grd = g.createRadialGradient(mx, my, 20, mx, my, mr2);
      grd.addColorStop(0, light ? 'rgba(162,188,96,0.10)' : 'rgba(24,38,20,0.10)');
      grd.addColorStop(1, 'rgba(0,0,0,0)');
      g.fillStyle = grd;
      g.beginPath();
      g.ellipse(mx, my, mr2 * r(1.3, 1.9), mr2, r(TAU), 0, TAU);
      g.fill();
    }
    // 苔の種類のタペストリー(大きくなだらかな色の区画)
    for (let i = 0; i < area / 2200; i++) {
      const mx = px(), my = py();
      const mr2 = r(24, 55);
      const kind = r();
      const hue = kind < 0.45 ? '132,168,74' : kind < 0.8 ? '46,88,50' : '110,118,58';
      const grd = g.createRadialGradient(mx, my, 3, mx, my, mr2);
      grd.addColorStop(0, `rgba(${hue},${r(0.1, 0.2).toFixed(2)})`);
      grd.addColorStop(1, 'rgba(0,0,0,0)');
      g.fillStyle = grd;
      g.beginPath();
      g.arc(mx, my, mr2, 0, TAU);
      g.fill();
    }
    // 中間のやわらかなふくらみ(丸が目立たないよう淡く・楕円で)
    for (let i = 0; i < area / 1500; i++) {
      const mx = px(), my = py();
      const mr2 = r(8, 20);
      const light = r() < 0.5;
      const grd = g.createRadialGradient(mx - mr2 * 0.3, my - mr2 * 0.35, 1, mx, my, mr2);
      grd.addColorStop(0, light ? `rgba(150,176,92,${r(0.16, 0.3).toFixed(2)})` : 'rgba(30,44,24,0)');
      grd.addColorStop(1, light ? 'rgba(150,176,92,0)' : `rgba(30,44,24,${r(0.18, 0.32).toFixed(2)})`);
      g.fillStyle = grd;
      g.beginPath();
      g.ellipse(mx, my, mr2 * r(1, 1.5), mr2, r(TAU), 0, TAU);
      g.fill();
    }
    // ベルベットの毛足(苔の細かい質感)
    g.lineCap = 'round';
    for (let i = 0; i < area / 13; i++) {
      const mx = px(), my = py();
      const la = r(TAU), ll = r(0.8, 2);
      g.strokeStyle = r() < 0.5
        ? `rgba(168,192,106,${r(0.1, 0.24).toFixed(2)})`
        : `rgba(22,34,18,${r(0.12, 0.26).toFixed(2)})`;
      g.lineWidth = r(0.5, 0.9);
      g.beginPath();
      g.moveTo(mx, my);
      g.lineTo(mx + Math.cos(la) * ll, my + Math.sin(la) * ll);
      g.stroke();
    }
    g.lineCap = 'butt';
    // 苔が石を抱き込む: 石の下端の輪郭に沿って苔をかぶせる
    const mossHug = (outline, cx2, cy2, rad) => {
      for (const [ox, oy] of outline) {
        if (oy < cy2 + rad * 0.05) continue;   // 下側の縁だけ
        if (r() < 0.3) continue;
        const mr2 = rad * r(0.16, 0.3);
        const grd = g.createRadialGradient(ox, oy + 1, 1, ox, oy + 1, mr2);
        grd.addColorStop(0, `rgba(96,122,62,${r(0.55, 0.8).toFixed(2)})`);
        grd.addColorStop(1, 'rgba(96,122,62,0)');
        g.fillStyle = grd;
        g.beginPath();
        g.arc(ox, oy + 1, mr2, 0, TAU);
        g.fill();
      }
    };
    // 枯滝の石組: 主石から斜めに流れ落ちる構図(苔寺の三段の滝を模す)
    const fx0 = L.cx * W - 0.42 * L.rx * W, fy0 = L.cy * H - 0.42 * L.ry * H;
    const fa = r(0.5, 0.8);   // 流れの向き(右下へ)
    const cascade = [r(22, 27), r(16, 20), r(12, 15), r(9, 12)];
    let cd = 0;
    const cascadeStones = [];
    for (let i = 0; i < cascade.length; i++) {
      cd += (i === 0 ? 0 : cascade[i - 1] + cascade[i] * 0.9);
      cascadeStones.push({
        x: fx0 + Math.cos(fa) * cd + r(-4, 4),
        y: fy0 + Math.sin(fa) * cd * 0.85 + r(-3, 3),
        rad: cascade[i], flat: i === cascade.length - 1,
      });
    }
    // 脇石(主石の隣に寄り添う)
    cascadeStones.push({ x: fx0 - r(18, 26), y: fy0 + r(8, 16), rad: r(10, 13), flat: false });
    // 離れた場所にもう一組(小さな三石)
    const gx2 = L.cx * W + 0.4 * L.rx * W, gy2 = L.cy * H + 0.3 * L.ry * H;
    cascadeStones.push({ x: gx2, y: gy2, rad: r(12, 15), flat: false });
    cascadeStones.push({ x: gx2 + r(14, 20), y: gy2 + r(6, 12), rad: r(7, 9), flat: true });
    cascadeStones.push({ x: gx2 - r(12, 18), y: gy2 + r(4, 10), rad: r(5, 7), flat: false });
    cascadeStones.sort((a, b) => a.y - b.y);
    for (const st2 of cascadeStones) {
      const outline = drawBoulder(g, st2.x, st2.y, st2.rad, r, st2.flat);
      mossHug(outline, st2.x, st2.y, st2.rad);
    }
    // 飛石: 苔を踏まないための小道が緩いS字に抜ける
    const stepN = 6;
    const sp0 = { x: L.cx * W - 0.55 * L.rx * W, y: L.cy * H + 0.62 * L.ry * H };
    const sp1 = { x: L.cx * W + 0.72 * L.rx * W, y: L.cy * H + 0.1 * L.ry * H };
    for (let i = 0; i < stepN; i++) {
      const t2 = i / (stepN - 1);
      const sx2 = lerp(sp0.x, sp1.x, t2) + Math.sin(t2 * Math.PI * 1.2) * L.ry * H * 0.16 + r(-3, 3);
      const sy2 = lerp(sp0.y, sp1.y, t2) + Math.cos(t2 * Math.PI * 1.4) * L.ry * H * 0.1 + r(-3, 3);
      // 苔のくぼみに据わる
      g.beginPath();
      g.ellipse(sx2 + 1, sy2 + 1.5, 12, 9.5, 0, 0, TAU);
      g.fillStyle = 'rgba(20,30,16,0.4)';
      g.fill();
      const outline = drawBoulder(g, sx2, sy2, r(8.5, 10.5), r, true);
      mossHug(outline, sx2, sy2, 9);
    }
    // 落ち葉をほんの少し
    for (let i = 0; i < 6; i++) {
      g.save();
      g.translate(px(0.9), py(0.9));
      g.rotate(r(TAU));
      g.fillStyle = `rgba(168,138,92,${r(0.35, 0.55).toFixed(2)})`;
      g.beginPath();
      g.ellipse(0, 0, r(1.8, 3), r(0.9, 1.5), 0, 0, TAU);
      g.fill();
      g.restore();
    }
    g.restore();
    // 縁のほつれ(苔のかたまりが砂利側へこぼれる)
    for (let i = 0; i < pts.length; i++) {
      if (r() < 0.4) continue;
      const [ex, ey] = pts[i];
      const ox = ex - L.cx * W, oy = ey - L.cy * H;
      const om = Math.hypot(ox, oy) || 1;
      for (let k = 0; k < 1 + Math.floor(r(2)); k++) {
        const fx2 = ex + (ox / om) * r(2, 11) + r(-5, 5);
        const fy2 = ey + (oy / om) * r(2, 11) + r(-5, 5);
        const fr2 = r(2.5, 6);
        g.beginPath();
        g.ellipse(fx2 + 0.8, fy2 + 1, fr2, fr2 * 0.85, 0, 0, TAU);
        g.fillStyle = 'rgba(18,26,14,0.35)';
        g.fill();
        const grd = g.createRadialGradient(fx2 - 1, fy2 - 1, 0.5, fx2, fy2, fr2);
        grd.addColorStop(0, 'rgba(128,154,82,0.8)');
        grd.addColorStop(1, 'rgba(70,96,52,0.5)');
        g.fillStyle = grd;
        g.beginPath();
        g.ellipse(fx2, fy2, fr2, fr2 * 0.85, 0, 0, TAU);
        g.fill();
      }
    }
  }

  // ---- 池(右下・画面の約5割) ----
  if (ponds.length) {
    const L = DECO_LAYOUT.pond;
    const seed = ponds[0].seed;
    const r = seededRnd(seed + 13);
    const pts = decoOutline(L, seed, 34);
    decoShapes.pond = pts;
    // 濡れた土の縁
    g.save();
    tracePath(g, pts);
    g.strokeStyle = 'rgba(28,24,16,0.65)';
    g.lineWidth = 9;
    g.stroke();
    // 水: 縁の浅瀬(明るい青緑)から中心の深み(暗い藍)へ
    const wg = g.createRadialGradient(
      L.cx * W - L.rx * W * 0.25, L.cy * H - L.ry * H * 0.25, 12,
      L.cx * W, L.cy * H, Math.max(L.rx * W, L.ry * H));
    wg.addColorStop(0, '#2e6167');
    wg.addColorStop(0.55, '#234c55');
    wg.addColorStop(0.85, '#16333d');
    wg.addColorStop(1, '#2c5a5b');
    g.fillStyle = wg;
    g.fill();
    g.clip();
    // 浅瀬の砂地と水中の岩影(岸の近くをにぎやかに)
    for (let i = 0; i < 46; i++) {
      const a = r(TAU);
      const edge = r(0.78, 0.98);
      const mx = L.cx * W + Math.cos(a) * L.rx * W * edge;
      const my = L.cy * H + Math.sin(a) * L.ry * H * edge;
      const mr2 = r(7, 20);
      const grd = g.createRadialGradient(mx, my, 1, mx, my, mr2);
      const sand = r() < 0.45;
      grd.addColorStop(0, sand ? 'rgba(140,156,130,0.28)' : 'rgba(8,18,22,0.45)');
      grd.addColorStop(1, 'rgba(0,0,0,0)');
      g.fillStyle = grd;
      g.beginPath();
      g.arc(mx, my, mr2, 0, TAU);
      g.fill();
    }
    // 中島(岩の小島に苔がのる。広い水面のアクセント)
    for (let isl = 0; isl < 2; isl++) {
      const ix = L.cx * W + r(0.05, 0.5) * L.rx * W * (isl === 0 ? 1 : -0.4);
      const iy = L.cy * H + r(-0.15, 0.45) * L.ry * H * (isl === 0 ? 1 : -0.8);
      // 水際のにじみ
      const halo = g.createRadialGradient(ix, iy, 4, ix, iy, 30);
      halo.addColorStop(0, 'rgba(160,180,160,0.16)');
      halo.addColorStop(1, 'rgba(0,0,0,0)');
      g.fillStyle = halo;
      g.beginPath();
      g.arc(ix, iy, 30, 0, TAU);
      g.fill();
      for (let k = 0; k < 4; k++) {
        const sx = ix + r(-11, 11), sy = iy + r(-8, 8);
        const sc = r(0.35, 0.6);
        g.save();
        g.translate(sx, sy);
        g.beginPath();
        g.ellipse(1.5, 2.4, 24 * sc, 20 * sc, 0, 0, TAU);
        g.fillStyle = 'rgba(6,12,14,0.5)';
        g.fill();
        g.rotate(r(TAU));
        g.scale(sc, sc * r(0.8, 0.95));
        g.drawImage(stoneSprites[Math.floor(r(14))], -32, -32);
        g.restore();
      }
      // 島のてっぺんの苔
      g.fillStyle = 'rgba(96,124,64,0.7)';
      g.beginPath();
      g.ellipse(ix - 2, iy - 3, 10, 6.5, r(0.6), 0, TAU);
      g.fill();
      g.fillStyle = 'rgba(140,168,88,0.4)';
      g.beginPath();
      g.ellipse(ix - 4, iy - 5, 5, 3.2, r(0.6), 0, TAU);
      g.fill();
    }
    g.restore();
    // 縁の岩(大小の石をぐるりと。半分陸・半分水。ところどころ苔むす)
    for (let i = 0; i < pts.length; i++) {
      if (r() < 0.2) continue;
      const [ex, ey] = pts[i];
      const sc = r(0.3, 0.7);
      const mossy = r() < 0.3;
      g.save();
      g.translate(ex + r(-3, 3), ey + r(-3, 3));
      g.beginPath();
      g.ellipse(1.5, 2.2, 23 * sc * 1.1, 23 * sc, 0, 0, TAU);
      g.fillStyle = 'rgba(14,12,8,0.4)';
      g.fill();
      g.rotate(r(TAU));
      g.scale(sc * r(0.9, 1.25), sc);
      g.drawImage(stoneSprites[Math.floor(r(14))], -32, -32);
      if (mossy) {
        g.fillStyle = 'rgba(96,124,60,0.35)';
        g.beginPath();
        g.ellipse(r(-4, 4), r(-4, 4), 13, 9, r(TAU), 0, TAU);
        g.fill();
      }
      g.restore();
    }
    // 蓮の葉のまとまり(静的)
    const lilies = [];
    for (let i = 0; i < 6; i++) {
      lilies.push([
        L.cx * W + r(-0.55, 0.1) * L.rx * W,
        L.cy * H + r(-0.55, 0.35) * L.ry * H,
        r(5.5, 10), r(TAU), r() < 0.25,
      ]);
    }
    for (const [lx, ly, lr2, la, flower] of lilies) {
      g.save();
      g.translate(lx, ly);
      g.rotate(la);
      g.beginPath();
      g.ellipse(2, 2.5, lr2, lr2 * 0.92, 0, 0, TAU);
      g.fillStyle = 'rgba(8,16,14,0.3)';
      g.fill();
      g.beginPath();
      g.arc(0, 0, lr2, 0.3, TAU - 0.3);
      g.lineTo(0, 0);
      g.closePath();
      g.fillStyle = '#4c7442';
      g.fill();
      g.strokeStyle = 'rgba(22,36,18,0.5)';
      g.lineWidth = 0.9;
      g.stroke();
      if (flower) {
        g.fillStyle = '#e8b7c8';
        for (let k = 0; k < 6; k++) {
          g.save();
          g.rotate((k / 6) * TAU);
          g.beginPath();
          g.ellipse(0, -2.6, 1.5, 2.6, 0, 0, TAU);
          g.fill();
          g.restore();
        }
        g.beginPath();
        g.arc(0, 0, 1.2, 0, TAU);
        g.fillStyle = '#f5df8a';
        g.fill();
      }
      g.restore();
    }
  }
}

// 池の動く部分だけ毎フレーム描く(波紋・光のゆらめき・錦鯉)
function drawPondFx(time) {
  if (!decoShapes || !decoShapes.pond) return;
  const L = DECO_LAYOUT.pond;
  const cx = L.cx * W, cy = L.cy * H;
  ctx.save();
  tracePath(ctx, decoShapes.pond);
  ctx.clip();
  // 波紋(数カ所からゆっくり広がる)
  for (let i = 0; i < 3; i++) {
    const rr = (time * 7 + i * 26) % 60;
    const ox = cx + Math.cos(i * 2.4) * L.rx * W * 0.4;
    const oy = cy + Math.sin(i * 2.9) * L.ry * H * 0.4;
    ctx.beginPath();
    ctx.ellipse(ox, oy, rr, rr * 0.74, 0, 0, TAU);
    ctx.strokeStyle = `rgba(205,232,235,${(0.12 * (1 - rr / 60)).toFixed(3)})`;
    ctx.lineWidth = 1.1;
    ctx.stroke();
  }
  // 水面の光のすじ
  for (let i = 0; i < 3; i++) {
    const gy = cy - L.ry * H * 0.35 + i * 14 + Math.sin(time * 0.7 + i) * 4;
    const gx = cx - L.rx * W * 0.3 + Math.sin(time * 0.4 + i * 2) * 10;
    ctx.strokeStyle = `rgba(225,242,245,${(0.07 + 0.03 * Math.sin(time * 1.3 + i)).toFixed(3)})`;
    ctx.lineWidth = 2.2;
    ctx.beginPath();
    ctx.moveTo(gx - 26, gy);
    ctx.quadraticCurveTo(gx, gy - 5, gx + 26, gy);
    ctx.stroke();
  }
  // 錦鯉3匹(ゆったり回遊。それぞれ別の輪を泳ぐ)
  const KOI = [
    ['#d96830', 'rgba(40,30,24,0.5)', 0.20, 0.55, 0.0],
    ['#e8e2d4', '#d96830', 0.16, 0.68, 2.2],
    ['#e0a244', 'rgba(40,30,24,0.4)', 0.24, 0.42, 4.1],
  ];
  for (const [col, spot, spd, rad, phase] of KOI) {
    const a = time * spd + phase;
    const kx = cx + Math.cos(a) * L.rx * W * rad;
    const ky = cy + Math.sin(a) * L.ry * H * rad * 0.9;
    const heading = a + Math.PI / 2;
    ctx.save();
    ctx.translate(kx, ky);
    ctx.rotate(heading);
    // 魚影(体の少し下)
    ctx.beginPath();
    ctx.ellipse(1.5, 2.5, 6.5, 2.4, 0, 0, TAU);
    ctx.fillStyle = 'rgba(6,14,16,0.35)';
    ctx.fill();
    ctx.globalAlpha = 0.9;
    ctx.beginPath();
    ctx.ellipse(0, 0, 6.2, 2.3, 0, 0, TAU);
    ctx.fillStyle = col;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(1.6, 0, 1.4, 0, TAU);
    ctx.fillStyle = spot;
    ctx.fill();
    const tw = Math.sin(time * 6 + phase) * 1.8;
    ctx.beginPath();
    ctx.moveTo(-5.4, 0);
    ctx.quadraticCurveTo(-9, tw, -10.5, tw * 1.6);
    ctx.quadraticCurveTo(-8.6, tw + 1.2, -5.4, 0.9);
    ctx.closePath();
    ctx.fillStyle = col;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
  }
  ctx.restore();
}

function drawSweep(s, time) {
  // 画面を横切る風の前線: 気づくか気づかないかくらいの、ごく淡い気配だけ
  const gx = s.x;
  const band = ctx.createLinearGradient(gx - 90, 0, gx + 20, 0);
  band.addColorStop(0, 'rgba(255,255,245,0)');
  band.addColorStop(0.75, 'rgba(255,255,245,0.03)');
  band.addColorStop(1, 'rgba(255,255,245,0)');
  ctx.fillStyle = band;
  ctx.fillRect(gx - 90, 0, 110, H);
  ctx.lineCap = 'round';
  for (let i = 0; i < 3; i++) {
    const y = (i + 0.5) * H / 3 + Math.sin(time * 3 + i * 2.1) * 10;
    const len = 30 + i * 10;
    const lx = gx - 30 - i * 18;
    ctx.strokeStyle = 'rgba(255,255,250,0.09)';
    ctx.lineWidth = 1.1;
    ctx.beginPath();
    ctx.moveTo(lx - len, y + 4);
    ctx.quadraticCurveTo(lx - len * 0.4, y - 7, lx, y);
    ctx.stroke();
  }
  ctx.lineCap = 'butt';
}

function drawGoat(g2, time) {
  // からくりヤギ(設定はぜんまい仕掛け。見た目は初代のもふもふヤギが好評だったので復元)
  const eating = g2.eatT > 0;
  ctx.save();
  ctx.translate(g2.x, g2.y);
  // 接地影
  ctx.beginPath();
  ctx.ellipse(1.5, 2, 10, 6.5, 0, 0, TAU);
  ctx.fillStyle = 'rgba(14,10,5,0.26)';
  ctx.fill();
  ctx.rotate(g2.dir);
  // 脚(歩くとぱたぱた)
  ctx.fillStyle = '#8a8378';
  for (const [lx, ly, ph] of [[4, -4.5, 0], [4, 4.5, Math.PI], [-5, -4.5, Math.PI], [-5, 4.5, 0]]) {
    ctx.beginPath();
    ctx.arc(lx + Math.sin(g2.bob + ph) * (eating ? 0.2 : 1.2), ly, 1.6, 0, TAU);
    ctx.fill();
  }
  // 体
  ctx.beginPath();
  ctx.ellipse(0, 0, 9.5, 6.2, 0, 0, TAU);
  ctx.fillStyle = '#ece5d4';
  ctx.fill();
  ctx.strokeStyle = 'rgba(90,80,60,0.35)';
  ctx.lineWidth = 0.8;
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(-1, 0, 5.5, 3.6, 0, 0, TAU);
  ctx.fillStyle = 'rgba(205,195,172,0.55)';
  ctx.fill();
  // 頭(食べている間はもぐもぐ揺れる)
  ctx.save();
  ctx.translate(9, 0);
  ctx.rotate(eating ? Math.sin(time * 18) * 0.22 : Math.sin(g2.bob * 0.7) * 0.1);
  ctx.strokeStyle = '#7a6a4f';
  ctx.lineWidth = 1.4;
  for (const s2 of [-1, 1]) {
    ctx.beginPath();
    ctx.moveTo(-1, s2 * 2);
    ctx.quadraticCurveTo(-5, s2 * 3.4, -6.5, s2 * 2);
    ctx.stroke();
  }
  ctx.fillStyle = '#e2d9c4';
  for (const s2 of [-1, 1]) {
    ctx.beginPath();
    ctx.ellipse(0, s2 * 4.2, 2.8, 1.4, s2 * 0.5, 0, TAU);
    ctx.fill();
  }
  ctx.beginPath();
  ctx.ellipse(1.5, 0, 4.6, 3.2, 0, 0, TAU);
  ctx.fillStyle = '#e9e1cf';
  ctx.fill();
  ctx.strokeStyle = 'rgba(90,80,60,0.3)';
  ctx.lineWidth = 0.7;
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(4.4, 0, 1.8, 1.6, 0, 0, TAU);
  ctx.fillStyle = '#c9bda4';
  ctx.fill();
  ctx.restore();
  // しっぽ
  ctx.beginPath();
  ctx.ellipse(-9.8, 0, 1.9, 1.3, 0, 0, TAU);
  ctx.fillStyle = '#f4efe3';
  ctx.fill();
  ctx.restore();
}

function pourTargets() {

    list.push({

function spawnPickup(x, y, kind, tier) {
  if (pickups.length >= 3) return;
  if (pickups.some((p) => p.kind === kind)) return;   // 同じ種類は同時に1個まで
  if (inDecoration(x, y)) return;   // 苔庭・池の上には落とさない
  pickups.push({
    x: clamp(x, 24, Math.max(24, W - 24)),
    y: clamp(y, 52, Math.max(52, H - 20)),
    kind, tier: tier || 0, age: 0
  });
  if (!dropHintShown[kind]) {
    dropHintShown[kind] = true;
    showToast(kind === 'herbicide' ? L.dropHerb : L.dropKettle);
  }
}

function activatePickup(p) {
  if (p.kind === 'kettle2') {
    kettleBoostT = 20;
    showToast(L.useKettle);
    unlockChime();
  } else {
    const T = HERB_TIERS[p.tier] || HERB_TIERS[1];
    herbicideWave = {
      t: 0, cx: p.x, cy: p.y,
      p: T.p, boost: T.boost, ring: T.ring,
      id: ++herbWaveSeq
    };
    showToast(L.useHerb(L.herbNames[p.tier] || ''));
    spraySound();
  }
}

function updatePourTarget() {
