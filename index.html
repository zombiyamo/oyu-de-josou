function drawKettleAt(kx, ky, tx, ty, time, C, withStream) {
  const dx = tx - kx, dy = ty - ky;
  const ang = Math.atan2(dy, dx);
  const spoutLen = 38;
  const sx = kx + Math.cos(ang) * spoutLen;
  const sy = ky + Math.sin(ang) * spoutLen;

  // --- お湯の流れ(注ぎ口 → 着水点) ---
  if (withStream) {
    const segs = 10;
    ctx.save();
    ctx.lineCap = 'round';
    for (let pass = 0; pass < 2; pass++) {
      ctx.beginPath();
      for (let i = 0; i <= segs; i++) {
        const t = i / segs;
        const wob = Math.sin(time * 22 + t * 9) * 1.3 * t;
        const x = lerp(sx, tx, t) + wob;
        const y = lerp(sy, ty, t) + wob * 0.4;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      if (pass === 0) {
        ctx.strokeStyle = 'rgba(190,218,240,0.55)';
        ctx.lineWidth = 3.6;
      } else {
        ctx.strokeStyle = 'rgba(245,250,255,0.8)';
        ctx.lineWidth = 1.4;
      }
      ctx.stroke();
    }
    ctx.restore();
  }

  // --- やかん本体(上から見た図) ---
  ctx.save();
  ctx.translate(kx, ky);
  ctx.rotate(ang);
  // 影
  ctx.beginPath();
  ctx.ellipse(2, 6, 27, 21, 0, 0, TAU);
  ctx.fillStyle = 'rgba(15,10,5,0.2)';
  ctx.fill();
  // 注ぎ口
  ctx.beginPath();
  ctx.moveTo(20, -6);
  ctx.lineTo(spoutLen, -2.6);
  ctx.lineTo(spoutLen, 2.6);
  ctx.lineTo(20, 6);
  ctx.closePath();
  const spg = ctx.createLinearGradient(20, -6, 20, 6);
  spg.addColorStop(0, C.spout[0]);
  spg.addColorStop(0.5, C.spout[1]);
  spg.addColorStop(1, C.spout[2]);
  ctx.fillStyle = spg;
  ctx.fill();
  ctx.strokeStyle = C.stroke;
  ctx.lineWidth = 1;
  ctx.stroke();
  // 胴体
  const bg = ctx.createRadialGradient(-8, -8, 4, 0, 0, 30);
  bg.addColorStop(0, C.body[0]);
  bg.addColorStop(0.55, C.body[1]);
  bg.addColorStop(1, C.body[2]);
  ctx.beginPath();
  ctx.ellipse(0, 0, 26, 22, 0, 0, TAU);
  ctx.fillStyle = bg;
  ctx.fill();
  ctx.strokeStyle = C.stroke;
  ctx.lineWidth = 1.2;
  ctx.stroke();
  // ふた
  ctx.beginPath();
  ctx.ellipse(0, 0, 13, 11, 0, 0, TAU);
  const lg = ctx.createRadialGradient(-4, -4, 1, 0, 0, 13);
  lg.addColorStop(0, C.lid[0]);
  lg.addColorStop(1, C.lid[1]);
  ctx.fillStyle = lg;
  ctx.fill();
  ctx.strokeStyle = C.stroke;
  ctx.lineWidth = 1;
  ctx.stroke();
  // つまみ
  ctx.beginPath();
  ctx.arc(0, 0, 3.4, 0, TAU);
  ctx.fillStyle = C.knob;
  ctx.fill();
  // 取っ手(胴体をまたぐアーチを上から見た形)
  ctx.beginPath();
  ctx.ellipse(0, 0, 20, 24, 0, Math.PI * 0.62, Math.PI * 1.38);
  ctx.strokeStyle = C.handle;
  ctx.lineWidth = 4.4;
  ctx.stroke();
  ctx.restore();
}

/* ---------------- 効果音(Web Audio・全て合成) ---------------- */
const audio = {
  ctx: null, master: null,
  pour: null,          // {gLow, gMid, gHi, bpMid, turbG}
  windGain: null,
  nextBird: 6,
  nextBubble: 0,
  nextDrift: 0,
  ready: false
};

function initAudio() {
  if (audio.ready) return;
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) return;
  const c = new AC();
  audio.ctx = c;
  audio.master = c.createGain();
  audio.master.gain.value = muted ? 0 : 1;
  audio.master.connect(c.destination);

  // 使い回すノイズバッファ(2秒)
  const len = c.sampleRate * 2;
  const buf = c.createBuffer(1, len, c.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  audio.noiseBuf = buf;

  // --- お湯を注ぐ音: 2帯域のノイズ + 乱流ゆらぎ(ちょろちょろとした細い注ぎ) ---
  // 低域=水の量感(ごく控えめ) / 中域=ちょろちょろの本体(高め・細め)
  const mkNoise = (rate) => {
    const s = c.createBufferSource();
    s.buffer = buf; s.loop = true;
    if (rate) s.playbackRate.value = rate;
    return s;
  };
  const src = mkNoise();
  const lpLow = c.createBiquadFilter();
  lpLow.type = 'lowpass'; lpLow.frequency.value = 420;
  const bpMid = c.createBiquadFilter();
  bpMid.type = 'bandpass'; bpMid.frequency.value = 1700; bpMid.Q.value = 0.9;
  const gLow = c.createGain(), gMid = c.createGain();
  gLow.gain.value = 0; gMid.gain.value = 0;
  src.connect(lpLow); lpLow.connect(gLow); gLow.connect(audio.master);
  src.connect(bpMid); bpMid.connect(gMid); gMid.connect(audio.master);
  src.start();
  // 乱流: 超低速ノイズで中域の音量を揺らし、一定のシャーではなくバシャバシャ感を出す
  const turb = mkNoise(0.05);
  const turbLp = c.createBiquadFilter();
  turbLp.type = 'lowpass'; turbLp.frequency.value = 10;   // 細い流れの速いゆらぎ
  const turbG = c.createGain();
  turbG.gain.value = 0;
  turb.connect(turbLp); turbLp.connect(turbG); turbG.connect(gMid.gain);
  turb.start();
  audio.pour = { gLow, gMid, bpMid, turbG };

  // --- そよ風(ごく小さく) ---
  const wsrc = c.createBufferSource();
  wsrc.buffer = buf; wsrc.loop = true;
  wsrc.playbackRate.value = 0.4;
  const wlp = c.createBiquadFilter();
  wlp.type = 'lowpass'; wlp.frequency.value = 320;
  const wg = c.createGain();
  wg.gain.value = 0.012;
  const lfo = c.createOscillator();
  lfo.frequency.value = 0.06;
  const lfoG = c.createGain();
  lfoG.gain.value = 0.008;
  lfo.connect(lfoG); lfoG.connect(wg.gain);
  lfo.start();
  wsrc.connect(wlp); wlp.connect(wg); wg.connect(audio.master);
  wsrc.start();
  audio.windGain = wg;

  audio.ready = true;
}

// ユーザージェスチャの中で呼ぶ。タッチでは pointerdown が activation にならない
// ブラウザがあるため、pointerup 側からも呼んで確実に解錠する。
// iOS の割り込みで 'interrupted'(非標準state)になる場合もあるので running 以外は resume を試す。
function unlockAudio() {
  initAudio();
  if (audio.ctx && audio.ctx.state !== 'running') {
    const p = audio.ctx.resume();
    if (p && p.catch) p.catch(() => {});
  }
}

function setPouringSound(on) {
  if (!audio.ready) return;
  const c = audio.ctx, now = c.currentTime;
  const P = audio.pour;
  const set = (param, v, tc) => {
    param.cancelScheduledValues(now);
    param.setValueAtTime(param.value, now);
    param.setTargetAtTime(v, now, tc);
  };
  if (on) {
    set(P.gLow.gain, 0.014, 0.05);
    set(P.gMid.gain, 0.032, 0.04);
    set(P.turbG.gain, 0.016, 0.05);
    // 注ぎ始めの小さな「ちょろっ」という立ち上がり
    const burst = c.createBufferSource();
    burst.buffer = audio.noiseBuf;
    burst.playbackRate.value = rnd(0.9, 1.1);
    const bf = c.createBiquadFilter();
    bf.type = 'bandpass'; bf.frequency.value = 1000; bf.Q.value = 0.6;
    const bg = c.createGain();
    bg.gain.setValueAtTime(0.0001, now);
    bg.gain.exponentialRampToValueAtTime(0.04, now + 0.03);
    bg.gain.exponentialRampToValueAtTime(0.0008, now + 0.2);
    burst.connect(bf); bf.connect(bg); bg.connect(audio.master);
    burst.start(now); burst.stop(now + 0.25);
  } else {
    set(P.gLow.gain, 0, 0.09);
    set(P.gMid.gain, 0, 0.18);   // 少しだけ余韻を残して切る
    set(P.turbG.gain, 0, 0.1);
  }
}

function bubbleBlip() {
  if (!audio.ready || muted) return;
  const c = audio.ctx, now = c.currentTime;
  const o = c.createOscillator();
  const g = c.createGain();
  // 実際の水泡は弾ける瞬間に音程が「上がる」。細い流れなので小さく高い泡
  const f = rnd(380, 1050);
  const dur = rnd(0.04, 0.1);
  o.type = 'sine';
  o.frequency.setValueAtTime(f, now);
  o.frequency.exponentialRampToValueAtTime(f * rnd(1.5, 2.3), now + rnd(0.03, 0.08));
  g.gain.setValueAtTime(0, now);
  g.gain.linearRampToValueAtTime(rnd(0.007, 0.02), now + 0.006);
  g.gain.exponentialRampToValueAtTime(0.0006, now + dur);
  o.connect(g); g.connect(audio.master);
  o.start(now); o.stop(now + dur + 0.03);
}

function birdChirp() {
  if (!audio.ready || muted) return;
  const c = audio.ctx;
  let t = c.currentTime + 0.02;
  const pan = c.createStereoPanner ? c.createStereoPanner() : null;
  const out = pan || audio.master;
  if (pan) { pan.pan.value = rnd(-0.8, 0.8); pan.connect(audio.master); }
  const syllables = irnd(2, 4);
  const base = rnd(2400, 4100);
  for (let i = 0; i < syllables; i++) {
    const o = c.createOscillator();
    const g = c.createGain();
    const f0 = base * rnd(0.9, 1.12);
    const dur = rnd(0.06, 0.13);
    o.type = 'sine';
    o.frequency.setValueAtTime(f0, t);
    o.frequency.exponentialRampToValueAtTime(f0 * rnd(0.7, 1.4), t + dur);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(rnd(0.012, 0.03), t + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0006, t + dur);
    o.connect(g); g.connect(out);
    o.start(t); o.stop(t + dur + 0.02);
    t += dur + rnd(0.03, 0.1);
  }
}

function spraySound() {
  // 除草剤の「シュコーッ」という散布音(控えめ)
  if (!audio.ready || muted) return;
  const c = audio.ctx, now = c.currentTime;
  const src = c.createBufferSource();
  src.buffer = audio.noiseBuf;
  const bp = c.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.setValueAtTime(2400, now);
  bp.frequency.exponentialRampToValueAtTime(800, now + 0.7);
  bp.Q.value = 0.8;
  const g = c.createGain();
  g.gain.setValueAtTime(0.0001, now);
  g.gain.linearRampToValueAtTime(0.05, now + 0.05);
  g.gain.exponentialRampToValueAtTime(0.0008, now + 0.8);
  src.connect(bp); bp.connect(g); g.connect(audio.master);
  src.start(now); src.stop(now + 0.85);
}

function unlockChime() {
  // 新種解放のお知らせ。やわらかいペンタトニックの3音
  if (!audio.ready || muted) return;
  const c = audio.ctx;
  const t = c.currentTime + 0.03;
  const notes = [523.25, 659.25, 783.99];   // C5 → E5 → G5
  notes.forEach((f, i) => {
    const t0 = t + i * 0.16;
    for (const [mult, amp] of [[1, 0.045], [2, 0.012]]) {   // 基音+かすかな倍音
      const o = c.createOscillator();
      const g = c.createGain();
      o.type = 'sine';
      o.frequency.value = f * mult;
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(amp, t0 + 0.04);   // 角の立たない立ち上がり
      g.gain.exponentialRampToValueAtTime(0.0005, t0 + 0.9);
      o.connect(g);
      g.connect(audio.master);
      o.start(t0);
      o.stop(t0 + 1);
    }
  });
}

function startCrumble(w) {
  w.removing = true;
  w.crumbleTimer = 0;
  emitFlakes(w);
  crumblePoof();
}

let lastPoofT = -9;
function crumblePoof() {
  // 枯れ草がホロッと崩れる、やわらかい音(一斉崩れの時は間引く)
  if (!audio.ready || muted) return;
  const c = audio.ctx, now = c.currentTime;
  if (now - lastPoofT < 0.12) return;
  lastPoofT = now;
  const src = c.createBufferSource();
  src.buffer = audio.noiseBuf;
  src.playbackRate.value = rnd(0.5, 0.7);        // 低めでやわらかく
  const lp = c.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 1100;
  const g = c.createGain();
  g.gain.setValueAtTime(0.0001, now);
  g.gain.linearRampToValueAtTime(0.028, now + 0.03);   // パチンではなく、ふわっと立ち上がる
  g.gain.exponentialRampToValueAtTime(0.0008, now + rnd(0.28, 0.4));
  src.connect(lp); lp.connect(g); g.connect(audio.master);
  src.start(now); src.stop(now + 0.45);
}

function kon() {
  // ししおどしの「カコンッ」(竹が石を打つ音)
  if (!audio.ready || muted) return;
  const c = audio.ctx, now = c.currentTime;
  const o = c.createOscillator();
  o.type = 'triangle';
  o.frequency.setValueAtTime(1150, now);
  o.frequency.exponentialRampToValueAtTime(620, now + 0.09);
  const g = c.createGain();
  g.gain.setValueAtTime(0.05, now);
  g.gain.exponentialRampToValueAtTime(0.0006, now + 0.22);
  o.connect(g); g.connect(audio.master);
  o.start(now); o.stop(now + 0.25);
  // 竹の胴鳴り
  const o2 = c.createOscillator();
  o2.type = 'sine';
  o2.frequency.value = 300;
  const g2 = c.createGain();
  g2.gain.setValueAtTime(0.022, now);
  g2.gain.exponentialRampToValueAtTime(0.0005, now + 0.13);
  o2.connect(g2); g2.connect(audio.master);
  o2.start(now); o2.stop(now + 0.16);
}

function windWhoosh() {
  // つむじ風のふわっとした通過音
  if (!audio.ready || muted) return;
  const c = audio.ctx, now = c.currentTime;
  const src = c.createBufferSource();
  src.buffer = audio.noiseBuf;
  src.playbackRate.value = 0.55;
  const bp = c.createBiquadFilter();
  bp.type = 'bandpass';
  bp.Q.value = 0.7;
  bp.frequency.setValueAtTime(320, now);
  bp.frequency.linearRampToValueAtTime(750, now + 0.5);
  bp.frequency.linearRampToValueAtTime(260, now + 1.1);
  const g = c.createGain();
  g.gain.setValueAtTime(0.0001, now);
  g.gain.linearRampToValueAtTime(0.011, now + 0.3);   // ごく控えめに
  g.gain.exponentialRampToValueAtTime(0.0005, now + 1.15);
  src.connect(bp); bp.connect(g); g.connect(audio.master);
  src.start(now); src.stop(now + 1.3);
}

function applyMute() {
  elSndToggle.textContent = muted ? L.off : L.on;
  elSndToggle.classList.toggle('on', !muted);

    g.cancelScheduledValues(now);
    g.setValueAtTime(g.value, now);   // 現在値を起点にしないとランプが瞬時ジャンプになる
    g.linearRampToValueAtTime(muted ? 0 : 1, now + 0.15);
  }
}

// コレクションのアイコン: グローバルのctxを一時差し替えてdrawWeedを使い回す
function renderTypeIcon(cnv, typeKey) {
  const scale = 2;
  cnv.width = 72 * scale;
  cnv.height = 72 * scale;
  const ic = cnv.getContext('2d');
  ic.setTransform(scale, 0, 0, scale, 0, 0);
  const mainCtx = ctx;
  ctx = ic;
  try {
    const t = WEED_TYPES[typeKey];
    const w = makeWeed(36, 38, typeKey, { size: clamp(30 / t.leafLen[1], 0.5, 1) });
    w.hasFlower = ['dokudami', 'katabami', 'clover', 'sumire', 'tsuyukusa'].includes(typeKey);
    drawWeed(w, 0);
  } finally {
    ctx = mainCtx;
  }
}

// やかんのプレビュー(スキンの色で、湯気なし・注ぎなしの静止画)
function renderKettleIcon(cnv, skinIdx) {
  const scale = 1.6;
  cnv.width = 144;
  cnv.height = 144;
  const ic = cnv.getContext('2d');
  ic.setTransform(scale, 0, 0, scale, 0, 0);
  const mainCtx = ctx;
  ctx = ic;
  try {
    drawKettleAt(40, 40, 70, 70, 0, KETTLE_SKINS[skinIdx], false);
  } finally {
    ctx = mainCtx;
  }
}

  const grid = document.getElementById('kettleGrid');

    const card = document.createElement('div');
    card.className = 'card' + (unlocked ? ' pick' : ' locked') + (i === kettleSkin ? ' sel' : '');

/* ---------------- 時間・1日サイクル ---------------- */
const DAY_LEN = 30;              // 現実30秒 = ゲーム内1日
const CRUMBLE_FADE = 0.5;        // タップされた枯れ草が崩れて消えるまでの秒数
let elapsed = loadLS('oyu_elapsed', 0);   // 経過日数(時刻ごと)は保存されて続きから
let day = Math.floor(elapsed / DAY_LEN) + 1;
let spawnTimer = rnd(2, 5);

// ゲーム内時刻は完全に等速(1日=30秒を24時間に均等割り。5:00スタート)
function gameHour() {
  const t = (elapsed % DAY_LEN) / DAY_LEN;
  return 5 + t * 24;   // 5:00〜29:00
}
function gameClock() {
  return L.clock(Math.floor(gameHour() % 24));   // 時のみ(分まで出すと忙しない)
}
let lastClock = '';

function dayTint() {
  const h = gameHour();
  // 朝焼け(5-8時) → 昼 → 夕焼け(17-19時半) → 夜(19時半-翌5時)
  let color = null, alpha = 0;
  if (h < 8) { color = '255,185,120'; alpha = 0.09 * (1 - (h - 5) / 3); }
  else if (h >= 17 && h < 19.5) {
    color = '255,150,85'; alpha = 0.11 * Math.sin((h - 17) / 2.5 * Math.PI);
  } else if (h >= 19.5) {
    color = '55,72,120'; alpha = 0.12 * Math.sin((h - 19.5) / 9.5 * Math.PI);
  }
  if (color && alpha > 0.004) {
    ctx.fillStyle = `rgba(${color},${alpha.toFixed(3)})`;
    ctx.fillRect(0, 0, W, H);
  }
}

/* ---------------- 更新 ---------------- */
function update(dt, time) {
  elapsed += dt;
  const newDay = Math.floor(elapsed / DAY_LEN) + 1;
  if (newDay !== day) {
    day = newDay;
    saveLS('oyu_elapsed', elapsed);
    // 一晩経つとまた生えてくる
    if (weeds.length < MAX_WEEDS) {
      const n = irnd(2, 4);
      for (let i = 0; i < n; i++) {
        if (weeds.length && Math.random() < 0.8) {
          spawnWeed({ near: weeds[irnd(0, weeds.length - 1)] });
        } else {
          spawnWeed({});
        }
      }
    }
    if (Math.random() < 0.7) birdChirp();
  }

  // 自然発生
  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    spawnTimer = regrowBoostT > 0 ? rnd(0.15, 0.4) : rnd(0.8, 2.0);
    const target = weedTargetCount();
    const wantSpawn =
      (weeds.length < target && Math.random() < 1.15 - weeds.length / target) ||
      // 目標密度を超えても、放置していればじわじわ茂って画面が埋まっていく
      (weeds.length < MAX_WEEDS && Math.random() < 0.28);
    if (wantSpawn) {
      // 群生しがち: 多くは既存の株の近くから生えてくる。再生ブースト中は2本ずつ
      const burst = regrowBoostT > 0 ? 2 : 1;
      for (let b = 0; b < burst; b++) {
        if (weeds.length && Math.random() < 0.8) {
          spawnWeed({ near: weeds[irnd(0, weeds.length - 1)] });
        } else {
          spawnWeed({});
        }
      }
    }
  }

  // ドクダミの根からの復活
  for (let i = roots.length - 1; i >= 0; i--) {
    const r = roots[i];
    r.timer -= dt;
    if (r.timer <= 0) {
      roots.splice(i, 1);
      spawnWeed({ x: r.x, y: r.y, type: 'dokudami', rootHp: r.hp });
    }
  }

  // お湯を注ぐ(長押しのときだけ。短いタップではやかんを出さない)
  if (pour.active) {
    pour.holdTime += dt;
    if (!pour.started && pour.holdTime >= POUR_DELAY) {
      pour.started = true;
      setPouringSound(true);
    }
    // 長押し中もアイテムに触れたら拾える
    for (let i = pickups.length - 1; i >= 0; i--) {
      const p = pickups[i];
      const dx = p.x - pour.x, dy = p.y - pour.y;
      if (dx * dx + dy * dy < 30 * 30) {
        pickups.splice(i, 1);
        activatePickup(p);
      }
    }
  }
  if (pour.active && pour.started) {
    // 熱を加える。金のやかん発動中は着地点が2つになる
    const targets = pourTargets();
    for (const w of weeds) {
      const R = 36 + w.radius() * 0.4;
      if (w.wither >= 1) {
        // 枯れ草はお湯がかかっても、指(やかん)で直接つついても片付く
        if (!w.removing) {
          const dxf = w.x - pour.x, dyf = w.y - pour.y;
          let hit = dxf * dxf + dyf * dyf < R * R;
          for (const tg of targets) {
            if (hit) break;
            const dx = w.x - tg.x, dy = w.y - tg.y;
            hit = dx * dx + dy * dy < R * R;
          }
          if (hit) startCrumble(w);
        }
        continue;
      }
      for (const tg of targets) {
        const dx = w.x - tg.x, dy = w.y - tg.y;
        const d2 = dx * dx + dy * dy;
        if (d2 < R * R) {
          const fall = 1 - Math.sqrt(d2) / R;
          w.scald = Math.min(w.scald + dt * 1.15 * fall, 2.2);
          // ドクダミは根まで火が通った瞬間、湯気がブワッと立つ(復活しない合図)
          if (w.type === 'dokudami' && !w.rootCooked && w.scald >= 1.7) {
            w.rootCooked = true;
            emitSteamBurst(w.x, w.y, 12);
          }
        }
      }
    }
    // 濡れ・水しぶき・湯気・輪
    wetTimer -= dt;
    if (wetTimer <= 0) {
      wetTimer = 0.07;
      for (const tg of targets) addWet(tg.x, tg.y);
    }
    for (const tg of targets) {
      emitSplash(tg.x, tg.y, dt);
      emitSteam(tg.x, tg.y, 15, dt);
    }
    ringTimer -= dt;
    if (ringTimer <= 0) {
      ringTimer = 0.15;
      for (const tg of targets) rings.push({ x: tg.x, y: tg.y, age: 0, life: 0.5 });
    }
    // ぽこぽこ音(たまに連泡)
    audio.nextBubble -= dt;
    if (audio.nextBubble <= 0) {
      audio.nextBubble = rnd(0.04, 0.14);
      bubbleBlip();
      if (Math.random() < 0.3) bubbleBlip();
    }
    // 水流の当たり方が変わる感じ(中域の中心周波数をゆっくり彷徨わせる)
    audio.nextDrift -= dt;
    if (audio.nextDrift <= 0 && audio.ready) {
      audio.nextDrift = rnd(0.2, 0.4);
      audio.pour.bpMid.frequency.setTargetAtTime(rnd(1400, 2200), audio.ctx.currentTime, 0.15);
    }
  }
  if (lingering) {
    lingering.ttl -= dt;
    emitSteam(lingering.x, lingering.y, 6 * clamp(lingering.ttl / 2.4, 0, 1), dt);
    if (lingering.ttl <= 0) lingering = null;
  }

  updateAutomation(dt);

  // 雑草の成長と枯れ
  for (let i = weeds.length - 1; i >= 0; i--) {
    const w = weeds[i];
    const t = WEED_TYPES[w.type];
    if (w.age < 10) w.age += dt;

    // 見た目の色変化はワンテンポ遅れてついてくる
    w.visualScald += (clamp(w.scald, 0, 1) - w.visualScald) * Math.min(1, dt * 1.6);

    if (w.removing) {
      w.crumbleTimer += dt;
      if (w.crumbleTimer >= CRUMBLE_FADE) {
        if (w.type === 'dokudami' && !w.rootCooked && w.rootHp > 0) {
          // 根が生き残った → しばらくして復活
          roots.push({ x: w.x, y: w.y, timer: rnd(14, 28), hp: w.rootHp - 1 });
        }
        weeds.splice(i, 1);
        const prev = totalKilled;
        totalKilled++;
        killedThisSession++;
        killsByType[w.type] = (killsByType[w.type] || 0) + 1;
        saveLS('oyu_totalKilled', totalKilled);
        saveLS('oyu_killsByType', killsByType);
        // たまにボーナスアイテムが落ちる(除草剤で枯らした分からは落ちない。
        // 金のやかんは発動中に重ねてドロップしない=連鎖防止)
        if (!w.byHerbicide) {
          const r = Math.random();
          if (r < 0.0015) spawnPickup(w.x, w.y, 'herbicide', 3);        // レア(全滅)
          else if (r < 0.0065) spawnPickup(w.x, w.y, 'herbicide', 2);   // アンコモン(60%)
          else if (r < 0.0185) spawnPickup(w.x, w.y, 'herbicide', 1);   // コモン(50%)
          else if (r < 0.0485 && kettleBoostT <= 0) spawnPickup(w.x, w.y, 'kettle2');
        }
        // 150本ごとに新しいやかんが解放される
        if (totalKilled % 150 === 0) {
          const idx = totalKilled / 150;
          if (idx < KETTLE_SKINS.length) {
            showToast(L.kettleUnlocked(L.kettleNames[idx]));
            unlockChime();
          }
        }
        // 除草数に応じて新種が解放される
        for (const key in WEED_TYPES) {
          const tt = WEED_TYPES[key];
          if (tt.unlockAt > 0 && prev < tt.unlockAt && totalKilled >= tt.unlockAt) {
            showToast(L.unlockToast(L.names[key] || tt.name));
            unlockChime();
            for (let s = 0; s < 2; s++) spawnWeed({ type: key });
          }
        }
        updateHud();
        continue;
      }
    } else if (w.wither >= 1) {
      // 枯れ草としてその場に残る。タップ(お湯がかかる)と崩れる
    } else if (w.scald >= t.scaldThreshold) {
      // 枯れが進行(たっぷりかけた葉ほど早く、大株ほどしぶとい)
      const strength = 0.4 + 0.6 * clamp(w.scald, 0, 1.5) / 1.5;
      w.wither = Math.min(1, w.wither + dt * strength / (t.witherDur * (0.7 + 0.45 * w.size)));
      if (w.wither >= 1 && !huskHintShown) {
        huskHintShown = true;
        showToast(L.huskHint);
      }
    } else {
      // 少ししかかかっていない葉はゆっくり回復する
      w.scald = Math.max(0, w.scald - dt * 0.02);
      if (w.wither < 0.15) w.wither = Math.max(0, w.wither - dt * 0.004);
    }

  }

  // ボーナスの経過
  if (kettleBoostT > 0) kettleBoostT = Math.max(0, kettleBoostT - dt);
  for (let i = pickups.length - 1; i >= 0; i--) {
    const p = pickups[i];
    p.age += dt;
    if (p.age > 45) pickups.splice(i, 1);   // 拾われないまま長時間置かれたら消える
  }
  if (herbicideWave) {
    herbicideWave.t += dt;
    const R = herbicideWave.t * 400;
    for (const w of weeds) {
      if (w.removing || w._herbWave === herbicideWave.id) continue;
      const dx = w.x - herbicideWave.cx, dy = w.y - herbicideWave.cy;
      if (dx * dx + dy * dy < R * R) {
        w._herbWave = herbicideWave.id;   // 判定は波1回につき1度だけ
        if (Math.random() < herbicideWave.p) {
          // 当たった草は根まで枯れて崩れる。外れた草は生き残る
          w.wither = 1;
          w.scald = Math.max(w.scald, 1.2);
          w.rootCooked = true;
          w.byHerbicide = true;
          startCrumble(w);
        }
      }
    }
    if (R > Math.hypot(W, H)) {
      regrowBoostT = herbicideWave.boost;   // 威力に応じた再生ブースト
      herbicideWave = null;
    }
  }
  if (regrowBoostT > 0) regrowBoostT = Math.max(0, regrowBoostT - dt);

  // 鳥のさえずり
  if (audio.ready && !muted) {
    audio.nextBird -= dt;
    if (audio.nextBird <= 0) {
      audio.nextBird = rnd(9, 22);
      birdChirp();
    }
  }

  // 時計の表示更新(10分刻みで変わったときだけ)
  const clk = gameClock();
  if (clk !== lastClock) {
    lastClock = clk;
    updateHud();
  }

  fadeWet(dt);
  updateParticles(dt, time);
}

/* ---------------- 描画 ---------------- */
/* 見た目が変化しない草(大半)はオフスクリーンにキャッシュして、
   毎フレームは「動いている草」だけを描く。これで数百本でも軽い。 */
let weedLayer = null, weedLayerCtx = null, weedLayerDirty = true;
let lastLayerRebuild = -9;     // 再構築の連発を防ぐ(超密林でのカクつき対策)
const pendingLayerAdds = [];   // 新しく定着した草はレイヤー全体を作り直さず描き足す

function isDynamicWeed(w) {
  if (w.removing || w.age < 3) return true;   // 崩れ中・生えたてのフェードイン中
  if (w.wither >= 1) return false;              // 枯れ草は見た目が固定
  return w.wither > 0 || w.scald > 0.004 || w.visualScald > 0.004;
}

function rebuildWeedLayer() {
  const pw = Math.max(1, Math.round(W * RES));
  const ph = Math.max(1, Math.round(H * RES));
  if (!weedLayer || weedLayer.width !== pw || weedLayer.height !== ph) {
    weedLayer = document.createElement('canvas');
    weedLayer.width = pw;
    weedLayer.height = ph;
    weedLayerCtx = weedLayer.getContext('2d');
  }
  weedLayerCtx.setTransform(1, 0, 0, 1, 0, 0);
  weedLayerCtx.clearRect(0, 0, pw, ph);
  weedLayerCtx.setTransform(RES, 0, 0, RES, 0, 0);
  const mainCtx = ctx;
  ctx = weedLayerCtx;
  try {
    for (const w of weeds) {
      if (!isDynamicWeed(w)) {
        drawWeed(w, 0);
        w._inLayer = true;
      } else {
        w._inLayer = false;
      }
      w._queued = false;
    }
  } finally {
    ctx = mainCtx;
  }
  pendingLayerAdds.length = 0;
  weedLayerDirty = false;
}

function render(time) {
  drawGravel();   // 不透明の全面描画なのでclearRectは不要

  // 苔庭・池(事前レンダリング。草より下に敷く)
  if (decoDirty || (decoCanvas && (decoW !== W || decoH !== H || decoRES !== RES))) {
    buildDecoLayer();
  }
  if (decoCanvas) ctx.drawImage(decoCanvas, 0, 0, W, H);
  if (wetActive) {
    ctx.save();
    ctx.globalAlpha = 0.55;
    ctx.drawImage(wetCanvas, 0, 0, W, H);
    ctx.restore();
  }

  // 雑草(手前が上に重なるようyでソート)
  weeds.sort((a, b) => a.y - b.y);
  // _inLayer = その草の絵がキャッシュレイヤーに入っているか。
  // 新しく生えた草は「レイヤー未収載のまま毎フレーム描く」だけなので再構築は不要。
  for (const w of weeds) {
    if (isDynamicWeed(w)) {
      if (w._inLayer) {
        weedLayerDirty = true;   // 静→動: レイヤーから消すには再構築が必要
        w._inLayer = false;
      }
    } else if (!w._inLayer && !w._queued) {
      w._queued = true;
      pendingLayerAdds.push(w);  // 定着した草は1本だけ描き足す
    }
  }
  const sizeMismatch = !weedLayer ||
      weedLayer.width !== Math.max(1, Math.round(W * RES)) ||
      weedLayer.height !== Math.max(1, Math.round(H * RES));
  // 再構築は最大でも0.35秒に1回。待っている間は古いレイヤー+動的描画で凌ぐ
  if ((weedLayerDirty && time - lastLayerRebuild > 0.35) || sizeMismatch) {
    rebuildWeedLayer();
    lastLayerRebuild = time;
  } else if (!weedLayerDirty && pendingLayerAdds.length) {
    const mainCtx = ctx;
    ctx = weedLayerCtx;
    try {
      for (const w of pendingLayerAdds) {
        drawWeed(w, 0);
        w._inLayer = true;
        w._queued = false;
      }
    } finally {
      ctx = mainCtx;
    }
    pendingLayerAdds.length = 0;
  }
  ctx.drawImage(weedLayer, 0, 0, W, H);
  for (const w of weeds) {
    if (!w._inLayer) drawWeed(w, time);   // レイヤーに入っていない草は毎フレーム描く
  }

  // 落ちているボーナスアイテム
  for (const p of pickups) {
    const fade = p.age > 40 ? clamp((45 - p.age) / 5, 0, 1) : 1;
    ctx.save();
    ctx.globalAlpha = fade;
    // ほのかな光
    const T = p.kind === 'herbicide' ? (HERB_TIERS[p.tier] || HERB_TIERS[1]) : null;
    const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 16);
    glow.addColorStop(0, T ? T.glow : 'rgba(255,225,130,0.45)');
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 16, 0, TAU);
    ctx.fill();
    if (p.kind === 'herbicide') {
      // 小さな薬品ボトル(レア度で色が違う)
      ctx.fillStyle = T.bottle;
      ctx.strokeStyle = T.stroke;
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.roundRect(p.x - 4, p.y - 3, 8, 9, 2);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#dfe8da';
      ctx.fillRect(p.x - 2.6, p.y - 0.5, 5.2, 4);   // ラベル
      ctx.fillStyle = '#7a8a74';
      ctx.fillRect(p.x - 2, p.y - 6, 4, 3);          // 首
      ctx.fillStyle = '#e8e2c8';
      ctx.fillRect(p.x - 2.6, p.y - 8, 5.2, 2.4);    // キャップ
    } else {
      // ミニ金やかん
      ctx.fillStyle = '#e8cc74';
      ctx.strokeStyle = '#96803a';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y + 1, 6.5, 5.5, 0, 0, TAU);
      ctx.fill();
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(p.x + 5, p.y - 1);
      ctx.lineTo(p.x + 10, p.y - 3);
      ctx.lineTo(p.x + 10, p.y - 1);
      ctx.lineTo(p.x + 5, p.y + 1.5);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(p.x, p.y - 1, 1.4, 0, TAU);
      ctx.fillStyle = '#6b5220';
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, 5, 6.5, 0, Math.PI * 0.7, Math.PI * 1.3);
      ctx.strokeStyle = 'rgba(90,70,30,0.9)';
      ctx.lineWidth = 1.4;
      ctx.stroke();
    }
    ctx.restore();
  }

  drawParticles();

  // 除草剤の波(レア度で色が違う)
  if (herbicideWave) {
    const R = herbicideWave.t * 400;
    ctx.beginPath();
    ctx.arc(herbicideWave.cx, herbicideWave.cy, R, 0, TAU);
    ctx.strokeStyle = `rgba(${herbicideWave.ring},${clamp(0.5 - herbicideWave.t * 0.22, 0, 1).toFixed(3)})`;
    ctx.lineWidth = 4;
    ctx.stroke();
  }

  // ホームセンターの設置物(エフェクトの上・注ぎやかんの下)
  if (ponds.length) drawPondFx(time);   // 波紋・光・錦鯉(静的部分は焼き込み済み)
  for (const d of autoSprinklers) drawSprinkler(d, time);
  for (const d of autoKettles) drawAutoKettle(d, time);
  for (const g2 of goats) drawGoat(g2, time);
  if (sweepFx) drawSweep(sweepFx, time);

  if (pour.active && pour.started) {
    drawKettleAt(pour.x, pour.y, pour.tx, pour.ty, time,
      KETTLE_SKINS[kettleSkin] || KETTLE_SKINS[0], true);
    if (kettleBoostT > 0) {
      const side = pour.x > 80 ? 1 : -1;
      const k2x = clamp(pour.x + 72 * side, 20, Math.max(20, W - 20));
      const t2 = pourTargets()[1];
      if (t2) drawKettleAt(k2x, pour.y, t2.x, t2.y, time, KETTLE_GOLD, true);
    }
  }

  dayTint();
  ctx.drawImage(vignetteCanvas, 0, 0, W, H);
}

function updateHud() {
  elDay.textContent = `${L.day(day)} ${lastClock || gameClock()}`;
  // 右上には「次の新種まであと何本」を出す(累計は図鑑で見られる)
  let nextAt = Infinity;
  for (const key in WEED_TYPES) {
    const ua = WEED_TYPES[key].unlockAt;
    if (ua > totalKilled && ua < nextAt) nextAt = ua;
  }
  elCount.textContent = nextAt === Infinity ? L.hudComplete : L.nextUnlock(nextAt - totalKilled);
  document.getElementById('pts').textContent = L.hudPts(points());
}

/* ---------------- メインループ ---------------- */
let lastTime = 0;
let pendingDt = 0;   // 省電力モードで間引いたフレームぶんの経過時間

// 画面上で何も動いていない「完全に静止した庭」か。
// 省電力モードではこの間、描画をさらに大きく間引ける。
function sceneCalm() {
  if (pour.active || lingering || herbicideWave || wetActive) return false;
  if (steam.length || splashes.length || flakes.length || rings.length) return false;
  if (pickups.length) return false;   // アイテムはきらめきアニメがある
  if (goats.length) return false;     // 除草ロボは常に歩き回っている
  if (sweepFx) return false;          // つむじ風が吹き抜け中
  for (const d of autoKettles) if (d.fireT > 0) return false;
  for (const d of autoSprinklers) if (d.sprayT > 0) return false;
  for (const w of weeds) if (!w._inLayer) return false;   // 生えかけ・枯れ進行中の草
  return true;
}

function frame(ms) {
  const time = ms / 1000;
  let dt = time - lastTime;
  lastTime = time;
  if (dt < 0) dt = 0;
  pendingDt += dt;
  // 🔋省電力モード: 30fpsに間引く。完全に静止した庭なら10fpsまで落とす
  if (powerSave && pendingDt < (sceneCalm() ? 1 / 10 : 1 / 30) - 0.001) {
    requestAnimationFrame(frame);
    return;
  }
  let step = pendingDt;
  pendingDt = 0;
  if (step > 0.1) step = 0.1;      // タブ復帰などの巨大なdtを抑制
  if (step > 0) {
    const prevDay = day;
    update(step, time);
    if (day !== prevDay) updateHud();
    render(time);
  }
  requestAnimationFrame(frame);
}

/* ---------------- リサイズ ---------------- */
function resize() {
  const oldW = W, oldH = H;
  W = window.innerWidth / ZOOM;
  H = window.innerHeight / ZOOM;
  DPR = Math.min(window.devicePixelRatio || 1, powerSave ? 1.5 : 2);
  RES = DPR * ZOOM;
  canvas.width = Math.max(1, Math.round(window.innerWidth * DPR));
  canvas.height = Math.max(1, Math.round(window.innerHeight * DPR));
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.setTransform(RES, 0, 0, RES, 0, 0);
  buildVignette();
  weedLayerDirty = true;
  if (oldW > 0 && oldH > 0) {
    const fx = W / oldW, fy = H / oldH;
    for (const w of weeds) { w.x *= fx; w.y *= fy; }
    for (const r of roots) { r.x *= fx; r.y *= fy; }
    for (const d of autoKettles) { d.x *= fx; d.y *= fy; }
    for (const d of autoSprinklers) { d.x *= fx; d.y *= fy; }
    for (const g2 of goats) { g2.x *= fx; g2.y *= fy; g2.wander = null; }
    // 苔庭・池はW,H比率の固定構図なので、renderのサイズ検知で自動再構築される
  }
  if (!gravelCanvas || !wetCanvas) {
    // 初回だけ即時生成
    buildGravel();
    buildWet();
  } else {
    // 砂利の全再生成は重い(大画面で数百ms)ので、ドラッグリサイズ中は走らせない
    scheduleRebuild();
  }
}
let rebuildTimer = 0;
function scheduleRebuild() {
  clearTimeout(rebuildTimer);
  rebuildTimer = setTimeout(() => {
    if (needGravelRebuild()) buildGravel();
    if (wetCanvas.width !== Math.max(1, Math.round(W * RES)) ||
        wetCanvas.height !== Math.max(1, Math.round(H * RES))) buildWet();
  }, 220);
}
let resizeQueued = false;
window.addEventListener('resize', () => {
  if (resizeQueued) return;
  resizeQueued = true;
  requestAnimationFrame(() => { resizeQueued = false; resize(); });
});

// GitHub Pagesなど自分のサイトで動いているときだけ、オフライン用SWを登録
// (アーティファクトやfile://では登録しない)
if ('serviceWorker' in navigator && location.protocol === 'https:' &&
    !/claude/.test(location.hostname)) {
  try {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  } catch (e) {}
}

document.addEventListener('visibilitychange', () => {
  if (document.hidden) saveLS('oyu_elapsed', elapsed);
  if (!audio.ctx) return;
  if (document.hidden) {
    const p = audio.ctx.suspend();
    if (p && p.catch) p.catch(() => {});
  } else if (!muted && audio.ctx.state !== 'running') {
    const p = audio.ctx.resume();
    if (p && p.catch) p.catch(() => {});
  }
});
window.addEventListener('pagehide', () => saveLS('oyu_elapsed', elapsed));

/* ---------------- 開始 ---------------- */
buildSteamSprite();
buildStoneSprites();
resize();
initGarden();
applyLocale();
applyMute();
applyPowerSaveUI();
updateHud();
if (!loadLS('oyu_onboarded', false)) {
  // 初回だけ、かんたんなオンボーディング(ゴール込み)を表示
  openPanel('onboard');
} else {
  // 2回目以降は軽いトースト案内だけ
  pourGuideActive = true;
  showToast(L.pourGuide, 9000);
}
requestAnimationFrame((ms) => { lastTime = ms / 1000; requestAnimationFrame(frame); });
</script>
</body>
</html>
